<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --bg: #0b0f19; --card: #111827; --primary: #6366f1; --border: #1f2937; }
        body { margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; color: white; padding-bottom: 80px; }
        
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #0d111c; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .stat-card { border-radius: 15px; padding: 15px; display: flex; flex-direction: column; }
        .stat-card .title { font-size: 0.7rem; opacity: 0.7; font-weight: 700; text-transform: uppercase; }
        .stat-card .val { font-size: 1.1rem; font-weight: 700; margin-top: 5px; }

        .search-area { padding: 0 20px; }
        .main-panel { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; }
        
        .input-label { font-size: 0.85rem; font-weight: 700; margin-bottom: 10px; display: block; color: var(--primary); }
        .custom-select { background: #0b0f19; border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        .input-query { width: 100%; background: #0b0f19; border: 1px solid var(--border); border-radius: 10px; padding: 15px; color: white; outline: none; margin-bottom: 20px; }

        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0d111c; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; }
        .nav-btn { color: #64748b; text-decoration: none; text-align: center; display: flex; flex-direction: column; font-size: 0.65rem; gap: 4px; }
        .nav-btn.active { color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <span class="material-icons-round">terminal</span>
        <span class="material-icons-round" style="color: #6366f1;">settings</span>
    </header>

    <section class="stats">
        <div class="stat-card" style="background: linear-gradient(135deg, #6366f1, #4338ca);">
            <div class="title">Sistem Durumu</div>
            <div class="val">AKTİF</div>
        </div>
        <div class="stat-card" style="background: linear-gradient(135deg, #ec4899, #be185d);">
            <div class="title">Bakiye</div>
            <div class="val">994.764 $</div>
        </div>
    </section>

    <section class="search-area">
        <div class="main-panel">
            <label class="input-label">MODÜL SEÇİMİ</label>
            <div class="custom-select">
                <span>Instagram Veri Sorgu</span>
                <span class="material-icons-round">expand_more</span>
            </div>

            <label class="input-label">SORGULANACAK VERİ</label>
            <input type="text" class="input-query" placeholder="Kullanıcı adı veya ID girin...">
            
            <button style="width:100%; padding:15px; background:var(--primary); border:none; border-radius:10px; color:white; font-weight:700;">SORGULAMAYI BAŞLAT</button>
        </div>
    </section>

    <nav>
        <a href="#" class="nav-btn active"><i class="material-icons-round">search</i><span>Sorgu</span></a>
        <a href="#" class="nav-btn"><i class="material-icons-round">history</i><span>Geçmiş</span></a>
        <a href="#" class="nav-btn"><i class="material-icons-round">account_balance_wallet</i><span>Bakiye</span></a>
        <a href="#" class="nav-btn" onclick="location.href='index.html'"><i class="material-icons-round">power_settings_new</i><span>Çıkış</span></a>
    </nav>

</body>
</html>
