<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --bg: #000000; --card: #0a0a0a; --border: #1a1a1a; --accent: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; padding-bottom: 100px; }

        header { 
            padding: 25px 20px; border-bottom: 1px solid var(--border); background: var(--card);
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-logo { font-weight: 900; letter-spacing: 5px; font-size: 1.1rem; }

        .main-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .stat-box small { font-size: 0.6rem; color: #555; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .stat-box h2 { font-size: 1.1rem; margin-top: 5px; font-weight: 700; }

        .query-panel { padding: 0 20px; }
        .panel-box { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 30px; }
        .panel-box h3 { font-size: 0.8rem; letter-spacing: 1px; color: #555; margin-bottom: 20px; text-transform: uppercase; }
        
        .custom-input { 
            width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px; 
            padding: 16px; color: #fff; font-size: 1rem; outline: none; margin-bottom: 20px;
        }
        .action-btn { 
            width: 100%; padding: 16px; background: #fff; color: #000; border: none; 
            border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }

        /* ALT NAVİGASYON - MODERN KLASİK */
        nav { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: #0a0a0a; border-top: 1px solid var(--border); 
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-link { 
            text-decoration: none; color: #444; display: flex; flex-direction: column; 
            align-items: center; gap: 5px; transition: 0.3s;
        }
        .nav-link.active { color: #fff; }
        .nav-link i { font-size: 26px; }
        .nav-link span { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <div class="header-logo">ARCHERA</div>
        <i class="material-icons-round" onclick="location.href='index.html'">power_settings_new</i>
    </header>

    <div class="main-stats">
        <div class="stat-box"><small>SYSTEM</small><h2>CONNECTED</h2></div>
        <div class="stat-box"><small>CREDITS</small><h2>994,764$</h2></div>
    </div>

    <div class="query-panel">
        <div class="panel-box">
            <h3>Sorgulama Modülü</h3>
            <input type="text" class="custom-input" placeholder="Kullanıcı Adı / ID / Link">
            <button class="action-btn">Sorguyu Başlat</button>
        </div>
    </div>

    <nav>
        <a href="#" class="nav-link active"><i class="material-icons-round">search</i><span>Sorgula</span></a>
        <a href="#" class="nav-link"><i class="material-icons-round">person_search</i><span>Hesaplar</span></a>
        <a href="#" class="nav-link"><i class="material-icons-round">storage</i><span>Database</span></a>
        <a href="#" class="nav-link"><i class="material-icons-round">collections</i><span>Görüntüler</span></a>
        <a href="#" class="nav-link"><i class="material-icons-round">psychology</i><span>AI Chat</span></a>
        <a href="#" class="nav-link"><i class="material-icons-round">shield</i><span>Yönetim</span></a>
    </nav>

</body>
</html>
