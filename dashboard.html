<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --bg: #030712; --accent: #00d2ff; --panel: #0d111c; --border: #1f2937; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; color: white; padding-bottom: 100px; }
        header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--panel); }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; letter-spacing: 3px; color: var(--accent); }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .st-card { background: var(--panel); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 12px; padding: 15px; }
        .st-label { font-size: 0.6rem; color: #64748b; font-weight: 800; text-transform: uppercase; }
        .st-val { font-size: 1.1rem; font-weight: 800; margin-top: 5px; font-family: 'Space Grotesk'; }

        .main { padding: 0 20px; }
        .box { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; padding: 25px; text-align: center; }
        input { width: 100%; background: #010409; border: 1px solid var(--border); border-radius: 10px; padding: 15px; color: white; margin: 15px 0; outline: none; }
        input:focus { border-color: var(--accent); }
        .btn { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 10px; color: #000; font-weight: 800; cursor: pointer; }

        /* ALT MENÜ - TAM İSTEDİĞİN ŞABLON */
        nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: #05070a; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 99; }
        .nav-link { text-decoration: none; color: #64748b; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; transition: 0.3s; }
        .nav-link.active { color: var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
        .nav-link span { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        .nav-link i { font-size: 26px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">ARCHERA CORE</div>
        <i class="material-icons-round" style="color: var(--accent);">radar</i>
    </header>

    <div class="stats">
        <div class="st-card"><div class="st-label">Sistem</div><div class="st-val">ONLINE</div></div>
        <div class="st-card"><div class="st-label">Bakiye</div><div class="st-val">994.764 $</div></div>
    </div>

    <div class="main">
        <div class="box">
            <div class="st-label" style="text-align:left; color:var(--accent);">OPERASYONEL SORGULAMA</div>
            <input type="text" placeholder="Hedef kullanıcı/ID girin...">
            <button class="btn">SORGULAMAYI BAŞLAT</button>
        </div>
    </div>

    <nav>
        <a href="#" class="nav-link active"><i class="material-icons-round">search</i><span>SORGULA</span></a>
        <a href="#" class="nav-link"><i class="material-icons-round">groups</i><span>HESAPLAR</span></a>
        <a href="#" class="nav-link"><i class="material-icons-round">account_tree</i><span>DATABASE</span></a>
        <a href="#" class="nav-link"><i class="material-icons-round">photo_library</i><span>GÖRÜNTÜLER</span></a>
        <a href="#" class="nav-link"><i class="material-icons-round">smart_toy</i><span>AI CHAT</span></a>
        <a href="#" class="nav-link"><i class="material-icons-round">admin_panel_settings</i><span>YÖNETİM</span></a>
    </nav>
</body>
</html>
