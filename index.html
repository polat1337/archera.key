<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUROSINT | ENTERPRISE TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Outfit:wght@300;600;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #e63946;
            --bg-dark: #000000;
            --glass: rgba(15, 15, 15, 0.9);
            --border-white: rgba(255, 255, 255, 0.1);
            --rounding: 30px; /* İstediğin o yuvarlak hatlar */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg-dark); color: #fff; height: 100vh; overflow: hidden; }

        /* KURUMSAL GİRİŞ PANELİ */
        #auth-gate { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #150000 0%, #000 100%);
            display: flex; align-items: center; justify-content: center; z-index: 100000;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .auth-card { 
            width: 90%; max-width: 420px; padding: 60px 40px; 
            background: var(--glass); border: 1px solid var(--border-white);
            border-radius: 40px; /* Ultra yuvarlak ve kurumsal */
            text-align: center; backdrop-filter: blur(25px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            animation: cardEntrance 0.8s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .auth-logo { 
            width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--primary);
            padding: 5px; margin-bottom: 30px; box-shadow: 0 0 30px rgba(230, 57, 70, 0.2);
            transition: 0.5s ease;
        }

        .auth-logo:hover { transform: rotate(15deg) scale(1.05); }

        .auth-title { font-family: 'Montserrat'; font-weight: 800; font-size: 1.6rem; letter-spacing: 4px; margin-bottom: 10px; color: #fff; }
        .auth-subtitle { font-size: 10px; color: #555; letter-spacing: 5px; margin-bottom: 40px; text-transform: uppercase; font-weight: 600; }

        /* YUVARLAK KURUMSAL INPUT */
        .auth-input { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1.5px solid var(--border-white);
            color: var(--primary); padding: 22px; text-align: center; font-family: 'JetBrains Mono';
            font-size: 1.6rem; letter-spacing: 10px; border-radius: 25px; /* Tam yuvarlak */
            outline: none; margin-bottom: 30px; transition: 0.4s;
        }
        .auth-input:focus { border-color: var(--primary); background: rgba(255,255,255,0.06); box-shadow: 0 0 25px rgba(230, 57, 70, 0.2); }

        /* MODERN KURUMSAL ACCESS BUTONU */
        .btn-corporate { 
            width: 100%; height: 65px; background: var(--primary); color: #fff; border: none;
            font-weight: 800; text-transform: uppercase; letter-spacing: 3px; border-radius: 25px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 15px;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        
        .btn-corporate i { font-size: 1.2rem; }
        .btn-corporate:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(230, 57, 70, 0.4); filter: brightness(1.1); }
        .btn-corporate:active { transform: translateY(0); }

        /* ANA PANEL (GİZLİ) */
        #panel { display: none; height: 100vh; grid-template-columns: 280px 1fr; opacity: 0; }
        
        /* TEST VERSİYON ETİKETİ (SİTENİN GÜNCELLENDİĞİNİ ANLAMAN İÇİN) */
        .version-tag { position: fixed; bottom: 10px; right: 20px; font-size: 9px; color: #333; pointer-events: none; }

        /* MOBİL UYUMLULUK */
        @media (max-width: 900px) {
            #panel { grid-template-columns: 1fr; }
            .auth-card { padding: 50px 30px; }
            .workspace { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card">
            <img src="24841.jpg" class="auth-logo" onerror="this.src='https://via.placeholder.com/100?text=LOGO'">
            <div class="auth-title">SUROSINT</div>
            <p class="auth-subtitle">Operational Intelligence Center</p>
            
            <input type="password" id="access-key" class="auth-input" placeholder="••••">
            
            <button onclick="unlockSystem()" class="btn-corporate">
                <i class="fas fa-shield-halved"></i>
                <span>Sistemi Doğrula</span>
            </button>
        </div>
    </div>

    <div id="panel">
        <div style="padding: 100px; text-align: center; width: 100vw;">
            <h1 style="font-family:'Montserrat'; font-size: 3rem;">SİSTEM AKTİF</h1>
            <p style="letter-spacing: 5px; color: var(--primary);">HOŞ GELDİN REİS</p>
            <button onclick="location.reload()" style="margin-top:20px; background:none; border:1px solid #333; color:#333; padding:10px; border-radius:20px; cursor:pointer;">Sistemi Yenile</button>
        </div>
    </div>

    <div class="version-tag">Build: 2026.03.25-V1.5 (PRO)</div>

    <script>
        function unlockSystem() {
            const key = document.getElementById('access-key').value;
            if(key === 'babapro') {
                const gate = document.getElementById('auth-gate');
                gate.style.opacity = '0';
                gate.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    gate.style.display = 'none';
                    document.getElementById('panel').style.display = 'block';
                    setTimeout(() => document.getElementById('panel').style.opacity = '1', 50);
                }, 1000);
            } else {
                alert('ERİŞİM REDDEDİLDİ: Geçersiz Kimlik Bilgisi.');
                document.getElementById('access-key').value = '';
            }
        }
        
        // Önbelleği temizlemek için küçük bir hile
        console.log("Terminal Ver. 1.5 Loaded.");
    </script>
</body>
</html>
