<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | SECURE LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #05070a;
            --card-bg: #0d1117;
            --border: #21262d;
            --input-focus: #30363d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: #c9d1d9;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Arka Plan: Çok Hafif Grain (Kumlanma) ve Vinyet */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 100%);
            z-index: -1;
        }

        /* Ana Panel: Sert ve Otoriter */
        .login-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 32px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            text-align: center;
            position: relative;
        }

        /* Logo Alanı */
        .brand-header { margin-bottom: 40px; }
        .brand-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            color: #fff;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .brand-header p {
            font-size: 0.75rem;
            color: #8b949e;
            margin-top: 8px;
            letter-spacing: 2px;
            font-weight: 500;
        }

        /* Form Elemanları */
        .field-group { text-align: left; margin-bottom: 24px; }
        .field-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: #8b949e;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-control {
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            width: 100%;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            font-family: monospace;
            letter-spacing: 4px;
        }

        .input-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
            background: #0d1117;
        }

        /* Giriş Butonu: Metalik ve Net */
        .btn-access {
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 16px;
            width: 100%;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .btn-access:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        /* Bekle Katmanı: Minimalist */
        #wait-screen {
            display: none;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            z-index: 5;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .loader-ring {
            width: 40px; height: 40px;
            border: 2px solid #30363d;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .wait-label {
            margin-top: 16px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--accent);
        }
    </style>
</head>
<body>

<div class="login-panel">
    <div id="wait-screen">
        <div class="loader-ring"></div>
        <div class="wait-label">BEKLE</div>
    </div>

    <div class="brand-header">
        <h1>ARCHERA</h1>
        <p>TERMINAL ACCESS</p>
    </div>

    <div class="field-group">
