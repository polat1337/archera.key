<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | SMM CORE SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df; /* Klasik Kurumsal Mavi */
            --bg: #0b0e14;
            --card: #151921;
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #858796;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* --- GİRİŞ PANELİ (SMM LOGIN) --- */
        #gatekeeper {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            width: 90%; max-width: 380px; background: var(--card); padding: 40px 30px;
            border-radius: 15px; border: 1px solid var(--border); text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .login-card h1 { font-weight: 800; font-size: 1.8rem; margin-bottom: 30px; letter-spacing: -1px; }
        .input-box { width: 100%; padding: 15px; background: #0b0e14; border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 1.1rem; text-align: center; margin-bottom: 20px; outline: none; }
        .input-box:focus { border-color: var(--primary); }
        
        .login-btn {
            width: 100%; padding: 15px; background: var(--primary); color: #fff;
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }
        .login-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .req-link { display: block; margin-top: 25px; color: var(--text-dim); text-decoration: none; font-size: 0.75rem; font-weight: 600; }

        /* --- ANA PANEL (DASHBOARD) --- */
        #main-shell { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 0.5s; }
        header { 
            height: 65px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
        }
        .logo-text { font-weight: 800; font-size: 1.2rem; color: var(--primary); }
        .status { font-size: 0.65rem; background: rgba(28, 200, 138, 0.1); color: #1cc88a; padding: 5px 12px; border-radius: 20px; font-weight: 800; border: 1px solid rgba(28, 200, 138, 0.2); }

        .viewport { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .module { display: none; max-width: 600px; margin: 0 auto; }
        .module.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* KURUMSAL KARTLAR */
        .smm-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 25px; margin-bottom: 20px; }
        .smm-label { font-size: 0.7rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: block; }
        
        .smm-input { width: 100%; background: #0b0e14; border: 1px solid var(--border); padding: 15px; color: #fff; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .smm-btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* SONUÇLAR */
        .res-list { margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px; display: none; }
        .res-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .res-item span { color: var(--text-dim); font-size: 0.8rem; }
        .res-item p { color: #fff; font-weight: 600; font-size: 0.9rem; }

        /* ALT MENÜ (İkonlu) */
        nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: var(--card); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-link { color: var(--text-dim); text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: 0.3s; flex: 1; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 1.4rem; }
        .nav-link span { font-size: 0.65rem; font-weight: 700; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="login-card">
            <h1>ARCHERA</h1>
            <input type="password" id="gateKey" class="input-box" placeholder="Access Key Girin">
            <button class="login-btn" onclick="tryLogin()">
                GİRİŞ YAP <i class="fas fa-sign-in-alt"></i>
            </button>
            <a href="https://www.instagram.com/pxlat" target="_blank" class="req-link">KEY TALEP ET: @PXLAT</a>
        </div>
    </div>

    <div id="main-shell">
        <header>
            <div class="logo-text">ARCHERA</div>
            <div class="status">SİSTEM AKTİF</div>
        </header>

        <div class="viewport">
            <div id="mod-sorgu" class="module active">
                <div class="smm-card">
                    <span class="smm-label">İSTİHBARAT TERMİNALİ</span>
                    <input type="text" id="target" class="smm-input" placeholder="Kullanıcı Adı / ID / GSM...">
                    <button class="smm-btn" onclick="runScan()">
                        SORGULA <i class="fas fa-radar"></i>
                    </button>

                    <div id="resBox" class="res-list">
                        <div class="res-item"><span>HEDEF</span><p id="r-name">-</p></div>
                        <div class="res-item"><span>DURUM</span><p style="color:#1cc88a">TAMAMLANDI</p></div>
                    </div>
                </div>
            </div>

            <div id="mod-admin" class="module">
                <div class="smm-card">
                    <span class="smm-label">SİSTEM AYARLARI (RENDER/MANGO)</span>
                    <input type="text" id="session" class="smm-input" placeholder="Session Token Girin">
                    <button class="smm-btn" style="background:#333;">SİSTEMİ BOOSTLA</button>
                </div>
            </div>
        </div>

        <nav>
            <div class="nav-link active" onclick="tab('mod-sorgu', this)"><i class="fas fa-search"></i><span>Sorgu</span></div>
            <div class="nav-link" onclick="tab('mod-db', this)"><i class="fas fa-database"></i><span>Veriler</span></div>
            <div class="nav-link" onclick="tab('mod-admin', this)"><i class="fas fa-user-cog"></i><span>Profil</span></div>
        </nav>
    </div>

    <script>
        // BACKEND / RENDER / MANGO DESTEĞİ İÇİN TEMEL YAPI
        const API_BASE = "https://surosint-1.onrender.com"; // Burası Render linkinle eşleşir

        function tryLogin() {
            const k = document.getElementById('gateKey').value;
            if(k === "baba") {
                document.getElementById('gatekeeper').style.display = "none";
                document.getElementById('main-shell').style.display = "flex";
                setTimeout(() => { document.getElementById('main-shell').style.opacity = "1"; }, 50);
            } else { 
                window.location.href = "https://www.instagram.com/pxlat"; 
            }
        }

        function tab(id, el) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            el.classList.add('active');
        }

        // OPTİMEBOOST & RENDER SORGULAMA FONKSİYONU
        async function runScan() {
            const val = document.getElementById('target').value;
            if(!val) return;
            
            document.getElementById('resBox').style.display = "block";
            document.getElementById('r-name').innerText = val.toUpperCase();
            
            // Buraya backend fetch() kodlarını GitHub'daki yapıya göre ekleyebilirsin
            console.log("Boost Mode: Active / Target: " + val);
        }
    </script>
</body>
</html>
