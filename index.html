<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | OSINT TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Outfit:wght@300;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #00d2ff; --secondary: #0072ff; --bg: #050a15; 
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(0, 210, 255, 0.2); 
            --text: #e0f2fe; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        #canvas-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a1931 0%, #050a15 100%); }
        #auth-gate { position: fixed; inset: 0; z-index: 100000; display: flex; align-items: center; justify-content: center; background: rgba(5, 10, 21, 0.98); transition: 1.5s; }
        .login-box { width: 90%; max-width: 450px; padding: 60px 40px; border-radius: 40px; background: var(--glass); border: 2px solid var(--border); backdrop-filter: blur(20px); text-align: center; }
        .key-input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); padding: 20px; border-radius: 20px; color: var(--accent); text-align: center; font-family: 'JetBrains Mono'; font-size: 1.5rem; letter-spacing: 10px; margin-bottom: 25px; outline: none; }
        .btn-enter { width: 100%; padding: 22px; border-radius: 20px; border: none; background: linear-gradient(45deg, var(--secondary), var(--accent)); color: #fff; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }
        #panel { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1s; }
        .top-bar { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }
        .user-identity { display: flex; align-items: center; gap: 15px; }
        .user-identity img { width: 45px; height: 45px; border-radius: 12px; border: 1px solid var(--accent); }
        .main-view { flex: 1; padding: 30px 20px; overflow-y: auto; padding-bottom: 120px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.5s; }
        .search-container { background: var(--glass); border: 1px solid var(--border); border-radius: 30px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .search-container input { flex: 1; background: transparent; border: none; color: #fff; outline: none; }
        .result-card { background: var(--glass); border-radius: 25px; padding: 25px; border-left: 5px solid var(--accent); margin-bottom: 15px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(5, 10, 21, 0.95); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; }
        .nav-item { color: #5b7a9d; text-align: center; cursor: pointer; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--accent); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>

    <div id="auth-gate">
        <div class="login-box">
            <h1 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:20px;">SUROSINT</h1>
            <input type="password" id="gate-key" class="key-input" placeholder="••••">
            <button onclick="initSystem()" class="btn-enter">GİRİŞ YAP</button>
        </div>
    </div>

    <div id="panel">
        <header class="top-bar">
            <div class="user-identity">
                <img src="24841.jpg">
                <div><h2 id="current-user-name">ARCHERA</h2><div id="role-badge" style="color:gold; font-size:10px;">OWNER</div></div>
            </div>
            <div id="server-status" style="font-size:10px; color:#5b7a9d;">BAĞLANTI: <span id="status-text">BEKLENİYOR</span></div>
        </header>

        <main class="main-view">
            <section id="search" class="tab-content active">
                <div class="search-container">
                    <input type="text" id="master-query" placeholder="@username...">
                    <button onclick="runGlobalInquiry()" style="background:none; border:none; color:var(--accent);"><i class="fas fa-search"></i></button>
                </div>
                <div id="search-results"></div>
            </section>

            <section id="admin" class="tab-content">
                <h2 style="margin-bottom:20px;">Hesap Yönetimi</h2>
                <div class="result-card" style="border-left-color: #e1306c;">
                    <h3>INSTAGRAM BAĞLA</h3>
                    <button onclick="linkNewAccount('Instagram')" class="btn-enter" style="margin-top:15px; background:#e1306c;">HESAP EKLE</button>
                </div>
                <div id="tracked-logs"></div>
            </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('search', this)"><i class="fas fa-search"></i><span>Sorgu</span></div>
            <div class="nav-item" onclick="switchTab('admin', this)"><i class="fas fa-user-shield"></i><span>Yönetim</span></div>
        </nav>
    </div>

    <script>
        const RENDER_URL = "https://surosint.onrender.com";
        let members = {"baba": { name: "ARCHERA", role: "Owner" }};

        function initSystem() {
            const k = document.getElementById('gate-key').value;
            if(k === "baba") {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('panel').style.display = 'flex';
                setTimeout(() => document.getElementById('panel').style.opacity = '1', 50);
            } else { alert("HATALI KEY"); }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function runGlobalInquiry() {
            const q = document.getElementById('master-query').value.trim();
            if(!q) return;
            const resDiv = document.getElementById('search-results');
            resDiv.innerHTML = `<div class="result-card">Sorgulanıyor... (Render uyanıyor olabilir)</div>`;
            try {
                const response = await fetch(`${RENDER_URL}/api/v4/sorgu`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: q, owner: "ARCHERA" })
                });
                const result = await response.json();
                resDiv.innerHTML = `<div class="result-card"><b>HEDEF:</b> ${result.targets[0].name}<br><b>DURUM:</b> Aktif</div>`;
            } catch (e) { resDiv.innerHTML = `<div class="result-card" style="color:red">Bağlantı Hatası!</div>`; }
        }

        // --- GÜNCELLENMİŞ LOGIN FONKSİYONU ---
        async function linkNewAccount(platform) {
            const user = prompt(platform + " Kullanıcı Adı:");
            const pass = prompt(platform + " Şifre:");
            if(!user || !pass) return;

            alert("Giriş denemesi yapılıyor... Lütfen telefonuna bildirim gelirse 'Bendim' de. (30sn sürebilir)");

            try {
                const response = await fetch(`${RENDER_URL}/api/v4/auth/link`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ platform: platform, username: user, password: pass })
                });
                
                const res = await response.json();

                if(res.status === "success") {
                    alert("✅ BAŞARILI: " + res.message);
                    document.getElementById('tracked-logs').innerHTML += `<div class="result-card"><b>${user}</b>: Bağlandı 🔥</div>`;
                } else {
                    // API'den gelen gerçek hata mesajını göster (Şifre hatası, Challenge vb.)
                    alert("❌ SUNUCU YANITI: " + res.message);
                }
            } catch (e) {
                alert("❌ HATA: Sunucu yanıt vermedi. Render loglarını kontrol et!");
            }
        }

        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function draw() { ctx.fillStyle = "rgba(5,10,21,0.2)"; ctx.fillRect(0,0,canvas.width,canvas.height); requestAnimationFrame(draw); }
        draw();
    </script>
</body>
</html>
