<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | PRIVATE ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan-core: #00f3ff;
            --cyan-glow: rgba(0, 243, 255, 0.4);
            --bg-deep: #000205;
            --panel-glass: rgba(10, 15, 25, 0.6);
            --border-glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--bg-deep);
            font-family: 'Montserrat', sans-serif;
            color: white;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Seksi Arka Plan: Hareketli Neon Ağ */
        .bg-vortex {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(0, 243, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 243, 255, 0.05) 0%, transparent 40%),
                var(--bg-deep);
            z-index: -1;
        }

        /* Premium Cam Panel (Neuromorphic & Ultra-Rounded) */
        .premium-card {
            background: var(--panel-glass);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border-glass);
            border-radius: 40px; /* Çok yuvarlak, seksi köşeler */
            padding: 70px 40px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.8),
                inset 0 0 15px rgba(255,255,255,0.02);
            animation: cardEmerge 1.2s cubic-bezier(0.2, 1, 0.2, 1);
        }

        @keyframes cardEmerge {
            from { opacity: 0; transform: translateY(40px) scale(0.95); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* Logo Alanı: Minimalist & Elite */
        .logo-section h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 2rem;
            margin: 0;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 10px;
            margin-bottom: 50px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* Girdi Kutusu: Minimalist Line Tasarımı */
        .input-wrap {
            position: relative;
            margin-bottom: 30px;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 100%;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 6px;
            font-weight: 100;
            padding: 15px 0;
            transition: 0.4s ease;
        }

        input:focus {
            border-bottom-color: var(--cyan-core);
            font-weight: 300;
        }

        input::placeholder {
            color: rgba(255,255,255,0.15);
            letter-spacing: 2px;
            font-weight: 100;
            text-transform: uppercase;
        }

        /* Ultra Seksi Giriş Butonu: Neon Nabız Efekti */
        .btn-sexy {
            background: transparent;
            border: 1px solid var(--cyan-core);
            color: var(--cyan-core);
            padding: 18px;
            border-radius: 50px; /* Tam yuvarlak buton */
            font-weight: 600;
            letter-spacing: 3px;
            cursor: pointer;
            width: 100%;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            font-size: 0.9rem;
            position: relative;
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        .btn-sexy:hover {
            background: var(--cyan-core);
            color: #000;
            box-shadow: 0 0 30px var(--cyan-core);
        }

        /* Bekle Katmanı: Elit Yükleme Animasyonu */
        #loader {
            display: none;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep);
            border-radius: 40px;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
            animation: fadeIn 0.5s ease;
        }

        .spin-ring {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--cyan-core));
            animation: rotateRing 1s linear infinite;
            mask: radial-gradient(circle, transparent 55%, black 60%);
            -webkit-mask: radial-gradient(circle, transparent 55%, black 60%);
        }

        @keyframes rotateRing { to { transform: rotate(360deg); } }

        .wait-text {
            margin-top: 25px;
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 12px;
            color: var(--cyan-core);
            text-transform: uppercase;
            animation: pulseText 1.5s infinite;
        }

        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

<div class="bg-vortex"></div>

<div class="premium-card">
    <div id="loader">
        <div class="spin-ring"></div>
        <div class="wait-text">BEKLE</div>
    </div>

    <div class="logo-section">
        <h1>ARCHERA</h1>
        <div class="subtitle">Secure Intelligence</div>
    </div>

    <div class="input-wrap">
        <input type="password" id="accessKey" placeholder="Access Key">
    </div>

    <button class="btn-sexy" onclick="authenticate()">Sisteme Gir</button>
</div>

<script>
    function authenticate() {
        const key = document.getElementById('accessKey').value;
        const loader = document.getElementById('loader');
        
        // Anahtar: reis
        if(key === "reis") {
            loader.style.display = "flex";
            
            // 3 saniye bekleme simülasyonu
            setTimeout(() => {
                alert("ARCHERA GİRİŞ BAŞARILI. Ana sisteme bağlanılıyor...");
                // Yönlendirme buraya gelecek
            }, 3000);
        } else {
            alert("GEÇERSİZ ANAHTAR!");
            document.getElementById('accessKey').value = ''; // Kutuyu temizle
        }
    }
</script>

</body>
</html>
