<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;       /* Koyu Arka Plan */
            --card-bg: #111827;  /* Form Arka Planı */
            --primary: #6366f1;  /* Referans Mor Buton */
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border: #1f2937;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex; align-items: center; justify-content: center;
        }

        .login-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: left;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .header h1 { font-size: 1.75rem; font-weight: 700; margin: 0; }
        .header p { font-size: 0.9rem; color: var(--text-muted); margin-top: 8px; margin-bottom: 35px; }

        .input-group { margin-bottom: 20px; position: relative; }
        
        .input-box {
            background-color: #0b0f19; /* Daha koyu input içi */
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 16px 16px 52px; /* Sol ikon için padding */
            width: 100%;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
            display: block;
        }

        .input-box:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }

        .input-icon {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 24px;
        }

        .remember-forgot {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.85rem; color: var(--text-muted); margin-bottom: 25px;
        }
        
        .checkbox-wrap { display: flex; align-items: center; gap: 8px; }
        
        .btn-login {
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: block;
        }

        .btn-login:hover { background-color: #4f46e5; }

        .register-link {
            text-align: center; margin-top: 25px;
            font-size: 0.9rem; color: var(--text-muted);
        }
        .register-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="header">
        <h1>Hoşgeldiniz!</h1>
        <p>ARCHERA Terminal Access key girin.</p>
    </div>

    <div class="input-group">
        <span class="material-icons-round input-icon">vpn_key</span>
        <input type="password" id="keyInput" class="input-box" placeholder="Terminal Anahtarı">
    </div>

    <div class="remember-forgot">
        <div class="checkbox-wrap">
            <input type="checkbox" id="remember">
            <label for="remember">Beni Hatırla</label>
        </div>
    </div>

    <button class="btn-login" onclick="login()">Sisteme Bağlan</button>

    <div class="register-link">
        Anahtarınız yok mu? <a href="#">Talep Et</a>
    </div>
</div>

<script>
    function login() {
        const val = document.getElementById('keyInput').value;
        if(val === "reis") {
            alert("Giriş Başarılı! Yönlendiriliyorsunuz.");
            window.location.href = "dashboard.html"; // Dashboard'a yönlendir
        } else {
            alert("Hatalı Anahtar.");
        }
    }
</script>

</body>
</html>
