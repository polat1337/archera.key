<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHERA PANEL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--bg:#0a0b10;
--card:rgba(255,255,255,0.04);
--border:rgba(255,255,255,0.08);
--text:#eaeaf0;
--muted:#8b8fa3;
--accent:#7c6cff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
background:radial-gradient(circle at top,#11121a,#050507);
color:var(--text);
height:100vh;
overflow:hidden;
}

/* LOGIN */
#gate{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
backdrop-filter:blur(10px);
}

.card{
width:90%;max-width:360px;
padding:50px 30px;
border-radius:16px;
background:var(--card);
border:1px solid var(--border);
text-align:center;
}

.card h1{
font-family:"Space Grotesk";
letter-spacing:6px;
margin-bottom:10px;
}

.card p{
font-size:0.7rem;
color:var(--muted);
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
border-radius:10px;
border:1px solid var(--border);
background:transparent;
color:white;
margin-bottom:15px;
text-align:center;
}

/* BUTTON */
.btn{
width:100%;
padding:15px;
border-radius:10px;
border:none;
background:linear-gradient(135deg,#7c6cff,#5a4fff);
color:white;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
}

/* insta */
.insta{
display:block;
margin-top:15px;
font-size:0.7rem;
color:var(--muted);
text-decoration:none;
}

/* PANEL */
#panel{
display:none;
height:100vh;
flex-direction:column;
}

header{
padding:15px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
}

/* CONTENT */
.view{
flex:1;
padding:20px;
overflow:auto;
}

.box{
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
padding:20px;
}

/* NAV */
nav{
position:fixed;
bottom:0;
width:100%;
height:70px;
display:flex;
background:rgba(10,10,15,0.7);
border-top:1px solid var(--border);
}

.nav{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:0.65rem;
color:var(--muted);
cursor:pointer;
}

.nav i{font-size:18px;margin-bottom:3px;}

.nav.active{color:white;}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="gate">
<div class="card">
<h1>ARCHERA</h1>
<p>INTEL CORE</p>

<input type="password" id="key" placeholder="••••••">

<button class="btn" onclick="login()">
<i class="fa-solid fa-right-to-bracket"></i> Giriş
</button>

<a href="https://www.instagram.com/pxlat" target="_blank" class="insta">
Key Talep Et
</a>

</div>
</div>

<!-- PANEL -->
<div id="panel">

<header>
<div>ARCHERA</div>
<div style="font-size:0.7rem;color:#7cffc4;">ONLINE</div>
</header>

<div class="view">

<div id="sorgu" class="page">
<div class="box">Sorgu Modülü</div>
</div>

<div id="hesaplar" class="page" style="display:none">
<div class="box">Hesaplar</div>
</div>

<div id="goruntu" class="page" style="display:none">
<div class="box">Görüntü</div>
</div>

<div id="veriler" class="page" style="display:none">
<div class="box">Veriler</div>
</div>

<div id="ai" class="page" style="display:none">
<div class="box">ArcherAI</div>
</div>

<div id="admin" class="page" style="display:none">
<div class="box">Yönetim Paneli</div>
</div>

</div>

<nav>
<div class="nav active" onclick="openPage('sorgu',this)">
<i class="fa-solid fa-magnifying-glass"></i>Sorgula
</div>

<div class="nav" onclick="openPage('hesaplar',this)">
<i class="fa-solid fa-user"></i>Hesaplar
</div>

<div class="nav" onclick="openPage('goruntu',this)">
<i class="fa-solid fa-eye"></i>Görüntü
</div>

<div class="nav" onclick="openPage('veriler',this)">
<i class="fa-solid fa-database"></i>Veriler
</div>

<div class="nav" onclick="openPage('ai',this)">
<i class="fa-solid fa-robot"></i>AI
</div>

<div class="nav" onclick="openPage('admin',this)">
<i class="fa-solid fa-shield"></i>Yönetim
</div>
</nav>

</div>

<script>

function login(){
if(document.getElementById("key").value==="baba"){
document.getElementById("gate").style.display="none";
document.getElementById("panel").style.display="flex";
}
}

function openPage(id,el){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";

document.querySelectorAll(".nav").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
}

</script>

</body>
</html>
