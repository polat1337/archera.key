<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --bg: #030712; --accent: #00d2ff; --panel: #0d111c; --border: #1f2937; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: white; overflow-x: hidden; height: 100vh; }

        /* --- GİRİŞ EKRANI --- */
        #login-page {
            display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw;
        }
        .login-card {
            background: var(--panel); border: 1px solid var(--border); border-radius: 24px;
            padding: 40px 30px; width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .login-card h1 { font-family: 'Space Grotesk', sans-serif; letter-spacing: 5px; font-size: 2rem; margin-bottom: 10px; }
        .login-card p { color: #64748b; font-size: 0.75rem; font-weight: 800; margin-bottom: 30px; letter-spacing: 1px; }
        .field { position: relative; margin-bottom: 20px; }
        .field i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--accent); }
        .field input {
            width: 100%; background: #010409; border: 1px solid var(--border); border-radius: 12px;
            padding: 16px 16px 16px 50px; color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .field input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 210, 255, 0.1); }
        .btn-enter {
            width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 12px;
            color: #000; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
        }
        .req { margin-top: 25px; font-size: 0.8rem; color: #64748b; font-weight: 700; }
        .req a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent); }

        /* --- DASHBOARD EKRANI --- */
        #dashboard-page { display: none; flex-direction: column; height: 100vh; }
        header {
            padding: 20px; background: var(--panel); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo-text { font-family: 'Space Grotesk', sans-serif; color: var(--accent); font-size: 1.1rem; letter-spacing: 2px; }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .st-card { background: var(--panel); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 12px; padding: 15px; }
        .st-label { font-size: 0.6rem; color: #64748b; font-weight: 800; text-transform: uppercase; }
        .st-val { font-size: 1rem; font-weight: 800; margin-top: 5px; font-family: 'Space Grotesk'; }

        .content { padding: 0 20px; flex: 1; }
        .box { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; padding: 25px; }
        .box input {
            width: 100%; background: #010409; border: 1px solid var(--border); border-radius: 10px;
            padding: 15px; color: white; margin: 15px 0; outline: none;
        }
        .btn-query {
            width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 10px;
            color: #000; font-weight: 800; text-transform: uppercase; cursor: pointer;
        }

        /* ALT MENÜ - KESİN ÇÖZÜM */
        nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 80px;
            background: #05070a; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 999;
        }
        .nav-link { text-decoration: none; color: #4b5563; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .nav-link.active { color: var(--accent); filter: drop-shadow(0 0 5px var(--accent)); }
        .nav-link i { font-size: 24px; }
        .nav-link span { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <h1>ARCHERA</h1>
            <p>TERMINAL ACCESS</p>
            <div class="field">
                <i class="material-icons-round">vpn_key</i>
                <input type="password" id="passInput" placeholder="Access Key">
            </div>
            <button class="btn-enter" onclick="validate()">SISTEME BAGLAN</button>
            <div class="req">Anahtarın yok mu? <a href="https://instagram.com/pxlat" target="_blank">Talep Et @pxlat</a></div>
        </div>
    </div>

    <div id="dashboard-page">
        <header>
            <div class="logo-text">ARCHERA CORE</div>
            <i class="material-icons-round" style="color: var(--accent);">radar</i>
        </header>

        <div class="stats">
            <div class="st-card"><div class="st-label">Sistem</div><div class="st-val">ONLINE</div></div>
            <div class="st-card"><div class="st-label">Bakiye</div><div class="st-val">994.764 $</div></div>
        </div>

        <div class="content">
            <div class="box">
                <div class="st-label" style="color: var(--accent);">OPERASYONEL SORGULAMA</div>
                <input type="text" placeholder="Hedef kullanıcı/ID girin...">
                <button class="btn-query">SORGULAMAYI BAŞLAT</button>
            </div>
        </div>

        <nav>
            <a href="#" class="nav-link active"><i class="material-icons-round">search</i><span>Sorgula</span></a>
            <a href="#" class="nav-link"><i class="material-icons-round">groups</i><span>Hesaplar</span></a>
            <a href="#" class="nav-link"><i class="material-icons-round">account_tree</i><span>Database</span></a>
            <a href="#" class="nav-link"><i class="material-icons-round">photo_library</i><span>Görüntüler</span></a>
            <a href="#" class="nav-link"><i class="material-icons-round">smart_toy</i><span>AI Chat</span></a>
            <a href="#" class="nav-link" onclick="location.reload()"><i class="material-icons-round">logout</i><span>Çıkış</span></a>
        </nav>
    </div>

    <script>
        function validate() {
            const key = document.getElementById('passInput').value;
            if(key === "reis") {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dashboard-page').style.display = 'flex';
            } else {
                alert("ERİŞİM REDDEDİLDİ!");
            }
        }
    </script>
</body>
</html>
