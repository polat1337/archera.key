<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUROSINT | ARCHERA PRESTIGE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@300;600;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #e63946; --gold: #ffcc00; --bg: #000; --surface: rgba(10, 10, 10, 0.98); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* GİRİŞ EKRANI (İSTEDİĞİN O SEKSİ LOGOLU YER) */
        #auth-gate { 
            position: fixed; inset: 0; background: #000; 
            display: flex; align-items: center; justify-content: center; z-index: 100000; 
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .auth-card { 
            width: 88%; max-width: 420px; padding: 50px 30px; 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 50px; text-align: center; position: relative;
            box-shadow: 0 0 60px rgba(230, 57, 70, 0.1);
        }

        /* BUTON ÜSTÜNDEKİ SİSTEM LOGOSU */
        .system-logo-wrap {
            position: relative; width: 140px; height: 140px; margin: 0 auto 30px;
        }
        .system-logo {
            width: 100%; height: 100%; border-radius: 50%;
            border: 2px solid var(--primary); padding: 6px;
            object-fit: cover; filter: drop-shadow(0 0 15px var(--primary));
            animation: logoFloat 3s infinite ease-in-out;
        }
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .auth-title { 
            font-family: 'Montserrat'; font-size: 1.6rem; letter-spacing: 10px; 
            margin-bottom: 35px; color: #fff; text-transform: uppercase;
        }

        .auth-input { 
            width: 100%; background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); color: var(--primary); 
            padding: 22px; text-align: center; font-family: 'JetBrains Mono'; 
            font-size: 1.8rem; letter-spacing: 15px; border-radius: 25px; 
            outline: none; margin-bottom: 25px; transition: 0.3s;
        }

        .btn-auth { 
            width: 100%; background: var(--primary); color: #fff; border: none; 
            padding: 20px; border-radius: 22px; font-weight: 900; 
            font-size: 12px; letter-spacing: 3px; text-transform: uppercase; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 30px rgba(230, 57, 70, 0.2);
        }

        /* PANEL YAPISI */
        #panel { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1s; }
        .workspace { flex: 1; padding: 40px 25px; overflow-y: auto; padding-bottom: 110px; }
        
        .archera-header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .archera-name { font-family: 'Montserrat'; font-size: 2.3rem; font-weight: 900; letter-spacing: -1.5px; background: linear-gradient(to right, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* ALT NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 95px; background: rgba(5,5,5,0.98); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 9999; padding-bottom: 20px; }
        .nav-item { color: #444; text-align: center; flex: 1; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.4rem; }
        .nav-item span { font-size: 7px; font-weight: 900; text-transform: uppercase; }

        .tab-pane { display: none; }
        .tab-pane.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* YÖNETİM PANELİ KARTI */
        .admin-card { background: #0a0a0a; border: 1px solid var(--gold); border-radius: 30px; padding: 25px; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card">
            <div class="system-logo-wrap">
                <img src="24841.jpg" class="system-logo" onerror="this.src='https://via.placeholder.com/140?text=ARCHERA'">
            </div>
            
            <h1 class="auth-title">SUROSINT</h1>
            
            <input type="password" id="access-key" class="auth-input" placeholder="••••">
            
            <button onclick="login()" class="btn-auth">
                <i class="fas fa-shield-alt"></i> SİSTEME GİRİŞ YAP
            </button>
        </div>
    </div>

    <div id="panel">
        <main class="workspace">
            <div class="archera-header">
                <h1 class="archera-name">ARCHERA</h1>
                <div style="display:flex; align-items:center; gap:8px; margin-top:5px;">
                    <i class="fas fa-crown" style="color:var(--gold); font-size:18px; filter:drop-shadow(0 0 8px var(--gold));"></i>
                    <span style="font-size:10px; color:var(--gold); font-weight:900; letter-spacing:3px;">SYSTEM OWNER</span>
                </div>
            </div>

            <div id="intel" class="tab-pane active">
                <div style="background:#0a0a0a; border:1px solid var(--border); border-radius:25px; padding:15px; margin-bottom:25px;">
                    <input type="text" id="masterSearch" placeholder="Target Username..." style="width:100%; background:transparent; border:none; color:#fff; text-align:center; outline:none;">
                </div>
                <button onclick="runScan()" class="btn-auth" style="background:var(--primary);">TARAMAYI BAŞLAT</button>
            </div>

            <div id="vault" class="tab-pane"><h2>Story Archive</h2></div>
            <div id="leak" class="tab-pane"><h2>Database</h2></div>
            <div id="ai" class="tab-pane"><h2>AI Chat</h2></div>

            <div id="admin" class="tab-pane">
                <h2 style="color:var(--gold); margin-bottom:20px; letter-spacing:2px;">OPERATIONS</h2>
                <div class="admin-card">
                    <input type="text" id="add-n" placeholder="Agent Name" style="width:100%; background:#000; border:1px solid #333; padding:15px; border-radius:15px; color:#fff; margin-bottom:10px;">
                    <input type="text" id="add-k" placeholder="Key" style="width:100%; background:#000; border:1px solid #333; padding:15px; border-radius:15px; color:#fff; margin-bottom:20px;">
                    <button onclick="addAgent()" class="btn-auth" style="background:var(--gold); color:#000;">YETKİLENDİR</button>
                </div>
                <div id="agent-list"></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('intel', this)"><i class="fas fa-crosshairs"></i><span>Hedef</span></div>
            <div class="nav-item" onclick="switchTab('vault', this)"><i class="fas fa-circle-notch"></i><span>Storyler</span></div>
            <div class="nav-item" onclick="switchTab('leak', this)"><i class="fas fa-server"></i><span>Veri</span></div>
            <div class="nav-item" onclick="switchTab('ai', this)"><i class="fas fa-robot"></i><span>Ai Chat</span></div>
            <div id="admin-nav" class="nav-item" style="display:none;" onclick="switchTab('admin', this)"><i class="fas fa-user-shield"></i><span>Yönetim</span></div>
        </nav>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('surosint_users')) || {
            "baba": { name: "ARCHERA", role: "Owner" }
        };

        function login() {
            const key = document.getElementById('access-key').value;
            if(users[key]) {
                if(users[key].role === "Owner") {
                    document.getElementById('admin-nav').style.display = 'flex';
                    renderAgents();
                }
                document.getElementById('auth-gate').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-gate').style.display = 'none';
                    document.getElementById('panel').style.display = 'flex';
                    setTimeout(() => document.getElementById('panel').style.opacity = '1', 50);
                }, 800);
            } else { alert('ERİŞİM REDDEDİLDİ'); }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function addAgent() {
            const n = document.getElementById('add-n').value;
            const k = document.getElementById('add-k').value;
            if(n && k) {
                users[k] = { name: n, role: "Agent" };
                localStorage.setItem('surosint_users', JSON.stringify(users));
                renderAgents();
                alert('Ajan Eklendi');
            }
        }

        function renderAgents() {
            const list = document.getElementById('agent-list');
            list.innerHTML = '';
            for(let k in users) {
                list.innerHTML += `<div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${users[k].name}</span>
                    ${k !== 'baba' ? `<i class="fas fa-times" onclick="delAgent('${k}')" style="color:red"></i>` : '<i class="fas fa-crown" style="color:var(--gold)"></i>'}
                </div>`;
            }
        }

        function delAgent(k) {
            delete users[k];
            localStorage.setItem('surosint_users', JSON.stringify(users));
            renderAgents();
        }
    </script>
</body>
</html>
