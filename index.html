<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --bg: #030712; --accent: #00d2ff; --card: #0d111c; --border: #1f2937; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px 30px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; letter-spacing: 5px; margin: 0 0 10px; color: #fff; }
        p { color: #64748b; font-size: 0.75rem; font-weight: 800; letter-spacing: 1px; margin-bottom: 30px; }
        .field { position: relative; margin-bottom: 25px; }
        .field i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--accent); }
        input { width: 100%; background: #010409; border: 1px solid var(--border); border-radius: 12px; padding: 16px 16px 16px 50px; color: white; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 210, 255, 0.1); }
        .btn-go { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 12px; color: #000; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .btn-go:hover { filter: brightness(1.1); box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); }
        .req { margin-top: 25px; font-size: 0.8rem; color: #64748b; font-weight: 700; }
        .req a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent); }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>ARCHERA</h1>
        <p>TERMINAL ACCESS</p>
        <div class="field">
            <i class="material-icons-round">vpn_key</i>
            <input type="password" id="k" placeholder="Access Key">
        </div>
        <button class="btn-go" onclick="l()">SISTEME BAGLAN</button>
        <div class="req">Anahtarın yok mu? <a href="https://instagram.com/pxlat" target="_blank">Talep Et</a></div>
    </div>
    <script>
        function l(){ if(document.getElementById('k').value === "reis") { window.location.href="dashboard.html"; } else { alert("HATALI!"); } }
    </script>
</body>
</html>
