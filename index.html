<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHERA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

<style>

:root {
    --bg: #07080c;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #eaeaf0;
    --muted: #8b8fa3;
    --accent: #7c6cff;
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: radial-gradient(circle at top, #11121a, #050507);
    color: var(--text);
    height:100vh;
    overflow:hidden;
}

/* soft glow bg */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(124,108,255,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(124,108,255,0.05), transparent 40%);
    z-index:-1;
}

/* LOGIN */
#gatekeeper {
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    backdrop-filter: blur(10px);
}

.gate-card {
    width:90%;
    max-width:350px;
    padding:50px 30px;
    border-radius:16px;
    background:var(--card);
    border:1px solid var(--border);
    backdrop-filter: blur(25px);
    text-align:center;
}

.gate-card h1 {
    font-family:'Space Grotesk';
    letter-spacing:6px;
    margin-bottom:10px;
}

.gate-card p {
    font-size:0.7rem;
    color:var(--muted);
    margin-bottom:30px;
}

.key-input {
    width:100%;
    padding:15px;
    border-radius:10px;
    border:1px solid var(--border);
    background:transparent;
    color:white;
    text-align:center;
    margin-bottom:15px;
}

.enter-btn {
    width:100%;
    padding:15px;
    border-radius:10px;
    border:none;
    background:var(--accent);
    color:white;
    cursor:pointer;
}

/* MAIN */
#main-shell {
    display:none;
    height:100vh;
    flex-direction:column;
}

header {
    padding:20px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid var(--border);
}

.view-port {
    flex:1;
    padding:20px;
    overflow:auto;
}

/* CARD */
.glass-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
}

/* INPUT */
.smm-input {
    width:100%;
    padding:15px;
    border-radius:10px;
    border:1px solid var(--border);
    background:transparent;
    color:white;
    margin-bottom:10px;
}

/* BTN */
.action-btn {
    width:100%;
    padding:15px;
    border-radius:10px;
    border:none;
    background:linear-gradient(135deg,#7c6cff,#5a4fff);
    color:white;
}

/* RESULT */
.res-grid {
    margin-top:20px;
    display:none;
}

.res-row {
    padding:10px;
    border-bottom:1px solid var(--border);
    font-size:0.85rem;
}

/* NAV */
nav {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    height:65px;
    border-top:1px solid var(--border);
    background:rgba(10,10,15,0.6);
}

.nav-link {
    flex:1;
    text-align:center;
    font-size:0.7rem;
    color:var(--muted);
    display:flex;
    align-items:center;
    justify-content:center;
}

.nav-link.active {
    color:white;
}

</style>
</head>

<body>

<div id="gatekeeper">
    <div class="gate-card">
        <h1>ARCHERA</h1>
        <p>INTEL CORE</p>
        <input type="password" id="gateKey" class="key-input">
        <button class="enter-btn" onclick="tryLogin()">GİRİŞ</button>
    </div>
</div>

<div id="main-shell">

<header>
    <div>ARCHERA</div>
    <div style="font-size:0.7rem;color:#7cffc4;">ONLINE</div>
</header>

<div class="view-port">

<div id="mod-sorgu" class="module active">
    <div class="glass-card">
        <input id="targetInput" class="smm-input" placeholder="kullanıcı adı">
        <button class="action-btn" onclick="executeSorgu()">ANALİZ</button>

        <div id="resBox" class="res-grid">
            <div class="res-row">AD: <span id="res-name"></span></div>
        </div>
    </div>
</div>

</div>

<nav>
<div class="nav-link active" onclick="switchTab('mod-sorgu', this)">Sorgu</div>
</nav>

</div>

<script>

function tryLogin(){
    if(document.getElementById('gateKey').value === "baba"){
        document.getElementById('gatekeeper').style.display="none";
        document.getElementById('main-shell').style.display="flex";
    }
}

function executeSorgu(){
    let val = document.getElementById("targetInput").value;
    if(!val) return;
    document.getElementById("resBox").style.display="block";
    document.getElementById("res-name").innerText = val;
}

function switchTab(id, el){
    document.querySelectorAll('.nav-link').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
}

</script>

</body>
</html>
