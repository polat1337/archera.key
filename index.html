<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #0d1117; --primary: #6366f1; --border: #30363d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        
        .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px 30px; width: 90%; max-width: 380px; text-align: center; }
        h1 { font-size: 1.8rem; letter-spacing: 3px; margin: 0 0 10px; }
        p { color: #8b949e; font-size: 0.8rem; margin-bottom: 30px; }
        
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group input { width: 100%; background: #010409; border: 1px solid var(--border); border-radius: 12px; padding: 15px 15px 15px 50px; color: white; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #64748b; }
        
        .btn-enter { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-enter:hover { filter: brightness(1.2); box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
        
        .request-link { margin-top: 25px; font-size: 0.85rem; color: #8b949e; }
        .request-link a { color: var(--primary); text-decoration: none; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-box">
    <h1>ARCHERA</h1>
    <p>SİSTEME ERİŞİM İÇİN ANAHTAR GİRİN</p>
    
    <div class="input-group">
        <i class="material-icons-round">vpn_key</i>
        <input type="password" id="key" placeholder="Access Key">
    </div>
    
    <button class="btn-enter" onclick="checkKey()">SİSTEME GİRİŞ YAP</button>
    
    <div class="request-link">
        Anahtarın yok mu? <a href="https://instagram.com/pxlat" target="_blank">Talep Et @pxlat</a>
    </div>
</div>

<script>
    function checkKey() {
        const input = document.getElementById('key').value;
        if(input === "reis") {
            // Başarılı girişte dashboard.html dosyasına yönlendirir
            window.location.href = "dashboard.html";
        } else {
            alert("GEÇERSİZ ERİŞİM ANAHTARI!");
        }
    }
</script>

</body>
</html>
