<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | OSINT TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Outfit:wght@300;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #00d2ff; --secondary: #0072ff; --bg: #050a15; 
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(0, 210, 255, 0.2); 
            --text: #e0f2fe; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        #canvas-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a1931 0%, #050a15 100%); }

        #auth-gate { 
            position: fixed; inset: 0; z-index: 100000; display: flex; align-items: center; justify-content: center;
            background: rgba(5, 10, 21, 0.98); transition: 1.5s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .login-box {
            width: 90%; max-width: 450px; padding: 60px 40px; border-radius: 40px;
            background: var(--glass); border: 2px solid var(--border); backdrop-filter: blur(20px);
            text-align: center; box-shadow: 0 0 50px rgba(0, 210, 255, 0.1);
            animation: boxEntry 1s ease-out;
        }
        .login-logo {
            width: 130px; height: 130px; border-radius: 50%; margin: 0 auto 30px;
            border: 4px solid var(--accent); padding: 8px; position: relative;
            box-shadow: 0 0 30px var(--accent); animation: pulse 2s infinite;
        }
        .login-logo img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .key-input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            padding: 20px; border-radius: 20px; color: var(--accent); text-align: center;
            font-family: 'JetBrains Mono'; font-size: 1.5rem; letter-spacing: 10px; margin-bottom: 25px;
            outline: none; transition: 0.3s;
        }

        .btn-enter {
            width: 100%; padding: 22px; border-radius: 20px; border: none;
            background: linear-gradient(45deg, var(--secondary), var(--accent));
            color: #fff; font-weight: 800; letter-spacing: 2px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 114, 255, 0.4); transition: 0.3s;
        }

        #panel { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1s; }
        
        .top-bar {
            padding: 25px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.02);
        }
        .user-identity { display: flex; align-items: center; gap: 15px; }
        .user-identity img { width: 45px; height: 45px; border-radius: 12px; border: 1px solid var(--accent); }
        .owner-tag { color: gold; font-size: 12px; font-weight: 900; letter-spacing: 2px; display: flex; align-items: center; gap: 5px; }

        .main-view { flex: 1; padding: 30px 20px; overflow-y: auto; padding-bottom: 120px; }

        .tab-content { display: none; animation: slideIn 0.5s ease-out; }
        .tab-content.active { display: block; }

        .search-container { 
            background: var(--glass); border: 1px solid var(--border); 
            border-radius: 30px; padding: 15px; display: flex; align-items: center; gap: 15px;
            margin-bottom: 25px;
        }
        .search-container input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 1.1rem; }

        .result-card {
            background: var(--glass); border-radius: 25px; padding: 25px;
            border-left: 5px solid var(--accent); margin-bottom: 15px;
        }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: rgba(5, 10, 21, 0.95); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 20px; backdrop-filter: blur(20px); z-index: 1000;
        }
        .nav-item { color: #5b7a9d; text-align: center; cursor: pointer; transition: 0.3s; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); text-shadow: 0 0 10px var(--accent); }
        .nav-item i { font-size: 1.4rem; }
        .nav-item span { font-size: 8px; font-weight: 800; text-transform: uppercase; }

        .chat-box { height: 400px; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; overflow-y: auto; border: 1px solid var(--border); margin-bottom: 15px; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 210, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes boxEntry { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div id="auth-gate">
        <div class="login-box">
            <div class="login-logo"><img src="24841.jpg" alt="ARCHERA"></div>
            <h1 style="font-family:'Orbitron'; letter-spacing:10px; margin-bottom:10px; color:var(--accent);">SUROSINT</h1>
            <p style="font-size:9px; letter-spacing:4px; margin-bottom:40px; color:#5b7a9d;">VIRTUAL INTELLIGENCE INTERFACE</p>
            <input type="password" id="gate-key" class="key-input" placeholder="••••">
            <button onclick="initSystem()" class="btn-enter">SİSTEME GİR <i class="fas fa-sign-in-alt"></i></button>
        </div>
    </div>

    <div id="panel">
        <header class="top-bar">
            <div class="user-identity">
                <img src="24841.jpg">
                <div>
                    <h2 id="current-user-name" style="font-size: 1.1rem; font-weight: 800;">ARCHERA</h2>
                    <div id="role-badge" class="owner-tag"><i class="fas fa-crown"></i> OWNER</div>
                </div>
            </div>
            <div style="color: var(--accent); font-family: 'JetBrains Mono'; font-size: 12px;">v4.0.2-STORM</div>
        </header>

        <main class="main-view">
            <section id="search" class="tab-content active">
                <div class="search-container">
                    <i class="fas fa-fingerprint" style="color:var(--accent)"></i>
                    <input type="text" id="master-query" placeholder="@username veya Ad Soyad...">
                    <button onclick="runGlobalInquiry()" style="background:none; border:none; color:var(--accent); cursor:pointer;"><i class="fas fa-search"></i></button>
                </div>
                <div id="search-results">
                    <p style="text-align:center; color:#5b7a9d; margin-top:50px;">Sorgu için veri giriniz...</p>
                </div>
            </section>

            <section id="accounts" class="tab-content">
                <h2 style="margin-bottom:20px;"><i class="fas fa-users-cog"></i> Takip Merkezi</h2>
                <div id="tracked-logs"></div>
            </section>

            <section id="database" class="tab-content">
                <h2 style="margin-bottom:20px;"><i class="fas fa-database"></i> Osint İzleri</h2>
                <div id="db-results" class="result-card">Hedef bekleniyor...</div>
            </section>

            <section id="vault" class="tab-content">
                <h2 style="margin-bottom:20px;"><i class="fas fa-bravery"></i> Story Merkezi</h2>
                <div id="story-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
            </section>

            <section id="ai" class="tab-content">
                <h2 style="margin-bottom:20px;"><i class="fas fa-brain"></i> AI CORE</h2>
                <div class="chat-box" id="ai-chat-window">
                    <div style="color:var(--accent)">[SYSTEM]: AI Modülü aktif.</div>
                </div>
            </section>

            <section id="admin" class="tab-content">
                <h2 style="color:var(--accent); margin-bottom:25px;"><i class="fas fa-user-shield"></i> Yönetim Paneli</h2>
                <div class="result-card" style="border-left-color: var(--secondary);">
                    <h3 style="margin-bottom:15px; font-size:14px;">OTOMASYON HESABI BAĞLA</h3>
                    <div style="display:flex; gap:10px;">
                        <button onclick="linkNewAccount('Instagram')" class="btn-enter" style="padding:10px; font-size:10px; background:#e1306c;"><i class="fab fa-instagram"></i> INSTAGRAM</button>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('search', this)"><i class="fas fa-search-location"></i><span>Sorgula</span></div>
            <div class="nav-item" onclick="switchTab('accounts', this)"><i class="fas fa-user-friends"></i><span>Hesaplar</span></div>
            <div class="nav-item" onclick="switchTab('database', this)"><i class="fas fa-code-branch"></i><span>Database</span></div>
            <div class="nav-item" onclick="switchTab('vault', this)"><i class="fas fa-camera-retro"></i><span>Görüntüler</span></div>
            <div class="nav-item" onclick="switchTab('ai', this)"><i class="fas fa-robot"></i><span>Ai Chat</span></div>
            <div id="admin-nav-btn" class="nav-item" style="display:none;" onclick="switchTab('admin', this)"><i class="fas fa-user-shield"></i><span>Yönetim</span></div>
        </nav>
    </div>

    <script>
        const RENDER_URL = "https://surosint.onrender.com";
        let members = JSON.parse(localStorage.getItem('archera_v4_users')) || {"baba": { name: "ARCHERA", role: "Owner" }};

        function initSystem() {
            const k = document.getElementById('gate-key').value;
            if(members[k]) {
                const user = members[k];
                document.getElementById('current-user-name').innerText = user.name;
                if(user.role === "Owner") document.getElementById('admin-nav-btn').style.display = 'flex';
                document.getElementById('auth-gate').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-gate').style.display = 'none';
                    document.getElementById('panel').style.display = 'flex';
                    setTimeout(() => document.getElementById('panel').style.opacity = '1', 50);
                }, 1000);
            } else { alert('KEY GECERSIZ'); }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // --- GERÇEK RENDER BAĞLANTISI ---
        async function runGlobalInquiry() {
            const q = document.getElementById('master-query').value.trim();
            if(!q) return;

            const resDiv = document.getElementById('search-results');
            resDiv.innerHTML = `<div class="result-card"><i class="fas fa-sync fa-spin"></i> Render sunucusuna baglaniliyor...</div>`;

            try {
                const response = await fetch(`${RENDER_URL}/api/v4/sorgu`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: q, owner: "ARCHERA" })
                });
                const result = await response.json();

                if(result.status === "success") {
                    const u = result.targets[0];
                    resDiv.innerHTML = `
                        <div class="result-card" style="border-left-color: #00d2ff;">
                            <b>HEDEF:</b> ${u.name}<br>
                            <b>KONUM:</b> ${u.location}<br>
                            <span style="font-size:11px; color:var(--accent)">${u.leaks[0].data}</span>
                        </div>
                    `;
                    document.getElementById('db-results').innerHTML = `<div class="result-card">${u.ai_report}</div>`;
                    document.getElementById('ai-chat-window').innerHTML += `<div>[AI]: ${q} tünellendi.</div>`;
                }
            } catch (e) {
                resDiv.innerHTML = `<div class="result-card" style="color:red">Sunucu uyanıyor, 20sn bekle kanka.</div>`;
            }
        }

        async function linkNewAccount(platform) {
            const user = prompt(platform + " Kullanici Adi:");
            const pass = prompt(platform + " Sifre:");
            if(!user || !pass) return;

            try {
                const response = await fetch(`${RENDER_URL}/api/v4/auth/link`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ platform, username: user, password: pass })
                });
                const res = await response.json();
                if(res.status === "success") alert("Basariyla Baglandi: " + user);
            } catch (e) { alert("Sunucu Hatasi!"); }
        }

        // Background
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function draw() { ctx.fillStyle = "rgba(5,10,21,0.2)"; ctx.fillRect(0,0,canvas.width,canvas.height); requestAnimationFrame(draw); }
        draw();
    </script>
</body>
</html>
