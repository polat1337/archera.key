<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | SYSTEM LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --bg: #000000; --accent: #ffffff; --border: #222; --input-bg: #0a0a0a; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: #fff; }
        
        .login-card { width: 90%; max-width: 350px; text-align: center; }
        .logo-box h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: 10px; font-size: 2.5rem; margin-bottom: 5px; }
        .logo-box p { font-size: 0.6rem; color: #666; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }

        .field { position: relative; margin-bottom: 20px; }
        .field i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #444; font-size: 20px; }
        input { 
            width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 4px; 
            padding: 18px 15px 18px 50px; color: #fff; font-size: 0.9rem; transition: 0.3s;
        }
        input:focus { border-color: #555; background: #0e0e0e; }

        .btn-connect { 
            width: 100%; padding: 18px; background: var(--accent); color: #000; border: none; 
            border-radius: 4px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; 
            cursor: pointer; margin-top: 10px;
        }
        
        .footer-req { margin-top: 35px; font-size: 0.7rem; color: #444; font-weight: 700; letter-spacing: 1px; }
        .footer-req a { color: #fff; text-decoration: none; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-box">
            <h1>ARCHERA</h1>
            <p>Authorized Personnel Only</p>
        </div>
        <div class="field">
            <i class="material-icons-round">security</i>
            <input type="password" id="access_key" placeholder="SECURE KEY">
        </div>
        <button class="btn-connect" onclick="auth()">SİSTEME BAĞLAN</button>
        <div class="footer-req">YETKİ TALEBİ: <a href="https://instagram.com/pxlat" target="_blank">@PXLAT</a></div>
    </div>
    <script>
        function auth() {
            if(document.getElementById('access_key').value === "reis") {
                window.location.href = "dashboard.html";
            } else { alert("ACCESS DENIED: INVALID KEY"); }
        }
    </script>
</body>
</html>
