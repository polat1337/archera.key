<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUROSINT | ENCRYPTED ACCESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@300;600;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #e63946; --gold: #ffcc00; --bg: #000; --surface: rgba(10, 10, 10, 0.98); --border: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* GİRİŞ EKRANI (SEKSİ & PREMİUM) */
        #auth-gate { 
            position: fixed; inset: 0; background: #000; 
            display: flex; align-items: center; justify-content: center; z-index: 100000; 
            transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Arka plan siber efekt */
        #auth-gate::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle at center, rgba(230, 57, 70, 0.05) 0%, transparent 70%);
            animation: bgPulse 4s infinite alternate;
        }

        .auth-card { 
            width: 85%; max-width: 420px; padding: 60px 40px; 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 50px; text-align: center; position: relative;
            backdrop-filter: blur(40px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 40px rgba(230, 57, 70, 0.1);
            z-index: 2;
        }

        /* LOGO BÖLÜMÜ */
        .logo-container {
            position: relative; width: 130px; height: 130px; margin: 0 auto 40px;
        }
        .auth-logo { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 3px solid var(--primary); padding: 8px;
            object-fit: cover; position: relative; z-index: 3;
            filter: drop-shadow(0 0 15px rgba(230, 57, 70, 0.5));
        }
        .logo-ring {
            position: absolute; inset: -10px; border: 2px solid var(--primary);
            border-radius: 50%; opacity: 0.3; animation: spin 8s linear infinite;
        }
        .logo-glow {
            position: absolute; inset: 0; background: var(--primary);
            border-radius: 50%; filter: blur(30px); opacity: 0.15;
            animation: pulse 2s infinite;
        }

        .auth-title { 
            font-family: 'Montserrat'; font-size: 1.6rem; letter-spacing: 8px; 
            margin-bottom: 8px; color: #fff; text-transform: uppercase;
        }
        .auth-subtitle {
            font-size: 9px; color: #555; letter-spacing: 4px; 
            margin-bottom: 45px; text-transform: uppercase; font-weight: 800;
        }

        .auth-input { 
            width: 100%; background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border); color: var(--primary); 
            padding: 22px; text-align: center; font-family: 'JetBrains Mono'; 
            font-size: 1.8rem; letter-spacing: 16px; border-radius: 25px; 
            outline: none; margin-bottom: 30px; transition: 0.4s;
        }
        .auth-input:focus { 
            border-color: var(--primary); background: rgba(230, 57, 70, 0.05);
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.15);
        }

        .btn-auth { 
            width: 100%; background: var(--primary); color: #fff; border: none; 
            padding: 20px; border-radius: 22px; font-weight: 900; 
            font-size: 12px; letter-spacing: 3px; text-transform: uppercase; 
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(230, 57, 70, 0.3); }

        /* ANİMASYONLAR */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.15; } 50% { transform: scale(1.1); opacity: 0.25; } }
        @keyframes bgPulse { from { opacity: 0.3; } to { opacity: 0.7; } }

        /* ANA PANEL (DEĞİŞMEDİ) */
        #panel { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1s; }
        .workspace { flex: 1; padding: 40px 25px; overflow-y: auto; padding-bottom: 110px; }
        .owner-banner { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .owner-name { font-family: 'Montserrat'; font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; background: linear-gradient(to right, #fff, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 95px; background: rgba(5, 5, 5, 0.98); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(20px); z-index: 1000; padding-bottom: 20px; }
        .nav-item { color: #444; text-align: center; flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .nav-item.active { color: var(--primary); }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card">
            <div class="logo-container">
                <div class="logo-glow"></div>
                <div class="logo-ring"></div>
                <img src="24841.jpg" class="auth-logo" onerror="this.src='https://via.placeholder.com/130?text=SURO'">
            </div>
            
            <h1 class="auth-title">SUROSINT</h1>
            <p class="auth-subtitle">Encrypted Terminal v2.5</p>
            
            <input type="password" id="access-key" class="auth-input" placeholder="••••">
            
            <button onclick="unlock()" class="btn-auth">
                <i class="fas fa-shield-virus"></i> SİSTEME SIZ
            </button>
        </div>
    </div>

    <div id="panel">
        <main class="workspace">
            <div class="owner-banner">
                <div class="owner-name-wrap">
                    <span class="owner-name">ARCHERA</span>
                    <div style="display:flex; align-items:center; gap:8px; margin-top:5px;">
                        <i class="fas fa-crown" style="color:var(--gold); font-size:18px; filter:drop-shadow(0 0 5px var(--gold));"></i>
                        <span style="font-size:10px; font-weight:900; color:var(--gold); letter-spacing:3px;">SYSTEM OWNER</span>
                    </div>
                </div>
            </div>

            <div id="intel" class="tab-pane active">
                <div style="background:#0a0a0a; border:1px solid var(--border); border-radius:25px; padding:10px; margin-bottom:30px;">
                    <input type="text" id="masterSearch" placeholder="Target username..." style="width:100%; background:transparent; border:none; color:#fff; padding:20px; text-align:center; outline:none;">
                </div>
                <button onclick="globalInquiry()" class="btn-auth">SORGULA</button>
            </div>
            </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showTab('intel', this)"><i class="fas fa-crosshairs"></i><span>Sorgula</span></div>
            <div class="nav-item"><i class="fas fa-circle-notch"></i><span>Story</span></div>
            <div class="nav-item"><i class="fas fa-database"></i><span>Veri</span></div>
            <div class="nav-item"><i class="fas fa-brain"></i><span>AI Chat</span></div>
            <div id="admin-nav" class="nav-item" style="display:none;"><i class="fas fa-user-shield"></i><span>Yönetim</span></div>
        </nav>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('surosint_users')) || {
            "baba": { name: "ARCHERA", role: "Owner" }
        };

        function unlock() {
            const key = document.getElementById('access-key').value;
            if(users[key]) {
                const user = users[key];
                if(user.role === "Owner") document.getElementById('admin-nav').style.display = 'flex';
                
                document.getElementById('auth-gate').style.transform = 'scale(1.1)';
                document.getElementById('auth-gate').style.opacity = '0';
                
                setTimeout(() => {
                    document.getElementById('auth-gate').style.display = 'none';
                    document.getElementById('panel').style.display = 'flex';
                    setTimeout(() => document.getElementById('panel').style.opacity = '1', 50);
                }, 1000);
            } else { alert('GEÇERSİZ ERİŞİM ANAHTARI'); }
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
