<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | PREMIUM SYSTEM</title>
    <style>
        :root { 
            --accent: #007aff; --bg: #000; --card: rgba(28, 28, 30, 0.8); --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* GİRİŞ EKRANI */
        #gatekeeper { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: 0.5s ease-in-out; }
        .gate-card { width: 85%; max-width: 340px; text-align: center; }
        .gate-card h1 { font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 40px; }
        .key-input { width: 100%; background: var(--card); border: 1px solid var(--border); padding: 20px; color: #fff; border-radius: 20px; font-size: 1.5rem; text-align: center; letter-spacing: 10px; margin-bottom: 20px; outline: none; }
        .enter-btn { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 20px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .enter-btn:hover { background: var(--accent); color: #fff; }

        /* ANA YAPI */
        #main-shell { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 0.5s; }
        header { padding: 25px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 100; flex-shrink: 0; }
        .header-logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; display: flex; justify-content: space-between; align-items: center; }

        /* MODÜL ALANI */
        .view-port { flex-grow: 1; overflow-y: auto; padding: 20px; position: relative; padding-bottom: 120px; }
        .module { display: none; width: 100%; max-width: 500px; margin: 0 auto; }
        .module.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* KART TASARIMI */
        .p-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 30px; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); position: relative; overflow: hidden; }
        .p-card::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--accent); opacity: 0.5; }
        .label { font-size: 0.7rem; color: #888; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: block; }
        
        .premium-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 18px; color: #fff; border-radius: 15px; margin-bottom: 15px; font-size: 1rem; outline: none; transition: 0.3s; }
        .premium-input:focus { border-color: var(--accent); background: rgba(0,122,255,0.05); }
        .action-btn { width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .action-btn:active { transform: scale(0.95); }

        /* ALT NAVİGASYON (HASARSIZ) */
        nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 80px; 
            background: rgba(28, 28, 30, 0.95); border: 1px solid var(--border); border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; backdrop-filter: blur(30px);
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }
        .nav-item { color: #555; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; flex: 1; text-align: center; }
        .nav-item.active { color: #fff; }
        .nav-item svg { width: 26px; height: 26px; margin-bottom: 5px; stroke: currentColor; stroke-width: 2; fill: none; transition: 0.3s; }
        .nav-item span { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        .nav-item.active svg { transform: translateY(-5px); stroke: var(--accent); filter: drop-shadow(0 0 5px var(--accent)); }

        /* SONUÇ ALANI */
        #resBox { margin-top: 25px; display: none; border-top: 1px solid var(--border); padding-top: 20px; }
        .data-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .data-row span { color: #555; font-size: 0.7rem; font-weight: 700; }
        .data-row p { color: var(--accent); font-weight: 700; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gate-card">
            <h1>ARCHERA</h1>
            <input type="password" id="gateKey" class="key-input" placeholder="••••">
            <button class="enter-btn" onclick="tryLogin()">AUTHENTICATE</button>
            <p style="margin-top:20px; font-size:0.6rem; color:#444; font-weight:700;">REQUEST ACCESS @PXLAT</p>
        </div>
    </div>

    <div id="main-shell">
        <header>
            <div class="header-logo">
                <span>ARCHERA</span>
                <span style="font-size:0.6rem; color:var(--accent); border:1px solid var(--accent); padding:4px 10px; border-radius:20px;">SYSTEM LIVE</span>
            </div>
        </header>

        <div class="view-port">
            <div id="mod-sorgu" class="module active">
                <div class="p-card">
                    <span class="label">Intelligence Terminal</span>
                    <input type="text" id="target" class="premium-input" placeholder="Target Identifier...">
                    <button class="action-btn" onclick="runScan()">EXECUTE SCAN</button>
                    
                    <div id="resBox">
                        <div class="data-row"><span>IDENTITY</span><p id="r-name">-</p></div>
                        <div class="data-row"><span>STATUS</span><p>VERIFIED</p></div>
                        <div class="data-row"><span>NODE</span><p>ROUTING...</p></div>
                    </div>
                </div>
            </div>

            <div id="mod-db" class="module">
                <div class="p-card"><span class="label">Database Sync</span><p style="color:#555">Cloud connection pending...</p></div>
            </div>
            <div id="mod-admin" class="module">
                <div class="p-card"><span class="label">System Config</span><input type="text" placeholder="Session Key V2"><button class="action-btn">SAVE</button></div>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="tab('mod-sorgu', this)">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path></svg>
                <span>Sorgu</span>
            </div>
            <div class="nav-item" onclick="tab('mod-db', this)">
                <svg viewBox="0 0 24 24"><path d="M12 21c-4.418 0-8-1.79-8-4V7c0-2.21 3.582-4 8-4s8 1.79 8 4v10c0 2.21-3.582 4-8 4z"></path><path d="M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4"></path><path d="M4 12c0 2.21 3.582 4 8 4s8-1.79 8-4"></path></svg>
                <span>Data</span>
            </div>
            <div class="nav-item" onclick="tab('mod-admin', this)">
                <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"></path><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>
                <span>Panel</span>
            </div>
        </nav>
    </div>

    <script>
        function tryLogin() {
            const k = document.getElementById('gateKey').value;
            if(k === "baba") {
                document.getElementById('gatekeeper').style.opacity = "0";
                document.getElementById('gatekeeper').style.transform = "scale(1.1)";
                setTimeout(() => {
                    document.getElementById('gatekeeper').style.display = "none";
                    document.getElementById('main-shell').style.display = "flex";
                    setTimeout(() => { document.getElementById('main-shell').style.opacity = "1"; }, 50);
                }, 500);
            } else { window.location.href = "https://www.instagram.com/pxlat"; }
        }

        function tab(id, el) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function runScan() {
            const val = document.getElementById('target').value;
            if(!val) return;
            document.getElementById('resBox').style.display = "block";
            document.getElementById('r-name').innerText = val.toUpperCase();
        }
    </script>
</body>
</html>
