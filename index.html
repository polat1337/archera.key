<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUROSINT | ARCHERA EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Outfit:wght@300;600;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #e63946; --gold: #ffcc00; --bg: #000000; --surface: rgba(22, 22, 22, 0.98); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* GİRİŞ EKRANI (FULL LOGO) */
        #auth-gate { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a0000 0%, #000 100%); display: flex; align-items: center; justify-content: center; z-index: 100000; transition: 0.8s; }
        .auth-card { width: 88%; max-width: 400px; padding: 50px 35px; background: var(--surface); border: 1px solid var(--border); border-radius: 40px; text-align: center; backdrop-filter: blur(30px); box-shadow: 0 0 50px rgba(230, 57, 70, 0.2); }
        .main-logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--primary); padding: 5px; margin-bottom: 25px; box-shadow: 0 0 20px var(--primary); }
        .auth-input { width: 100%; background: rgba(255,255,255,0.03); border: 1.5px solid var(--border); color: var(--primary); padding: 20px; text-align: center; font-family: 'JetBrains Mono'; font-size: 1.6rem; letter-spacing: 12px; border-radius: 25px; outline: none; margin-bottom: 30px; }
        .btn-premium { width: 100%; background: var(--primary); color: #fff; border: none; padding: 18px; border-radius: 20px; font-weight: 800; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* ANA PANEL */
        #panel { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1s; }
        .workspace { flex: 1; padding: 30px 25px; overflow-y: auto; padding-bottom: 110px; }

        /* OWNER PROFILE (ARCHERA) */
        .owner-profile { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 35px; padding: 25px; display: flex; align-items: center; gap: 20px; margin-bottom: 30px; position: relative; }
        .owner-avatar-wrap { position: relative; width: 70px; height: 70px; }
        .owner-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        .crown-icon { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 26px; filter: drop-shadow(0 0 10px var(--gold)); animation: crownFloat 2s infinite ease-in-out; }
        @keyframes crownFloat { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-6px); } }
        .owner-info h3 { font-family: 'Montserrat'; font-size: 1.3rem; display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }
        .owner-badge { background: var(--gold); color: #000; font-size: 9px; font-weight: 900; padding: 3px 10px; border-radius: 6px; text-transform: uppercase; }

        /* PREMIUM SEKMELER */
        .tab-pane { display: none; }
        .tab-pane.active { display: block; animation: tabFade 0.5s ease; }
        @keyframes tabFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .search-area { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 25px; padding: 15px; margin-bottom: 30px; }
        .search-area input { width: 100%; background: transparent; border: none; color: #fff; padding: 12px; font-size: 14px; outline: none; text-align: center; }
        
        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 22px; border-radius: 25px; border-left: 4px solid var(--primary); margin-bottom: 15px; }
        .vault-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .story-item { aspect-ratio: 9/16; background: #111; border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
        .story-item img { width: 100%; height: 100%; object-fit: cover; }

        /* SEKSİ ALT MENÜ (FULL NAV) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(10, 10, 10, 0.98); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(25px); z-index: 1000; padding-bottom: 15px; }
        .nav-link { color: #555; text-align: center; flex: 1; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-link i { font-size: 1.4rem; }
        .nav-link span { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-link.active { color: var(--primary); filter: drop-shadow(0 0 8px var(--primary)); }

        /* ADMIN PANEL ÖZEL */
        .admin-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card">
            <img src="24841.jpg" class="main-logo" onerror="this.src='https://via.placeholder.com/100?text=SURO'">
            <h2 style="font-family:'Montserrat'; letter-spacing:4px; margin-bottom:10px;">SUROSINT</h2>
            <p style="font-size: 9px; color: #666; letter-spacing: 3px; margin-bottom: 35px;">ENCRYPTION ACTIVE</p>
            <input type="password" id="access-key" class="auth-input" placeholder="••••">
            <button onclick="unlock()" class="btn-premium"><i class="fas fa-shield-halved"></i> SİSTEMİ BAŞLAT</button>
        </div>
    </div>

    <div id="panel">
        <main class="workspace">
            <div class="owner-profile">
                <div class="owner-avatar-wrap">
                    <i class="fas fa-crown crown-icon"></i>
                    <img id="user-pfp" src="24841.jpg" class="owner-avatar">
                </div>
                <div class="owner-info">
                    <h3><span id="user-name">---</span> <span id="user-badge" class="owner-badge">USER</span></h3>
                    <p style="font-size: 10px; color: #555;"><i class="fas fa-circle" style="color:#00ff00; font-size:8px;"></i> Terminal Link Active</p>
                </div>
                <img src="24841.jpg" style="width:30px; border-radius:50%; position:absolute; right:25px; opacity:0.3;">
            </div>

            <div id="intel" class="tab-pane active">
                <div class="search-area">
                    <input type="text" id="masterSearch" placeholder="Target Username..." autocomplete="off">
                    <button onclick="globalInquiry()" class="btn-premium">HEDEFİ TARAT</button>
                </div>
                <div id="intel-results" style="display:none;" class="grid">
                    <div class="card"><div id="val-name"></div></div>
                    <div class="card"><div id="val-loc"></div></div>
                </div>
            </div>

            <div id="vault" class="tab-pane">
                <h2 style="margin-bottom:20px; font-family:'Montserrat';">STORY VAULT</h2>
                <div id="vault-results" class="vault-grid"></div>
            </div>

            <div id="leak" class="tab-pane">
                <h2 style="margin-bottom:20px; font-family:'Montserrat';">DATABASE LEAKS</h2>
                <div id="leak-results" class="grid"></div>
            </div>

            <div id="ai" class="tab-pane">
                <h2 style="margin-bottom:20px; font-family:'Montserrat';">AI CORE ANALYZER</h2>
                <div class="card"><div class="card-value" id="ai-results">Veri girişi bekleniyor...</div></div>
            </div>

            <div id="admin" class="tab-pane">
                <h2 style="margin-bottom:20px; font-family:'Montserrat'; color:var(--gold);">CONTROL CENTER</h2>
                <div class="card" style="border-left-color: var(--gold);">
                    <input type="text" id="new-user-name" style="width:100%; background:transparent; border:1px solid #333; padding:12px; border-radius:15px; color:#fff; margin-bottom:10px;" placeholder="İsim">
                    <input type="text" id="new-user-key" style="width:100%; background:transparent; border:1px solid #333; padding:12px; border-radius:15px; color:#fff; margin-bottom:15px;" placeholder="Key">
                    <button onclick="addUser()" class="btn-premium" style="background:var(--gold); color:#000;">YETKİ VER</button>
                </div>
                <div id="user-list-container"></div>
            </div>

        </main>

        <nav class="bottom-nav">
            <div class="nav-link active" onclick="showTab('intel', this)"><i class="fas fa-crosshairs"></i><span>Sorgula</span></div>
            <div class="nav-link" onclick="showTab('vault', this)"><i class="fas fa-camera-retro"></i><span>Storyler</span></div>
            <div class="nav-link" onclick="showTab('leak', this)"><i class="fas fa-server"></i><span>Veri</span></div>
            <div class="nav-link" onclick="showTab('ai', this)"><i class="fas fa-robot"></i><span>Ai Chat</span></div>
            <div id="admin-nav" class="nav-link" style="display:none;" onclick="showTab('admin', this)"><i class="fas fa-user-shield"></i><span>Yönetim</span></div>
        </nav>
    </div>

    <script>
        // ARCHERA TANIMLAMA VE HAFIZA
        let users = JSON.parse(localStorage.getItem('surosint_users')) || {
            "baba": { name: "Archera", role: "Owner", pfp: "24841.jpg" }
        };

        function unlock() {
            const key = document.getElementById('access-key').value;
            if(users[key]) {
                const user = users[key];
                document.getElementById('user-name').innerText = user.name;
                document.getElementById('user-badge').innerText = user.role;
                document.getElementById('user-pfp').src = user.pfp || "24841.jpg";

                if(user.role === "Owner") {
                    document.getElementById('admin-nav').style.display = 'flex';
                    renderUsers();
                }

                document.getElementById('auth-gate').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-gate').style.display = 'none';
                    document.getElementById('panel').style.display = 'flex';
                    setTimeout(() => document.getElementById('panel').style.opacity = '1', 50);
                }, 800);
            } else { alert('ERİŞİM REDDEDİLDİ'); }
        }

        function addUser() {
            const name = document.getElementById('new-user-name').value;
            const key = document.getElementById('new-user-key').value;
            if(name && key) {
                users[key] = { name: name, role: "Agent", pfp: "https://via.placeholder.com/100" };
                localStorage.setItem('surosint_users', JSON.stringify(users));
                renderUsers();
                alert('Ajan sisteme eklendi.');
            }
        }

        function renderUsers() {
            const container = document.getElementById('user-list-container');
            container.innerHTML = '';
            for(let key in users) {
                container.innerHTML += `
                    <div class="admin-item">
                        <span>${users[key].name} (${key})</span>
                        ${key !== 'baba' ? `<i class="fas fa-times" onclick="deleteUser('${key}')" style="color:red;"></i>` : '<i class="fas fa-check" style="color:var(--gold);"></i>'}
                    </div>
                `;
            }
        }

        function deleteUser(key) {
            delete users[key];
            localStorage.setItem('surosint_users', JSON.stringify(users));
            renderUsers();
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function globalInquiry() {
            const query = document.getElementById('masterSearch').value.trim().toLowerCase();
            if(!query) return;
            try {
                const response = await fetch('database.json?v=' + Date.now());
                const data = await response.json();
                const target = data.targets.find(t => t.username.toLowerCase() === query);
                if(target) {
                    document.getElementById('intel-results').style.display = 'grid';
                    document.getElementById('val-name').innerText = "HEDEF: " + target.name.toUpperCase();
                    document.getElementById('val-loc').innerText = "LOKASYON: " + target.location;
                    document.getElementById('leak-results').innerHTML = target.leaks.map(l => `<div class="card"><b>${l.type}:</b> ${l.data}</div>`).join('');
                    document.getElementById('vault-results').innerHTML = target.stories.map(s => `<div class="story-item"><img src="${s}"></div>`).join('');
                    document.getElementById('ai-results').innerText = target.ai_report;
                } else { alert("Veri bulunamadı."); }
            } catch (e) { alert("Sistem hatası."); }
        }
    </script>
</body>
</html>
