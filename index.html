<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHERA | OSINT TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Outfit:wght@300;800&display=swap" rel="stylesheet">
    <style>
        /* Senin o sevdiğin CSS kodlarının tamamı burada varsayıyorum */
        :root { --accent: #00d2ff; --bg: #050a15; --border: rgba(0, 210, 255, 0.2); }
        body { background: var(--bg); color: #e0f2fe; font-family: 'Outfit'; margin: 0; overflow: hidden; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #auth-gate { position: fixed; inset: 0; background: #050a15; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .box { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 20px; border: 1px solid var(--border); text-align: center; width: 90%; max-width: 400px; }
        .key-input { width: 100%; padding: 15px; margin-bottom: 20px; background: #000; border: 1px solid var(--border); color: var(--accent); border-radius: 10px; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #0072ff, #00d2ff); border: none; color: #fff; font-weight: 800; border-radius: 10px; cursor: pointer; }
        #panel { display: none; height: 100vh; flex-direction: column; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div><p id="l-txt" style="color:var(--accent); margin-top:15px;">SIZILIYOR...</p></div>

    <div id="auth-gate">
        <div class="box">
            <h2 style="font-family:'Orbitron'; color:var(--accent);">SUROSINT</h2>
            <input type="password" id="gate-key" class="key-input" placeholder="PASSKEY">
            <button onclick="init()" class="btn">SISTEME GIR</button>
        </div>
    </div>

    <div id="panel">
        <div style="padding:20px; border-bottom:1px solid var(--border); font-weight:800;">ARCHERA TERMINAL</div>
        <div style="flex:1; padding:20px;">
            <button onclick="handleLogin()" class="btn" style="background:#e1306c;">INSTAGRAM BAGLA</button>
            <div id="status" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        const RENDER_URL = "https://surosint.onrender.com";
        function init() { if(document.getElementById('gate-key').value === "baba") { document.getElementById('auth-gate').style.display='none'; document.getElementById('panel').style.display='flex'; } }

        async function handleLogin() {
            const mode = confirm("Session ID ile mi gireceksin? (Daha garanti)");
            let payload = {};

            if(mode) {
                const sid = prompt("Session ID değerini yapıştır:");
                if(!sid) return;
                payload = { sessionid: sid };
            } else {
                const u = prompt("Kullanıcı Adı:");
                const p = prompt("Şifre:");
                if(!u || !p) return;
                payload = { username: u, password: p };
            }

            document.getElementById('loader').style.display='flex';
            try {
                const r = await fetch(`${RENDER_URL}/api/v4/auth/link`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const res = await r.json();
                document.getElementById('loader').style.display='none';

                if(res.status === "challenge") {
                    const code = prompt(res.message + "\n\nKodu buraya yaz (Veya onayladıysan OK yaz):");
                    if(code) {
                        document.getElementById('loader').style.display='flex';
                        const r2 = await fetch(`${RENDER_URL}/api/v4/auth/link`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({...payload, verification_code: code === "OK" ? "confirmed" : code})
                        });
                        const res2 = await r2.json();
                        alert(res2.message);
                    }
                } else {
                    alert(res.message);
                    if(res.status === "success") document.getElementById('status').innerHTML = "<b>DURUM:</b> BAGLI 🔥";
                }
            } catch(e) { alert("Hata oluştu."); document.getElementById('loader').style.display='none'; }
        }
    </script>
</body>
</html>
