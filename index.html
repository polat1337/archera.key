<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUROSINT | ARCHERA v4.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=JetBrains+Mono:wght@500&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --main: #00d2ff; --accent: #0072ff; --bg: #050a10; --card: rgba(10, 20, 35, 0.95); --white: #ffffff; --border: rgba(0, 210, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--white); height: 100vh; overflow: hidden; }

        /* --- GİRİŞ EKRANI (AŞIRI ANİMASYONLU) --- */
        #auth-gate { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100000; transition: 1.5s cubic-bezier(1, 0, 0, 1); }
        .login-box { text-align: center; width: 85%; max-width: 450px; animation: portalIn 1.5s ease; }
        .main-logo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--main); padding: 10px; filter: drop-shadow(0 0 30px var(--main)); animation: pulseLogo 3s infinite ease-in-out; }
        .login-input { width: 100%; background: rgba(0,0,0,0.5); border: 2px solid var(--border); color: var(--main); padding: 25px; border-radius: 30px; text-align: center; font-size: 2rem; letter-spacing: 15px; margin: 30px 0; outline: none; transition: 0.5s; }
        .login-input:focus { border-color: var(--main); box-shadow: 0 0 40px rgba(0, 210, 255, 0.3); }
        .btn-enter { width: 100%; background: linear-gradient(90deg, var(--accent), var(--main)); color: #fff; border: none; padding: 22px; border-radius: 25px; font-weight: 900; letter-spacing: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 10px 40px rgba(0, 114, 255, 0.4); }

        /* --- ANA PANEL --- */
        #panel { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1s; }
        .top-bar { padding: 30px 25px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,210,255,0.05), transparent); }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-family: 'Syncopate'; font-size: 1.4rem; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .role-tag { font-size: 10px; font-weight: 900; letter-spacing: 4px; color: var(--main); margin-top: 5px; opacity: 0.8; }
        
        /* --- WORKSPACE & SEKMELER --- */
        .workspace { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .tab-content { display: none; animation: blurIn 0.6s ease forwards; }
        .tab-content.active { display: block; }
        
        .glass-card { background: var(--card); border: 1px solid var(--border); border-radius: 35px; padding: 25px; margin-bottom: 20px; backdrop-filter: blur(20px); }
        .search-container { position: relative; margin-bottom: 30px; }
        .search-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 20px 60px; border-radius: 25px; color: #fff; font-size: 1.1rem; }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--main); font-size: 1.5rem; }

        /* --- ALT MENÜ --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 100px; background: rgba(5, 10, 20, 0.98); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding-bottom: 25px; z-index: 1000; }
        .nav-link { color: rgba(255,255,255,0.3); text-align: center; flex: 1; cursor: pointer; transition: 0.4s; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .nav-link.active { color: var(--main); transform: translateY(-10px); }
        .nav-link i { font-size: 1.5rem; }
        .nav-link span { font-size: 7px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        /* --- ANİMASYONLAR --- */
        @keyframes pulseLogo { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px var(--main)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 45px var(--main)); } }
        @keyframes portalIn { from { opacity: 0; transform: scale(0.8) translateY(50px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes blurIn { from { filter: blur(20px); opacity: 0; transform: scale(0.95); } to { filter: blur(0); opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="login-box">
            <img src="24865.jpg" class="main-logo" onerror="this.src='https://via.placeholder.com/160/00d2ff/ffffff?text=SUROSINT'">
            <h1 style="font-family:'Syncopate'; margin-top:20px; letter-spacing:10px;">SUROSINT</h1>
            <input type="password" id="gatekey" class="login-input" placeholder="••••">
            <button onclick="bootSystem()" class="btn-enter">
                SİSTEME GİR <i class="fas fa-sign-in-alt"></i>
            </button>
        </div>
    </div>

    <div id="panel">
        <div class="top-bar">
            <div class="user-info">
                <div class="user-name" id="display-name">ARCHERA <i class="fas fa-crown" id="owner-crown" style="color:var(--gold)"></i></div>
                <div class="role-tag" id="display-role">SYSTEM OWNER</div>
            </div>
            <img src="24865.jpg" style="width:45px; height:45px; border-radius:12px; border:1px solid var(--main)">
        </div>

        <main class="workspace">
            <div id="search-tab" class="tab-content active">
                <div class="search-container">
                    <i class="fas fa-fingerprint search-icon"></i>
                    <input type="text" id="targetQuery" class="search-input" placeholder="@kullanici_adi veya isim_soyisim">
                </div>
