<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | STORM OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00d2ff; --bg: #050a15; --card: rgba(10, 25, 49, 0.7); --border: rgba(0, 210, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit'; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER (Resimdeki STORM v4 Yazısı) */
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5,10,21,0.5); }
        
        /* DİNAMİK İÇERİK ALANI */
        main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; position: relative; }
        .module { display: none; animation: slideUp 0.3s ease-out; }
        .module.active { display: block; }

        /* STORM BİLEŞENLERİ */
        .storm-card { background: var(--card); border-radius: 20px; padding: 20px; border-left: 4px solid var(--accent); margin-bottom: 15px; border-top: 1px solid var(--border); backdrop-filter: blur(10px); }
        .inp { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: var(--accent); margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(90deg, #0072ff, #00d2ff); color: #fff; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* AKILLI ALT MENÜ (Dilediğin kadar ekle, kaymaz) */
        nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(5, 10, 21, 0.95); border-top: 1px solid var(--border); display: flex; overflow-x: auto; /* Çok eklenirse kaydırılabilir */ align-items: center; z-index: 100; scrollbar-width: none; }
        .nav-item { min-width: 80px; color: #5b7a9d; text-align: center; font-size: 9px; cursor: pointer; transition: 0.3s; flex: 1; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader"><div style="width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation: spin 1s infinite linear;"></div></div>

    <header>
        <span style="font-family:'Orbitron'; font-size:14px; letter-spacing:2px;">ARCHERA <span style="color:var(--accent);">STORM</span></span>
        <div id="connection-status" style="width:8px; height:8px; background:red; border-radius:50%; box-shadow: 0 0 10px red;"></div>
    </header>

    <main id="app-container">
        <section id="mod-ig" class="module active">
            <div class="storm-card">
                <h3><i class="fab fa-instagram"></i> INSTAGRAM TUNEL</h3>
                <input type="text" id="sid" class="inp" placeholder="Session ID Giriniz...">
                <button onclick="igConnect()" class="btn">SİSTEMİ BAĞLA</button>
            </div>
            <div id="ig-info"></div>
        </section>

        <section id="mod-db" class="module">
            <div class="storm-card">
                <h3><i class="fas fa-database"></i> DEVASA VERİ SORGUSU</h3>
                <input type="text" id="db-query" class="inp" placeholder="TC / İsim / GSM...">
                <button onclick="dbSearch()" class="btn">VERİ TABANINDA ARA</button>
            </div>
            <div id="db-results"></div>
        </section>

        <section id="mod-ai" class="module">
            <div class="storm-card" style="height:300px; overflow-y:auto; font-size:12px;" id="ai-logs">
                <p style="color:#5b7a9d;">Yapay zeka analiz için komut bekliyor...</p>
            </div>
            <div class="storm-card">
                <input type="text" id="ai-in" class="inp" placeholder="Komut yaz...">
                <button class="btn">KOMUTU ÇALIŞTIR</button>
            </div>
        </section>

        </main>

    <nav>
        <div class="nav-item active" onclick="openMod('mod-ig', this)"><i class="fas fa-user-shield"></i>GİRİŞ</div>
        <div class="nav-item" onclick="openMod('mod-db', this)"><i class="fas fa-search"></i>SORGULA</div>
        <div class="nav-item" onclick="openMod('mod-ai', this)"><i class="fas fa-robot"></i>AI ANALİZ</div>
        <div class="nav-item" onclick="alert('Yakında!')"><i class="fas fa-satellite"></i>OSINT</div>
        <div class="nav-item" onclick="alert('Ayarlar')"><i class="fas fa-cog"></i>AYARLAR</div>
    </nav>

    <script>
        const API = "https://surosint.onrender.com/api/v4";

        function openMod(id, el) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function igConnect() {
            const sid = document.getElementById('sid').value;
            toggleLoader(true);
            try {
                const r = await fetch(`${API}/instagram/link`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({sessionid: sid})
                });
                const res = await r.json();
                alert(res.message);
                if(res.status === 'success') document.getElementById('connection-status').style.background = '#00ff00';
            } catch(e) { alert("Hata!"); }
            toggleLoader(false);
        }

        function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    </script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Scrollbar Gizleme */
        nav::-webkit-scrollbar { display: none; }
    </style>
</body>
</html>
