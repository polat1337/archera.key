<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUROSINT | VERİ MERKEZİ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff0000; --bg: #000; --surface: #0a0a0a; --border: #1a1a1a; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #auth-gate { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 99999; }
        .auth-card { width: 90%; max-width: 380px; padding: 40px; background: var(--surface); border: 1px solid var(--border); text-align: center; }
        .auth-input { width: 100%; background: #000; border: 1px solid #222; color: var(--primary); padding: 15px; text-align: center; font-family: 'JetBrains Mono'; font-size: 1.5rem; outline: none; margin-bottom: 20px; }
        .btn-main { width: 100%; background: var(--primary); color: #fff; border: none; padding: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        #panel { display: none; height: 100vh; grid-template-columns: 260px 1fr; }
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid var(--border); font-weight: 900; color: #fff; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 18px 25px; display: flex; align-items: center; gap: 15px; color: #555; text-decoration: none; font-size: 13px; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--primary); background: rgba(255,0,0,0.02); border-right: 3px solid var(--primary); }
        .workspace { padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0d0000 0%, #000 100%); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .search-container { background: #0d0d0d; border: 1px solid #1a1a1a; padding: 10px; display: flex; gap: 10px; margin-bottom: 30px; }
        .search-container input { background: transparent; border: none; color: #fff; padding: 10px; flex-grow: 1; outline: none; font-family: 'JetBrains Mono'; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #080808; border: 1px solid #151515; padding: 20px; border-top: 2px solid var(--primary); }
        .card-label { font-size: 11px; color: #444; font-weight: 800; margin-bottom: 10px; display: block; }
        .card-value { font-family: 'JetBrains Mono'; font-size: 14px; color: #fff; }
        .story-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .story-item { aspect-ratio: 9/16; background: #111; border-radius: 4px; overflow: hidden; }
        .story-item img { width: 100%; height: 100%; object-fit: cover; }
        @media (max-width: 900px) {
            #panel { grid-template-columns: 1fr; }
            .sidebar { position: fixed; bottom: 0; width: 100%; height: 70px; flex-direction: row; z-index: 1000; border-top: 1px solid var(--border); }
            .sidebar-header { display: none; }
            .nav-item { flex-direction: column; padding: 10px; font-size: 9px; flex-grow: 1; justify-content: center; }
            .workspace { padding: 20px; padding-bottom: 90px; }
        }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card">
            <img src="24841.jpg" style="width: 60px; margin-bottom: 20px;">
            <h2>SURUÇ VERİ MERKEZİ</h2>
            <p style="color:#333; font-size:10px; margin-bottom:20px;">ACCESS CONTROL SYSTEM</p>
            <input type="password" id="access-key" class="auth-input" placeholder="••••">
            <button onclick="unlock()" class="btn-main">SİSTEMİ BAŞLAT</button>
        </div>
    </div>

    <div id="panel">
        <aside class="sidebar">
            <div class="sidebar-header"><img src="24841.jpg" style="width:25px;"> SUROSINT</div>
            <div class="nav-list">
                <div class="nav-item active" onclick="showTab('intel', this)"><i class="fas fa-search"></i> HEDEF</div>
                <div class="nav-item" onclick="showTab('leak', this)"><i class="fas fa-database"></i> SIZINTI</div>
                <div class="nav-item" onclick="showTab('vault', this)"><i class="fas fa-archive"></i> STORY</div>
                <div class="nav-item" onclick="showTab('ai', this)"><i class="fas fa-robot"></i> AI</div>
            </div>
        </aside>

        <main class="workspace">
            <div id="intel" class="tab-content active">
                <h1 style="margin-bottom:20px;">MERKEZİ SORGULAMA</h1>
                <div class="search-container">
                    <input type="text" id="masterSearch" placeholder="Kullanıcı adı giriniz...">
                    <button onclick="globalInquiry()" class="btn-main" style="width: auto; padding: 0 25px;">TARA</button>
                </div>
                <div id="intel-results" style="display:none;" class="data-grid">
                    <div class="card"><span class="card-label">KİMLİK</span><div class="card-value" id="val-name"></div></div>
                    <div class="card"><span class="card-label">KONUM</span><div class="card-value" id="val-loc"></div></div>
                </div>
            </div>
            <div id="leak" class="tab-content"><h1>SIZINTI KAYITLARI</h1><div id="leak-results" class="data-grid" style="margin-top:20px;"></div></div>
            <div id="vault" class="tab-content"><h1>STORY ARŞİVİ</h1><div id="vault-results" class="story-gallery" style="margin-top:20px;"></div></div>
            <div id="ai" class="tab-content"><h1>AI ANALİZİ</h1><div id="ai-results" class="card" style="margin-top:20px;"></div></div>
        </main>
    </div>

    <script>
        function unlock() {
            if(document.getElementById('access-key').value === 'baba') {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('panel').style.display = 'grid';
            } else { alert('Hatalı şifre.'); }
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function globalInquiry() {
            const query = document.getElementById('masterSearch').value.trim().toLowerCase();
            if(!query) return;

            try {
                // cache temizleme için milisaniye ekliyoruz
                const response = await fetch('database.json?nocache=' + new Date().getTime());
                if(!response.ok) throw new Error("database.json dosyası bulunamadı (404).");
                
                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch(e) {
                    throw new Error("JSON Dosyasında Yazım Hatası Var! (Virgül veya Tırnak hatası)");
                }

                const target = data.targets.find(t => t.username.toLowerCase() === query);

                if(target) {
                    document.getElementById('intel-results').style.display = 'grid';
                    document.getElementById('val-name').innerText = target.name;
                    document.getElementById('val-loc').innerText = target.location;
                    document.getElementById('leak-results').innerHTML = target.leaks.map(l => `<div class="card"><span class="card-label">${l.type}</span><div class="card-value">${l.data}</div></div>`).join('');
                    document.getElementById('vault-results').innerHTML = target.stories.map(s => `<div class="story-item"><img src="${s}"></div>`).join('');
                    document.getElementById('ai-results').innerHTML = `<div class="card-value">${target.ai_report}</div>`;
                    alert("Veriler Senkronize Edildi.");
                } else {
                    alert("Kullanıcı bulunamadı. JSON'daki 'username' değerini kontrol et.");
                }
            } catch (err) {
                alert("SİSTEM KRİTİK HATA: " + err.message);
            }
        }
    </script>
</body>
</html>
