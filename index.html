<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | ADMIN CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; /* Modern Indigo */
            --bg: #0f172a;      /* Deep Slate Blue */
            --card: #1e293b;    /* Slate Blue */
            --text: #f8fafc;
            --input-bg: #0f172a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Arka Plan: Modern Gradyan ve Blur */
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
            z-index: -1;
        }

        /* Admin Kartı: Daha Geniş ve Kurumsal */
        .admin-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 48px 32px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Üst Başlık: Minimalist & Güçlü */
        .header {
            margin-bottom: 40px;
        }

        .header .icon-box {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            width: 56px; height: 56px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
        }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.75rem;
            margin: 0;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 8px;
        }

        /* Giriş Alanı: Şık Admin Kutuları */
        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-field {
            background: var(--input-bg);
            border: 1.5px solid #334155;
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            width: 100%;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-field:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .input-field input {
            background: transparent; border: none; color: white; width: 100%; outline: none;
            font-family: 'Inter', sans-serif;
        }

        /* Buton: Elite Finish */
        .btn-login {
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            border: none;
            font-size: 1rem;
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        .btn-login:active { transform: scale(0.98); }

        .btn-login:hover {
            filter: brightness(1.1);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        /* Yükleme Ekranı (BEKLE) */
        #loading-overlay {
            display: none;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--card);
            border-radius: 24px;
            z-index: 10;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .spinner-modern {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.05);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-msg {
            margin-top: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--primary);
        }

    </style>
</head>
<body>

<div class="bg-mesh"></div>

<div class="admin-card">
    <div id="loading-overlay">
        <div class="spinner-modern"></div>
        <div class="loading-msg">BEKLE</div>
    </div>

    <div class="header">
        <div class="icon-box">
            <span class="material-icons-round" style="font-size: 32px;">security</span>
        </div>
        <h1>ARCHERA</h1>
        <p>Yönetim Paneline Giriş Yap</p>
    </div>

    <div class="form-group">
        <label>Erişim Anahtarı</label>
        <div class="input-field">
            <span class="material-icons-round" style="font-size: 20px; color: #64748b;">vpn_key</span>
            <input type="password" id="keyInput" placeholder="••••••••">
        </div>
    </div>

    <button class="btn-login" onclick="login()">
        <span>Sisteme Bağlan</span>
        <span class="material-icons-round">arrow_forward</span>
    </button>
</div>

<script>
    function login() {
        const val = document.getElementById('keyInput').value;
        const loader = document.getElementById('loading-overlay');
        
        if(val === "reis") {
            loader.style.display = "flex";
            setTimeout(() => {
                alert("Hoşgeldin Admin. ARCHERA Komuta Merkezi açılıyor.");
                // Dashboard yönlendirme buraya
            }, 2500);
        } else {
            alert("Anahtar reddedildi. Yetkisiz giriş tespiti.");
        }
    }
</script>

</body>
</html>
