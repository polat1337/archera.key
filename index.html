<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUROSINT | DATA CENTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff0000; --bg: #000; --surface: #0a0a0a; --border: #1a1a1a; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #auth-gate { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 99999; }
        .auth-card { width: 90%; max-width: 380px; padding: 40px; background: var(--surface); border: 1px solid var(--border); text-align: center; }
        .auth-input { width: 100%; background: #000; border: 1px solid #222; color: var(--primary); padding: 15px; text-align: center; font-family: 'JetBrains Mono'; font-size: 1.5rem; letter-spacing: 5px; outline: none; margin-bottom: 20px; }
        .btn-main { width: 100%; background: var(--primary); color: #fff; border: none; padding: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        #panel { display: none; height: 100vh; grid-template-columns: 260px 1fr; }
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid var(--border); font-weight: 900; color: #fff; display: flex; align-items: center; gap: 10px; }
        .sidebar-header img { width: 30px; border-radius: 50%; border: 1px solid var(--primary); }
        .nav-item { padding: 18px 25px; display: flex; align-items: center; gap: 15px; color: #555; text-decoration: none; font-size: 13px; font-weight: 700; transition: 0.2s; border-right: 3px solid transparent; cursor: pointer; }
        .nav-item:hover, .nav-item.active { color: var(--primary); background: rgba(255,0,0,0.02); border-right-color: var(--primary); }
        .workspace { padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0d0000 0%, #000 100%); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .search-container { background: #0d0d0d; border: 1px solid #1a1a1a; padding: 10px; display: flex; gap: 10px; margin-bottom: 30px; }
        .search-container input { background: transparent; border: none; color: #fff; padding: 10px; flex-grow: 1; outline: none; font-family: 'JetBrains Mono'; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #080808; border: 1px solid #151515; padding: 20px; border-top: 2px solid var(--primary); }
        .card-label { font-size: 11px; color: #444; font-weight: 800; margin-bottom: 10px; display: block; }
        .card-value { font-family: 'JetBrains Mono'; font-size: 14px; color: #fff; }
        .story-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 20px; }
        .story-item { aspect-ratio: 9/16; background: #111; border: 1px solid #222; border-radius: 8px; overflow: hidden; }
        .story-item img { width: 100%; height: 100%; object-fit: cover; }
        @media (max-width: 900px) {
            #panel { grid-template-columns: 1fr; }
            .sidebar { position: fixed; bottom: 0; width: 100%; height: 70px; flex-direction: row; z-index: 1000; border-top: 1px solid var(--border); }
            .sidebar-header { display: none; }
            .nav-item { flex-direction: column; padding: 10px; font-size: 9px; flex-grow: 1; border-top: 3px solid transparent; justify-content: center; }
            .nav-item.active { border-top-color: var(--primary); }
            .workspace { padding: 20px; padding-bottom: 90px; }
        }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card">
            <img src="24841.jpg" style="width: 60px; margin-bottom: 20px;">
            <h2 style="margin-bottom: 20px; letter-spacing: 2px;">SURUÇ VERİ MERKEZİ</h2>
            <input type="password" id="access-key" class="auth-input" placeholder="••••">
            <button onclick="unlock()" class="btn-main">SİSTEMİ BAŞLAT</button>
        </div>
    </div>

    <div id="panel">
        <aside class="sidebar">
            <div class="sidebar-header"><img src="24841.jpg"> SUROSINT</div>
            <div class="nav-list">
                <div class="nav-item active" onclick="showTab('intel', this)"><i class="fas fa-search"></i> HEDEF ANALİZ</div>
                <div class="nav-item" onclick="showTab('leak', this)"><i class="fas fa-database"></i> VERİ SIZINTISI</div>
                <div class="nav-item" onclick="showTab('vault', this)"><i class="fas fa-archive"></i> STORY VAULT</div>
                <div class="nav-item" onclick="showTab('list', this)"><i class="fas fa-list-ul"></i> TAKİP LİSTESİ</div>
                <div class="nav-item" onclick="showTab('ai', this)"><i class="fas fa-robot"></i> SURUC AI</div>
            </div>
        </aside>

        <main class="workspace">
            <div id="intel" class="tab-content active">
                <h1 style="font-weight: 900; margin-bottom: 30px;">MERKEZİ SORGULAMA</h1>
                <div class="search-container">
                    <input type="text" id="masterSearch" placeholder="Kullanıcı adı giriniz...">
                    <button onclick="globalInquiry()" class="btn-main" style="width: auto; padding: 0 30px;">HEDEFİ TARA</button>
                </div>
                <div id="intel-results" style="display:none;" class="data-grid">
                    <div class="card"><span class="card-label">KİMLİK</span><div class="card-value" id="val-name">-</div></div>
                    <div class="card"><span class="card-label">KONUM</span><div class="card-value" id="val-loc">-</div></div>
                    <div class="card"><span class="card-label">DURUM</span><div class="card-value" style="color:#0f0">AKTİF İZLEME</div></div>
                </div>
            </div>
            <div id="leak" class="tab-content"><h1 style="margin-bottom:20px;">VERİ SIZINTISI</h1><div class="data-grid" id="leak-results"></div></div>
            <div id="vault" class="tab-content"><h1 style="margin-bottom:20px;">STORY VAULT ARŞİVİ</h1><div class="story-gallery" id="vault-results"></div></div>
            <div id="list" class="tab-content"><h1 style="margin-bottom:20px;">TAKİP HAVUZU</h1><div class="card"><div class="card-value" id="track-results">Hedef seçilmedi.</div></div></div>
            <div id="ai" class="tab-content"><h1 style="margin-bottom:20px;">SURUC AI ANALİZ</h1><div class="card" style="border-left: 3px solid var(--primary);"><div class="card-value" id="ai-results" style="line-height: 1.6; color: #aaa;">Veri bekleniyor...</div></div></div>
        </main>
    </div>

    <script>
        function unlock() {
            if(document.getElementById('access-key').value === 'baba') {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('panel').style.display = 'grid';
            } else { alert('Giriş reddedildi.'); }
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function globalInquiry() {
            const query = document.getElementById('masterSearch').value.trim().toLowerCase();
            if(!query) return;

            try {
                const response = await fetch('database.json?v=' + Date.now());
                if (!response.ok) throw new Error("Dosya bulunamadı.");
                const data = await response.json();
                const target = data.targets.find(t => t.username.toLowerCase() === query);

                if(target) {
                    document.getElementById('intel-results').style.display = 'grid';
                    document.getElementById('val-name').innerText = target.name.toUpperCase();
                    document.getElementById('val-loc').innerText = target.location;
                    document.getElementById('leak-results').innerHTML = target.leaks.map(l => `<div class="card"><span class="card-label">${l.type}</span><div class="card-value">${l.data}</div></div>`).join('');
                    document.getElementById('vault-results').innerHTML = target.stories.map(s => `<div class="story-item"><img src="${s}" onerror="this.src='https://via.placeholder.com/150?text=Hata'"></div>`).join('');
                    document.getElementById('track-results').innerText = target.name + " şu an sistem takibinde.";
                    document.getElementById('ai-results').innerText = target.ai_report;
                    alert("Senkronizasyon Başarılı.");
                } else { alert("Hedef bulunamadı."); }
            } catch (e) { alert("Sistem Hatası: database.json dosyasını kontrol et."); }
        }
    </script>
</body>
</html>
