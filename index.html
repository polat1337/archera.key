<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | ULTIMATE OSINT</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { 
            --accent: #00ff41; 
            --bg: #000000; 
            --card-bg: rgba(20, 20, 20, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }

        /* ARKA PLAN GRAFİĞİ */
        .ambient-bg { 
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 10% 10%, rgba(0, 255, 65, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, rgba(0, 255, 65, 0.05) 0%, transparent 40%);
        }

        /* GİRİŞ EKRANI - APPLE STYLE */
        #gatekeeper { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .gate-content { width: 100%; max-width: 340px; text-align: center; }
        .gate-logo { font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 40px; color: #fff; opacity: 0; animation: fadeIn 1s forwards; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(-10px); } }

        .key-box { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            padding: 25px; border-radius: 30px; backdrop-filter: blur(20px);
        }
        .key-input { 
            width: 100%; background: transparent; border: none; color: #fff; 
            font-size: 1.5rem; text-align: center; letter-spacing: 12px; margin-bottom: 20px;
        }
        .enter-btn { 
            width: 100%; padding: 18px; background: #fff; color: #000; font-weight: 700;
            border-radius: 20px; border: none; cursor: pointer; transition: 0.3s;
        }
        .enter-btn:hover { transform: scale(0.95); opacity: 0.9; }
        .req-btn { display: inline-block; margin-top: 25px; font-size: 0.75rem; color: #666; text-decoration: none; font-weight: 600; }

        /* ANA PANEL - MODÜLER YAPI */
        #main-shell { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1s; }
        
        header { 
            padding: 30px 25px; display: flex; justify-content: space-between; align-items: center;
        }
        .brand { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }
        .status-pill { background: rgba(0, 255, 65, 0.1); color: var(--accent); padding: 6px 15px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; border: 1px solid rgba(0, 255, 65, 0.2); }

        .view-port { flex: 1; overflow-y: auto; padding: 0 20px 120px 20px; }
        .module { display: none; }
        .module.active { display: block; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* PREMIUM KARTLAR */
        .p-card { 
            background: var(--card-bg); border: 1px solid var(--border); 
            padding: 30px; border-radius: 35px; backdrop-filter: blur(30px);
            box-shadow: var(--shadow); margin-bottom: 20px;
        }
        .label { font-size: 0.7rem; color: #555; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: block; }
        
        input[type="text"] { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            padding: 20px; color: #fff; border-radius: 20px; font-size: 1rem; margin-bottom: 15px;
        }
        .run-btn { 
            width: 100%; padding: 20px; background: var(--accent); color: #000; 
            border: none; border-radius: 20px; font-weight: 900; cursor: pointer; transition: 0.3s;
        }

        /* FLOATING NAV BAR - OATHNET/MODERN HYBRID */
        nav { 
            position: fixed; bottom: 30px; left: 20px; right: 20px;
            height: 80px; background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .n-item { color: #444; transition: 0.3s; cursor: pointer; text-align: center; }
        .n-item.active { color: #fff; transform: translateY(-5px); }
        .n-item i { font-size: 28px; display: block; }
        .n-item span { font-size: 0.6rem; font-weight: 700; margin-top: 4px; display: block; }

        /* SONUÇ ALANI */
        .res-box { margin-top: 25px; display: none; }
        .data-cell { 
            background: rgba(255,255,255,0.02); padding: 20px; 
            border-radius: 20px; margin-bottom: 10px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .data-cell span { font-size: 0.65rem; color: #666; font-weight: 700; }
        .data-cell p { font-weight: 700; color: var(--accent); font-family: 'SF Pro Display'; }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <div id="gatekeeper">
        <div class="gate-content">
            <h1 class="gate-logo">ARCHERA</h1>
            <div class="key-box">
                <input type="password" id="gateKey" class="key-input" placeholder="••••">
                <button class="enter-btn" onclick="tryLogin()">UNLOCK SYSTEM</button>
            </div>
            <a href="https://www.instagram.com/pxlat" target="_blank" class="req-btn">Key Talep Et & Erişim Al</a>
        </div>
    </div>

    <div id="main-shell">
        <header>
            <div class="brand">ARCHERA</div>
            <div class="status-pill">ENGINE ACTIVE</div>
        </header>

        <div class="view-port">
            <div id="mod-sorgu" class="module active">
                <div class="p-card">
                    <span class="label">Sorgu Terminali</span>
                    <input type="text" id="targetInput" placeholder="Kullanıcı Adı Girin">
                    <button class="run-btn" onclick="executeSorgu()">ANALİZ ET</button>
                    
                    <div id="resBox" class="res-box">
                        <div class="data-cell"><span>HEDEF ADI</span><p id="res-name">-</p></div>
                        <div class="data-cell"><span>GSM / TEL</span><p>VERİ BEKLENİYOR...</p></div>
                        <div class="data-cell"><span>T.C. KİMLİK</span><p>SORGULANIYOR...</p></div>
                    </div>
                </div>
            </div>
            </div>

        <nav>
            <div class="n-item active" onclick="switchTab('mod-sorgu', this)"><i class="material-icons-round">radar</i><span>Sorgu</span></div>
            <div class="n-item" onclick="switchTab('mod-db', this)"><i class="material-icons-round">dns</i><span>Data</span></div>
            <div class="n-item" onclick="switchTab('mod-ai', this)"><i class="material-icons-round">blur_on</i><span>AI</span></div>
            <div class="n-item" onclick="switchTab('mod-admin', this)"><i class="material-icons-round">tune</i><span>Panel</span></div>
        </nav>
    </div>

    <script>
        function tryLogin() {
            const key = document.getElementById('gateKey').value;
            if(key === "baba") {
                document.getElementById('gatekeeper').style.transform = "scale(1.1)";
                document.getElementById('gatekeeper').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('gatekeeper').style.display = "none";
                    document.getElementById('main-shell').style.display = "flex";
                    setTimeout(() => { document.getElementById('main-shell').style.opacity = "1"; }, 100);
                }, 600);
            } else { 
                window.location.href = "https://www.instagram.com/pxlat"; 
            }
        }

        function switchTab(modId, el) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.n-item').forEach(n => n.classList.remove('active'));
            document.getElementById(modId).classList.add('active');
            el.classList.add('active');
        }

        function executeSorgu() {
            document.getElementById('resBox').style.display = "block";
        }
    </script>
</body>
</html>
