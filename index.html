<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUROSINT | ARCHERA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@300;600;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #e63946; --gold: #ffcc00; --bg: #000; --surface: rgba(10, 10, 10, 0.98); --border: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* GİRİŞ EKRANI */
        #auth-gate { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100000; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .auth-card { width: 85%; max-width: 420px; padding: 60px 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; text-align: center; backdrop-filter: blur(40px); box-shadow: 0 0 50px rgba(230, 57, 70, 0.15); }
        .logo-container { position: relative; width: 120px; height: 120px; margin: 0 auto 35px; }
        .auth-logo { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary); padding: 5px; object-fit: cover; filter: drop-shadow(0 0 15px var(--primary)); }
        .logo-ring { position: absolute; inset: -8px; border: 2px solid var(--primary); border-radius: 50%; opacity: 0.3; animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ANA PANEL */
        #panel { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1s; }
        .workspace { flex: 1; padding: 40px 25px; overflow-y: auto; padding-bottom: 120px; }

        /* ARCHERA HEADER */
        .owner-banner { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 35px; }
        .owner-name { font-family: 'Montserrat'; font-size: 2.2rem; font-weight: 900; background: linear-gradient(to right, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .crown-icon { color: var(--gold); filter: drop-shadow(0 0 8px var(--gold)); margin-right: 8px; }

        /* SEKMELER */
        .tab-pane { display: none; animation: slideUp 0.5s ease; }
        .tab-pane.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* KARTLAR VE GİRİŞLER */
        .data-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 25px; border-radius: 25px; margin-bottom: 15px; border-left: 4px solid var(--primary); }
        .btn-action { width: 100%; background: var(--primary); color: #fff; border: none; padding: 18px; border-radius: 20px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
        .admin-box { background: #0a0a0a; border: 1px solid var(--gold); border-radius: 30px; padding: 25px; margin-bottom: 25px; }

        /* ALT NAV (DÜZELTİLDİ) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 95px; background: rgba(5, 5, 5, 0.98); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(20px); z-index: 9999; padding-bottom: 20px; }
        .nav-item { color: #444; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: 0.3s; z-index: 10000; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }
        .nav-item i { font-size: 1.5rem; pointer-events: none; }
        .nav-item span { font-size: 8px; font-weight: 900; text-transform: uppercase; pointer-events: none; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card">
            <div class="logo-container">
                <div class="logo-ring"></div>
                <img src="24841.jpg" class="auth-logo" onerror="this.src='https://via.placeholder.com/120'">
            </div>
            <h1 style="font-family:'Montserrat'; letter-spacing:6px; margin-bottom:40px;">SUROSINT</h1>
            <input type="password" id="access-key" style="width:100%; background:rgba(255,255,255,0.03); border:1px solid var(--border); color:var(--primary); padding:22px; text-align:center; font-family:'JetBrains Mono'; font-size:1.8rem; letter-spacing:15px; border-radius:25px; outline:none; margin-bottom:30px;" placeholder="••••">
            <button onclick="unlock()" class="btn-action">SİSTEME GİR</button>
        </div>
    </div>

    <div id="panel">
        <main class="workspace">
            <div class="owner-banner">
                <span class="owner-name">ARCHERA</span>
                <div style="display:flex; align-items:center; gap:8px; margin-top:5px;">
                    <i class="fas fa-crown crown-icon"></i>
                    <span style="font-size:10px; color:var(--gold); letter-spacing:3px; font-weight:900;">SYSTEM OWNER</span>
                </div>
            </div>

            <div id="intel" class="tab-pane active">
                <div style="background:#0a0a0a; border:1px solid var(--border); border-radius:25px; padding:15px; margin-bottom:25px;">
                    <input type="text" id="masterSearch" placeholder="Kullanıcı Adı Gir..." style="width:100%; background:transparent; border:none; color:#fff; text-align:center; outline:none;">
                </div>
                <button onclick="globalInquiry()" class="btn-action">ANALİZ ET</button>
                <div id="intel-results" style="display:none; margin-top:30px;">
                    <div class="data-card"><div id="val-name"></div></div>
                    <div class="data-card"><div id="val-loc"></div></div>
                </div>
            </div>

            <div id="vault" class="tab-pane">
                <h2 style="margin-bottom:20px;">STORY ARCHIVE</h2>
                <div id="vault-results" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
            </div>

            <div id="leak" class="tab-pane">
                <h2 style="margin-bottom:20px;">BREACH DATABASE</h2>
                <div id="leak-results"></div>
            </div>

            <div id="ai" class="tab-pane">
                <h2 style="margin-bottom:20px;">AI CORE</h2>
                <div class="data-card" id="ai-results">Sorgu bekleniyor...</div>
            </div>

            <div id="admin" class="tab-pane">
                <h2 style="color:var(--gold); margin-bottom:20px;">CONTROL PANEL</h2>
                <div class="admin-box">
                    <input type="text" id="new-name" placeholder="Agent Name" style="width:100%; background:#000; border:1px solid #222; padding:15px; border-radius:15px; color:#fff; margin-bottom:10px;">
                    <input type="text" id="new-key" placeholder="Key" style="width:100%; background:#000; border:1px solid #222; padding:15px; border-radius:15px; color:#fff; margin-bottom:15px;">
                    <button onclick="addUser()" class="btn-action" style="background:var(--gold); color:#000;">EKLE</button>
                </div>
                <div id="user-list"></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('intel', this)"><i class="fas fa-crosshairs"></i><span>Sorgula</span></div>
            <div class="nav-item" onclick="switchTab('vault', this)"><i class="fas fa-circle-notch"></i><span>Story</span></div>
            <div class="nav-item" onclick="switchTab('leak', this)"><i class="fas fa-database"></i><span>Veri</span></div>
            <div class="nav-item" onclick="switchTab('ai', this)"><i class="fas fa-brain"></i><span>Ai Chat</span></div>
            <div id="admin-nav" class="nav-item" style="display:none;" onclick="switchTab('admin', this)"><i class="fas fa-user-shield"></i><span>Yönetim</span></div>
        </nav>
    </div>

    <script>
        // Üye Sistemi ve Hafıza
        let users = JSON.parse(localStorage.getItem('surosint_users')) || {
            "baba": { name: "ARCHERA", role: "Owner" }
        };

        function unlock() {
            const key = document.getElementById('access-key').value;
            if(users[key]) {
                const user = users[key];
                if(user.role === "Owner") {
                    document.getElementById('admin-nav').style.display = 'flex';
                    renderUsers();
                }
                document.getElementById('auth-gate').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-gate').style.display = 'none';
                    document.getElementById('panel').style.display = 'flex';
                    setTimeout(() => document.getElementById('panel').style.opacity = '1', 50);
                }, 1000);
            } else { alert('REDDEDİLDİ'); }
        }

        // TAB GEÇİŞ FONKSİYONU (DÜZELTİLDİ)
        function switchTab(id, el) {
            // Tüm sekmeleri gizle
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            // Tüm nav butonlarını pasif yap
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            
            // Seçileni göster
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function addUser() {
            const n = document.getElementById('new-name').value;
            const k = document.getElementById('new-key').value;
            if(n && k) {
                users[k] = { name: n, role: "Agent" };
                localStorage.setItem('surosint_users', JSON.stringify(users));
                renderUsers();
                alert('Ajan Eklendi');
            }
        }

        function renderUsers() {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            for(let k in users) {
                list.innerHTML += `<div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${users[k].name}</span>
                    ${k !== 'baba' ? `<i class="fas fa-trash" onclick="deleteUser('${k}')" style="color:red"></i>` : '<i class="fas fa-crown" style="color:var(--gold)"></i>'}
                </div>`;
            }
        }

        function deleteUser(k) {
            delete users[k];
            localStorage.setItem('surosint_users', JSON.stringify(users));
            renderUsers();
        }

        async function globalInquiry() {
            const q = document.getElementById('masterSearch').value.trim().toLowerCase();
            if(!q) return;
            try {
                const res = await fetch('database.json?v=' + Date.now());
                const data = await res.json();
                const t = data.targets.find(x => x.username.toLowerCase() === q);
                if(t) {
                    document.getElementById('intel-results').style.display = 'block';
                    document.getElementById('val-name').innerText = "AD: " + t.name;
                    document.getElementById('val-loc').innerText = "KONUM: " + t.location;
                } else { alert("Bulunamadı."); }
            } catch (e) { alert("Hata"); }
        }
    </script>
</body>
</html>
