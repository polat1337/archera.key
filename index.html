<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM | Intelligence Center</title>
    <style>
        :root {
            --primary: #00f3ff;
            --bg: #050505;
            --panel: rgba(20, 20, 20, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Arka Plan Grid Efekti */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--primary) 1px, transparent 1px),
                              linear-gradient(90deg, var(--primary) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            opacity: 0.05;
            z-index: -1;
        }

        .login-card {
            background: var(--panel);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
            width: 320px;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 30px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            text-align: center;
            font-family: monospace;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .btn-enter {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-enter:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 20px var(--primary);
        }

        .status-msg {
            margin-top: 15px;
            font-size: 0.8rem;
            height: 20px;
            color: #ff4d4d;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Yükleme Ekranı */
        #loader {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loading-bar {
            width: 200px;
            height: 2px;
            background: #111;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: var(--primary);
            animation: load 2.5s forwards;
        }

        @keyframes load {
            to { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div id="loader">
        <div style="letter-spacing: 10px; color: var(--primary);">INITIALIZING...</div>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
    </div>

    <div class="login-card" id="loginCard">
        <h1>SIM V1.0</h1>
        <div class="input-group">
            <input type="password" id="accessKey" placeholder="GİRİŞ ANAHTARI">
        </div>
        <button class="btn-enter" onclick="checkKey()">
            SİSTEME GİR 
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"/></svg>
        </button>
        <div class="status-msg" id="statusMsg"></div>
    </div>

    <script>
        const VALID_KEY = "reis"; // Mevcut sistem anahtarı

        function checkKey() {
            const key = document.getElementById('accessKey').value;
            const msg = document.getElementById('statusMsg');
            
            if(key === VALID_KEY) {
                msg.style.color = "#00f3ff";
                msg.innerText = "ERİŞİM ONAYLANDI...";
                
                setTimeout(() => {
                    document.getElementById('loginCard').style.display = 'none';
                    document.getElementById('loader').style.display = 'flex';
                    
                    // Ana Dashboard'a yönlendirme simülasyonu
                    setTimeout(() => {
                        alert("Sistem Hazır. Bir sonraki faz (Dashboard) için bekleyiniz.");
                        // Buraya dashboard linki gelecek: window.location.href = "dashboard.html";
                    }, 3000);
                }, 1000);
            } else {
                msg.innerText = "GEÇERSİZ ANAHTAR!";
                document.getElementById('accessKey').style.borderColor = "#ff4d4d";
            }
        }
    </script>
</body>
</html>
