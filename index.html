<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Ana Tema ve Arkaplan */
        body { 
            background: #0d1117; /* Koyu, asil bir gri-siyah */
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            position: relative;
        }

        /* Arkaplan Hareketli Animasyon (Hafif ve Sade) */
        body::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            animation: moveGrid 60s linear infinite;
            opacity: 0.5;
            z-index: 0;
        }
        @keyframes moveGrid {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-20px, -20px); }
        }

        /* Ana Konteyner */
        .container { 
            background: rgba(22, 27, 34, 0.8); /* Şeffaf gri panel */
            padding: 40px 30px; 
            border-radius: 20px; /* Kavisli hatlar */
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 85%; 
            max-width: 350px;
            backdrop-filter: blur(10px); /* Arkaplanı bulandırma (Premium hissi) */
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 1;
            transition: all 0.3s ease;
        }

        /* Logo Alanı */
        .logo-area {
            margin-bottom: 35px;
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
            position: relative;
            display: inline-block;
        }
        .logo-text::after {
            content: "®";
            font-size: 0.8rem;
            position: absolute;
            top: 0; right: -15px;
            opacity: 0.5;
        }
        .subtitle {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* Giriş Alanı */
        input { 
            background: rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; 
            padding: 15px; 
            width: 100%; 
            box-sizing: border-box; 
            text-align: center; 
            margin-bottom: 25px; 
            outline: none; 
            font-size: 1.1rem; 
            border-radius: 12px; /* Kavisli input */
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.3);
            box-shadow: 0 0 10px rgba(255,255,255,0.05);
        }

        /* Buton ve Animasyonlar */
        button { 
            background: #fff; /* Temiz beyaz buton */
            color: #000; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            font-weight: 700; 
            cursor: pointer; 
            border-radius: 12px; /* Kavisli buton */
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* Havalı geçiş */
            position: relative;
            overflow: hidden;
        }

        /* Tıklama Animasyonu (Ripple Effect) */
        button::after {
            content: "";
            position: absolute;
            background: rgba(0,0,0,0.1);
            width: 100px; height: 100px;
            border-radius: 50%;
            transform: scale(0);
            opacity: 0;
            transition: transform 0.5s, opacity 1s;
        }
        button:active::after {
            transform: scale(4);
            opacity: 1;
            transition: 0s;
        }

        button:active { 
            transform: scale(0.97); /* Basılma hissi */
        }

        /* İkon */
        .icon {
            width: 18px; height: 18px;
            fill: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <h1 class="logo-text">ARCHERA</h1>
            <div class="subtitle">Giris Paneli</div>
        </div>
        
        <input type="password" id="keyInput" placeholder="Yetki Kodu Required">
        
        <button onclick="sendKey()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M10 17l5-5-5-5v10z"></path><path d="M0 0h24v24H0z" fill="none"></path></svg>
            GİRİŞ
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Paneli tam ekran yap
        tg.ready();

        function sendKey() {
            const key = document.getElementById('keyInput').value;
            if (key.trim() === "") {
                // Hata durumunda inputu salla (basit bir animasyon)
                document.getElementById('keyInput').style.borderColor = "#ff4444";
                setTimeout(() => document.getElementById('keyInput').style.borderColor = "rgba(255,255,255,0.1)", 500);
                return;
            }
            
            // Başarılı giriş efekti
            document.querySelector('button').innerHTML = "ONAYLANIYOR...";
            
            setTimeout(() => {
                tg.sendData(key); // Anahtarı bota fırlat
                tg.close(); // Paneli kapat
            }, 1000); // 1 saniye bekle (havalı olsun diye)
        }
    </script>
</body>
</html>
