<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUROSINT | ARCHERA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@300;600;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #e63946; --gold: #ffcc00; --bg: #000; --surface: rgba(15, 15, 15, 0.98); --border: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* ARKA PLAN EFEKTİ */
        body::before { content: ""; position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #1a0000 0%, #000 100%); z-index: -1; }

        /* GİRİŞ EKRANI */
        #auth-gate { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100000; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .auth-card { width: 85%; max-width: 400px; padding: 60px 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 40px; text-align: center; box-shadow: 0 0 100px rgba(230, 57, 70, 0.15); }
        .auth-logo { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--primary)); }
        .auth-input { width: 100%; background: #0a0a0a; border: 1px solid var(--border); color: var(--primary); padding: 22px; text-align: center; font-family: 'JetBrains Mono'; font-size: 1.8rem; letter-spacing: 15px; border-radius: 20px; outline: none; margin-bottom: 30px; transition: 0.3s; }
        .auth-input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(230, 57, 70, 0.2); }

        /* ANA PANEL */
        #panel { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1.2s; }
        .workspace { flex: 1; padding: 40px 25px; overflow-y: auto; padding-bottom: 120px; }

        /* SADECE ARCHERA YAZAN OWNER BÖLÜMÜ */
        .owner-banner { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; padding: 10px 5px; border-bottom: 1px solid var(--border); }
        .owner-name-wrap { display: flex; flex-direction: column; }
        .owner-name { font-family: 'Montserrat'; font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; background: linear-gradient(to right, #fff, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .owner-role-badge { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .owner-badge-text { font-size: 10px; font-weight: 900; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; }
        .crown-glow { color: var(--gold); font-size: 18px; filter: drop-shadow(0 0 8px var(--gold)); animation: crownPulse 2s infinite; }
        @keyframes crownPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* SEKMELER VE KARTLAR */
        .tab-pane { display: none; }
        .tab-pane.active { display: block; animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .search-container { background: #0a0a0a; border: 1px solid var(--border); border-radius: 25px; padding: 10px; margin-bottom: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .search-container input { width: 100%; background: transparent; border: none; color: #fff; padding: 20px; text-align: center; font-size: 15px; outline: none; }
        .btn-action { width: 100%; background: var(--primary); color: #fff; border: none; padding: 18px; border-radius: 18px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-action:active { transform: scale(0.96); opacity: 0.8; }

        .data-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 25px; border-radius: 25px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .data-card::before { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--primary); }
        .card-label { font-size: 8px; color: #555; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; }
        .card-value { font-family: 'JetBrains Mono'; font-size: 15px; letter-spacing: -0.5px; }

        /* YÖNETİM PANELİ (ULTRA PRESTIGE) */
        .admin-box { background: linear-gradient(145deg, #111, #050505); border: 1px solid var(--gold); border-radius: 30px; padding: 30px; margin-bottom: 30px; }
        .admin-user-row { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid var(--border); }

        /* ALT NAVİGASYON */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 95px; background: rgba(5, 5, 5, 0.95); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(20px); z-index: 1000; padding-bottom: 20px; }
        .nav-item { color: #444; text-align: center; flex: 1; transition: 0.4s; cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
        .nav-item i { font-size: 1.5rem; }
        .nav-item span { font-size: 7px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }
        .nav-item.active i { filter: drop-shadow(0 0 10px var(--primary)); }

        /* STORY / VAULT */
        .story-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .story-frame { aspect-ratio: 9/16; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; background: #0a0a0a; }
        .story-frame img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card">
            <img src="24841.jpg" class="auth-logo" onerror="this.src='https://via.placeholder.com/100'">
            <h1 style="font-family:'Montserrat'; letter-spacing:5px; font-size:1.2rem; margin-bottom:40px;">SUROSINT</h1>
            <input type="password" id="access-key" class="auth-input" placeholder="••••">
            <button onclick="unlock()" class="btn-action">SİSTEMİ TETİKLE</button>
        </div>
    </div>

    <div id="panel">
        <main class="workspace">
            <div class="owner-banner">
                <div class="owner-name-wrap">
                    <span class="owner-name">ARCHERA</span>
                    <div class="owner-role-badge">
                        <i class="fas fa-crown crown-glow"></i>
                        <span class="owner-badge-text">SYSTEM OWNER</span>
                    </div>
                </div>
                <img src="24841.jpg" style="width:45px; height:45px; border-radius:12px; opacity:0.2; filter:grayscale(1);">
            </div>

            <div id="intel" class="tab-pane active">
                <div class="search-container">
                    <input type="text" id="masterSearch" placeholder="Tanımlanacak Kullanıcı..." autocomplete="off">
                </div>
                <button onclick="globalInquiry()" class="btn-action" style="margin-bottom:40px;"><i class="fas fa-bolt"></i> ANALİZİ BAŞLAT</button>
                
                <div id="intel-results" style="display:none;" class="results-fade">
                    <div class="data-card"><span class="card-label">TAM İSİM</span><div class="card-value" id="val-name"></div></div>
                    <div class="data-card"><span class="card-label">KONUM</span><div class="card-value" id="val-loc"></div></div>
                </div>
            </div>

            <div id="vault" class="tab-pane">
                <h2 style="font-family:'Montserrat'; margin-bottom:25px; font-size:1rem; letter-spacing:2px;">STORY ARCHIVE</h2>
                <div id="vault-results" class="story-grid"></div>
            </div>

            <div id="leak" class="tab-pane">
                <h2 style="font-family:'Montserrat'; margin-bottom:25px; font-size:1rem; letter-spacing:2px;">DATA BREACH</h2>
                <div id="leak-results"></div>
            </div>

            <div id="ai" class="tab-pane">
                <h2 style="font-family:'Montserrat'; margin-bottom:25px; font-size:1rem; letter-spacing:2px;">AI CORE ANALYSIS</h2>
                <div class="data-card" style="border-left-color:var(--gold);"><div class="card-value" id="ai-results">Veri akışı bekleniyor...</div></div>
            </div>

            <div id="admin" class="tab-pane">
                <h2 style="font-family:'Montserrat'; margin-bottom:25px; font-size:1rem; letter-spacing:2px; color:var(--gold);">OPERATIONS CONTROL</h2>
                <div class="admin-box">
                    <input type="text" id="new-name" placeholder="Agent Name" style="width:100%; background:#000; border:1px solid #222; padding:15px; border-radius:12px; color:#fff; margin-bottom:10px;">
                    <input type="text" id="new-key" placeholder="Access Key" style="width:100%; background:#000; border:1px solid #222; padding:15px; border-radius:12px; color:#fff; margin-bottom:20px;">
                    <button onclick="addUser()" class="btn-action" style="background:var(--gold); color:#000;">YETKİLENDİR</button>
                </div>
                <div id="user-list"></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showTab('intel', this)"><i class="fas fa-crosshairs"></i><span>Sorgula</span></div>
            <div class="nav-item" onclick="showTab('vault', this)"><i class="fas fa-circle-notch"></i><span>Story</span></div>
            <div class="nav-item" onclick="showTab('leak', this)"><i class="fas fa-database"></i><span>Veri</span></div>
            <div class="nav-item" onclick="showTab('ai', this)"><i class="fas fa-brain"></i><span>AI Chat</span></div>
            <div id="admin-nav" class="nav-link nav-item" style="display:none;" onclick="showTab('admin', this)"><i class="fas fa-user-shield"></i><span>Yönetim</span></div>
        </nav>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('surosint_users')) || {
            "baba": { name: "ARCHERA", role: "Owner" }
        };

        function unlock() {
            const key = document.getElementById('access-key').value;
            if(users[key]) {
                const user = users[key];
                // İsmi ve rolü güncelle
                if(user.role === "Owner") {
                    document.getElementById('admin-nav').style.display = 'flex';
                    renderUsers();
                }
                
                document.getElementById('auth-gate').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-gate').style.display = 'none';
                    document.getElementById('panel').style.display = 'flex';
                    setTimeout(() => document.getElementById('panel').style.opacity = '1', 50);
                }, 1000);
            } else { alert('ACCESS DENIED'); }
        }

        function addUser() {
            const n = document.getElementById('new-name').value;
            const k = document.getElementById('new-key').value;
            if(n && k) {
                users[k] = { name: n, role: "Agent" };
                localStorage.setItem('surosint_users', JSON.stringify(users));
                renderUsers();
                alert('Yeni ajan tanımlandı.');
            }
        }

        function renderUsers() {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            for(let k in users) {
                list.innerHTML += `<div class="admin-user-row">
                    <div><b>${users[k].name}</b><br><small style="color:#555">${k}</small></div>
                    ${k !== 'baba' ? `<i class="fas fa-trash" onclick="deleteUser('${k}')" style="color:var(--primary)"></i>` : '<i class="fas fa-crown" style="color:var(--gold)"></i>'}
                </div>`;
            }
        }

        function deleteUser(k) {
            delete users[k];
            localStorage.setItem('surosint_users', JSON.stringify(users));
            renderUsers();
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function globalInquiry() {
            const q = document.getElementById('masterSearch').value.trim().toLowerCase();
            if(!q) return;
            try {
                const res = await fetch('database.json?v=' + Date.now());
                const data = await res.json();
                const t = data.targets.find(x => x.username.toLowerCase() === q);
                if(t) {
                    document.getElementById('intel-results').style.display = 'block';
                    document.getElementById('val-name').innerText = t.name.toUpperCase();
                    document.getElementById('val-loc').innerText = t.location;
                    document.getElementById('leak-results').innerHTML = t.leaks.map(l => `<div class="data-card"><span class="card-label">${l.type}</span><div class="card-value">${l.data}</div></div>`).join('');
                    document.getElementById('vault-results').innerHTML = t.stories.map(s => `<div class="story-frame"><img src="${s}"></div>`).join('');
                    document.getElementById('ai-results').innerText = t.ai_report;
                } else { alert("Veritabanı eşleşmesi yok."); }
            } catch (e) { alert("Sistem hatası."); }
        }
    </script>
</body>
</html>
