<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | BLACK OPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --bg: #050608; --card: #0d1117; --border: #1f2937; --text: #f9fafb; --accent: #3b82f6; --danger: #ef4444; --success: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; cursor: crosshair; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- BIOMETRIC LOGIN --- */
        #gatekeeper { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: 1s ease; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--primary); top: 0; box-shadow: 0 0 15px var(--primary); animation: scan 3s infinite linear; display: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .login-box { width: 350px; text-align: center; z-index: 10; padding: 40px; border: 1px solid var(--border); background: var(--card); border-radius: 20px; }

        /* --- SYSTEM LAYOUT --- */
        #main-shell { display: none; height: 100vh; flex-direction: column; opacity: 0; }
        header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(13,17,23,0.8); backdrop-filter: blur(10px); }
        .sys-info { display: flex; gap: 20px; font-size: 0.65rem; color: var(--primary); font-family: 'Fira Code'; }

        .viewport { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }
        .module { display: none; }
        .module.active { display: block; animation: glitch 0.2s ease; }
        @keyframes glitch { from { transform: skewX(10deg); opacity: 0; } to { transform: skewX(0); opacity: 1; } }

        /* --- ADMIN: COMMAND CENTER --- */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
        .panel-h { font-size: 0.7rem; font-weight: 900; color: var(--primary); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 2px; border-bottom: 1px solid var(--border); padding-bottom: 10px; display: flex; justify-content: space-between; }
        
        /* Resource Monitor */
        .stat-bar { height: 6px; background: #1a1a1a; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .stat-fill { height: 100%; background: var(--primary); width: 0%; transition: 1s; }

        /* Terminal & Logs */
        #terminal { background: #000; padding: 10px; font-family: 'Fira Code'; font-size: 0.7rem; height: 150px; overflow-y: auto; color: #22c55e; border: 1px solid #111; }
        .smm-input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; color: var(--primary); border-radius: 6px; margin-bottom: 10px; font-family: 'Fira Code'; font-size: 0.8rem; }
        .smm-btn { width: 100%; padding: 12px; background: var(--primary); color: #000; border: none; font-weight: 900; border-radius: 6px; transition: 0.3s; }

        /* --- NAV --- */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: #4b5563; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.55rem; font-weight: 800; text-transform: uppercase; gap: 5px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="scan-line" id="scanner"></div>
        <div class="login-box">
            <h2 style="letter-spacing:10px; margin-bottom:20px;">ARCHERA</h2>
            <p id="status-text" style="font-size:0.6rem; color:var(--primary); margin-bottom:20px;">AWAITING SECURITY CLEARANCE...</p>
            <input type="password" id="gateKey" class="smm-input" placeholder="ENTER ACCESS KEY" style="text-align:center;">
            <button class="smm-btn" onclick="runSecurityProtocol()">INITIALIZE LOGIN</button>
        </div>
    </div>

    <div id="main-shell">
        <header>
            <div style="font-weight:900; letter-spacing:2px; font-size:0.8rem;">BLACK OPS <span id="clock" style="color:var(--primary); margin-left:10px;"></span></div>
            <div class="sys-info">
                <span>CPU: <b id="cpu-load">0%</b></span>
                <span>MEM: <b id="mem-load">0%</b></span>
                <span>LAT: <b id="lat-val">24ms</b></span>
            </div>
        </header>

        <div class="viewport">
            <div id="mod-sorgu" class="module active">
                <div class="panel">
                    <div class="panel-h">INTELLIGENCE SCANNER <span>LIVE_FEED</span></div>
                    <input type="text" class="smm-input" placeholder="ID / GSM / NAME...">
                    <button class="smm-btn" onclick="addLog('Querying Global Clusters...')">EXECUTE SEARCH</button>
                </div>
            </div>

            <div id="mod-admin" class="module">
                <div class="grid-layout">
                    <div class="panel">
                        <div class="panel-h">SYSTEM RESOURCES <span>REALTIME</span></div>
                        <p style="font-size:0.6rem;">CPU CORE STATUS</p>
                        <div class="stat-bar"><div id="cpu-bar" class="stat-fill"></div></div>
                        <p style="font-size:0.6rem;">MEMORY LEAK WATCH</p>
                        <div class="stat-bar"><div id="mem-bar" class="stat-fill" style="background:var(--danger)"></div></div>
                    </div>

                    <div class="panel">
                        <div class="panel-h">OPERATIVE MANAGEMENT <span>SECURE</span></div>
                        <div style="display:flex; gap:5px;">
                            <input type="text" id="u-n" class="smm-input" placeholder="Codename">
                            <input type="password" id="u-p" class="smm-input" placeholder="Pass">
                        </div>
                        <button class="smm-btn" style="background:var(--success)" onclick="addUser()">DEPLOY AGENT</button>
                        <div id="agent-list" style="margin-top:10px; font-size:0.7rem; color:var(--primary)"></div>
                    </div>

                    <div class="panel" style="grid-column: span 1;">
                        <div class="panel-h">ENCRYPTED LOGS <span>AES-256</span></div>
                        <div id="terminal"></div>
                    </div>

                    <div class="panel">
                        <div class="panel-h">SYSTEM INJECTION <span>MODULE_GEN</span></div>
                        <input type="text" id="m-n" class="smm-input" placeholder="Menu Name">
                        <input type="text" id="m-i" class="smm-input" placeholder="FA Icon (e.g: fas fa-skull)">
                        <button class="smm-btn" onclick="injectModule()">INJECT TO KERNEL</button>
                    </div>
                </div>
            </div>
        </div>

        <nav id="navbar">
            <div class="nav-item active" onclick="tab('mod-sorgu', this)"><i class="fas fa-satellite-dish"></i><span>Scanner</span></div>
            <div class="nav-item" onclick="tab('mod-img', this)"><i class="fas fa-ghost"></i><span>Ghost</span></div>
            <div class="nav-item" onclick="tab('mod-ai', this)"><i class="fas fa-microchip"></i><span>Neural</span></div>
            <div class="nav-item" onclick="tab('mod-db', this)"><i class="fas fa-shield-virus"></i><span>Vault</span></div>
            <div class="nav-item" onclick="tab('mod-admin', this)"><i class="fas fa-skull-crossbones"></i><span>Admin</span></div>
        </nav>
    </div>

    <script>
        // LOGIC & EFFECTS
        function addLog(m) {
            const t = document.getElementById('terminal');
            t.innerHTML += `<div>[${new Date().toLocaleTimeString()}] > ${m}</div>`;
            t.scrollTop = t.scrollHeight;
        }

        function runSecurityProtocol() {
            if(document.getElementById('gateKey').value !== "baba") { 
                window.location.href = "https://instagram.com/pxlat"; return; 
            }
            document.getElementById('scanner').style.display = "block";
            document.getElementById('status-text').innerText = "SCANNING BIOMETRICS...";
            setTimeout(() => {
                document.getElementById('status-text').innerText = "ACCESS GRANTED. BOOTING KERNEL...";
                setTimeout(() => {
                    document.getElementById('gatekeeper').style.transform = "translateY(-100%)";
                    document.getElementById('main-shell').style.display = "flex";
                    setTimeout(() => { document.getElementById('main-shell').style.opacity = "1"; initSys(); }, 100);
                }, 1000);
            }, 2000);
        }

        function initSys() {
            addLog("Kernel Version 14.0.0-BLACKOPS Initialized.");
            addLog("Encrypted Connection Established via Render Proxy.");
            setInterval(() => {
                const cpu = Math.floor(Math.random() * 40) + 10;
                const mem = Math.floor(Math.random() * 30) + 20;
                document.getElementById('cpu-load').innerText = cpu + "%";
                document.getElementById('mem-load').innerText = mem + "%";
                document.getElementById('cpu-bar').style.width = cpu + "%";
                document.getElementById('mem-bar').style.width = mem + "%";
            }, 2000);
        }

        function injectModule() {
            const n = document.getElementById('m-n').value;
            const i = document.getElementById('m-i').value;
            if(n && i) {
                document.getElementById('navbar').innerHTML += `<div class="nav-item" onclick="tab('mod-${n}', this)"><i class="${i}"></i><span>${n}</span></div>`;
                addLog(`Module [${n}] successfully injected into system core.`);
            }
        }

        function addUser() {
            const u = document.getElementById('u-n').value;
            if(u) {
                document.getElementById('agent-list').innerHTML += `<div>● AGENT_${u.toUpperCase()} | STATUS: ACTIVE</div>`;
                addLog(`Operative ${u} authorized for field work.`);
            }
        }

        function tab(id, el) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            el.classList.add('active');
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
