<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA STORM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Outfit:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00d2ff; --bg: #050a15; --card: rgba(10, 25, 49, 0.7); --border: rgba(0, 210, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit'; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #auth-gate { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        .login-box { width: 85%; max-width: 380px; padding: 40px; background: var(--card); border: 1px solid var(--border); border-radius: 30px; text-align: center; backdrop-filter: blur(15px); }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .module { display: none; } .module.active { display: block; animation: f 0.3s; }
        .storm-card { background: var(--card); border-radius: 20px; padding: 20px; border-left: 4px solid var(--accent); margin-bottom: 15px; border-top: 1px solid var(--border); }
        .inp { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: var(--accent); margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(90deg, #0072ff, #00d2ff); color: #fff; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(5, 10, 21, 0.98); border-top: 1px solid var(--border); display: flex; align-items: center; z-index: 100; overflow-x: auto; scrollbar-width: none; }
        .nav-item { min-width: 80px; color: #5b7a9d; text-align: center; font-size: 9px; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }
        .nav-item i { font-size: 22px; margin-bottom: 5px; display: block; }
        @keyframes f { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader"><div style="width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation: spin 1s infinite linear;"></div></div>

    <div id="auth-gate">
        <div class="login-box">
            <h1 style="font-family:'Orbitron'; margin-bottom:20px;">ARCHERA</h1>
            <input type="password" id="pk" class="inp" placeholder="PASSKEY" style="text-align:center;">
            <button onclick="entry()" class="btn">SİSTEMİ ATEŞLE</button>
        </div>
    </div>

    <div id="panel" style="display:none; height:100%; flex-direction:column;">
        <header><span style="font-weight:800;">ARCHERA <span style="color:var(--accent);">STORM</span></span><i class="fas fa-bolt" style="color:var(--accent);"></i></header>
        <main id="app-content"></main>
        <nav id="app-nav"></nav>
    </div>

    <script>
        const API = "https://surosint.onrender.com/api/v4";
        function entry() { if(document.getElementById('pk').value === "baba") { document.getElementById('auth-gate').style.display='none'; document.getElementById('panel').style.display='flex'; load(); } }
        
        async function load() {
            const r = await fetch(`${API}/menus`);
            const menus = await r.json();
            const nav = document.getElementById('app-nav');
            const cont = document.getElementById('app-content');
            
            nav.innerHTML = ''; cont.innerHTML = '';
            menus.forEach((m, i) => {
                const act = i === 0 ? 'active' : '';
                nav.innerHTML += `<div class="nav-item ${act}" onclick="tab('${m.id}', this)"><i class="${m.icon}"></i>${m.label}</div>`;
                cont.innerHTML += `<section id="${m.id}" class="module ${act}"><div class="storm-card"><h3>${m.label} Paneli</h3><p style="color:#5b7a9d;">Buraya yönetimden içerik eklenebilir.</p></div></section>`;
            });
            // Admin Panelini Her Zaman Sona Ekle
            nav.innerHTML += `<div class="nav-item" onclick="tab('mod-admin', this)"><i class="fas fa-tools"></i>ADMIN</div>`;
            cont.innerHTML += `<section id="mod-admin" class="module"><div class="storm-card"><h3>YÖNETİM</h3><input id="m-label" class="inp" placeholder="Menü Adı"><input id="m-icon" class="inp" placeholder="İkon (fas fa-...)"><button onclick="addM()" class="btn">MENÜYÜ SİSTEME EKLE</button></div></section>`;
        }

        async function addM() {
            const label = document.getElementById('m-label').value;
            const icon = document.getElementById('m-icon').value;
            const id = 'mod-' + Math.random().toString(36).substr(2, 5);
            await fetch(`${API}/menus/add`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, label, icon}) });
            alert("Menü Eklendi!"); load();
        }

        function tab(id, el) { 
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); 
            el.classList.add('active'); 
        }
    </script>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
