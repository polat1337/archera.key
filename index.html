<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0d1117; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: rgba(22, 27, 34, 0.9); padding: 40px 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 4px; margin-bottom: 30px; }
        input { background: #000; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 15px; width: 100%; box-sizing: border-box; text-align: center; margin-bottom: 25px; border-radius: 12px; outline: none; }
        button { background: #fff; color: #000; border: none; padding: 15px; width: 100%; font-weight: 800; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ARCHERA</div>
        <input type="password" id="key" placeholder="YETKİ KODU">
        <button onclick="sendData()">GİRİŞ <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg></button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sendData() {
            const val = document.getElementById('key').value;
            if(!val) return;
            tg.sendData(val); // Botun MessageHandler'ına veriyi gönderir.
            setTimeout(() => { tg.close(); }, 150); // 150ms bekle ve kapat.
        }
    </script>
</body>
</html>
