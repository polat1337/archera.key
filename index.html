<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHERA | INTEL CORE</title>

<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* SADE PREMIUM TOUCH - SİSTEM BOZMAZ */

:root {
    --primary: #7c6cff;
    --secondary: #5a4fff;
    --bg-dark: #07080c;
    --card-bg: rgba(255,255,255,0.04);
    --text-main: #eaeaf0;
    --text-muted: #8b8fa3;
    --border: rgba(255,255,255,0.08);
}

body {
    background: radial-gradient(circle at top, #11121a, #050507);
}

/* gridi yumuşattım */
.cyber-grid {
    opacity: 0.05;
}

/* kartları premium yaptım */
.glass-card,
.gate-card {
    background: var(--card-bg) !important;
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    box-shadow: none;
}

/* glowları kaldırdım */
* {
    text-shadow: none !important;
}

/* input sade */
.smm-input,
.key-input {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
}

/* buton daha clean */
.action-btn,
.enter-btn {
    border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
}

/* header blur */
header {
    background: rgba(20,20,30,0.5);
    backdrop-filter: blur(15px);
}

/* nav modern */
nav {
    background: rgba(10,10,15,0.7);
    backdrop-filter: blur(15px);
}

/* hover ince efekt */
.action-btn:hover {
    transform: translateY(-1px);
}

</style>
</head>

<body>

<div class="cyber-grid"></div>

<div id="gatekeeper">
    <div class="gate-card">
        <h1>ARCHERA</h1>
        <p>INTEL CORE OPERASYON</p>
        <input type="password" id="gateKey" class="key-input">
        <button class="enter-btn" onclick="tryLogin()">SİSTEME GİRİŞ</button>
    </div>
</div>

<div id="main-shell">
<header>
    <div class="header-logo">ARCHERA</div>
    <div id="status-indicator">ENGINE ONLINE</div>
</header>

<div class="view-port">
<div id="mod-sorgu" class="module active">
<div class="glass-card">

<input type="text" id="targetInput" class="smm-input" placeholder="Kullanıcı adı">

<button class="action-btn" onclick="executeSorgu()">
ANALİZİ BAŞLAT
</button>

<div id="resBox" class="res-grid">
<div class="res-row">AD SOYAD: <span id="res-name"></span></div>
</div>

</div>
</div>
</div>

<nav>
<div class="nav-link active" onclick="switchTab('mod-sorgu', this)">
<i class="fas fa-search"></i>
<span>Sorgu</span>
</div>
</nav>

</div>

<script>

function tryLogin() {
    const key = document.getElementById('gateKey').value;
    if(key === "baba") {
        document.getElementById('gatekeeper').style.display = "none";
        document.getElementById('main-shell').style.display = "flex";
    }
}

function switchTab(modId, el) {
    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
}

function executeSorgu() {
    const target = document.getElementById('targetInput').value;
    if(!target) return;
    document.getElementById('resBox').style.display = "block";
    document.getElementById('res-name').innerText = target;
}

</script>

</body>
</html>
