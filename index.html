<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUROSINT | ARCHERA PRESTIGE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@300;600;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #e63946; --gold: #ffcc00; --bg: #000; --surface: rgba(15, 15, 15, 0.98); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; position: relative; }

        /* PREMIUM BG EFFECT */
        body::after { content: ""; position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #1a0000 0%, #000 100%); z-index: -1; }

        /* GİRİŞ EKRANI (FULL SEKSİ) */
        #auth-gate { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100000; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .auth-card { width: 88%; max-width: 420px; padding: 60px 30px; background: rgba(10,10,10,0.95); border: 1px solid var(--border); border-radius: 50px; text-align: center; box-shadow: 0 0 80px rgba(230, 57, 70, 0.2); backdrop-filter: blur(20px); }
        
        .auth-logo-wrap { position: relative; width: 130px; height: 130px; margin: 0 auto 35px; }
        .auth-logo { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary); padding: 5px; object-fit: cover; filter: drop-shadow(0 0 20px var(--primary)); z-index: 5; position: relative; }
        .auth-logo-ring { position: absolute; inset: -10px; border: 2px dashed var(--primary); border-radius: 50%; opacity: 0.4; animation: spin 10s linear infinite; }
        
        .auth-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--primary); padding: 22px; text-align: center; font-family: 'JetBrains Mono'; font-size: 1.8rem; letter-spacing: 12px; border-radius: 25px; outline: none; margin-bottom: 30px; transition: 0.3s; }
        .auth-input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(230, 57, 70, 0.2); }

        /* ANA PANEL */
        #panel { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1s; }
        .workspace { flex: 1; padding: 40px 25px; overflow-y: auto; padding-bottom: 130px; }

        /* OWNER HEADER */
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .archera-title { font-family: 'Montserrat'; font-size: 2.4rem; font-weight: 900; letter-spacing: -2px; line-height: 1; background: linear-gradient(to right, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .owner-status { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .crown { color: var(--gold); font-size: 18px; filter: drop-shadow(0 0 10px var(--gold)); animation: pulse 2s infinite; }

        /* NAVİGASYON (ÇALIŞAN SİSTEM) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 100px; background: rgba(5,5,5,0.98); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 99999; padding-bottom: 25px; backdrop-filter: blur(20px); }
        .nav-item { color: #555; text-align: center; flex: 1; cursor: pointer; transition: 0.4s; display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; }
        .nav-item.active { color: var(--primary); transform: translateY(-8px); }
        .nav-item i { font-size: 1.6rem; }
        .nav-item span { font-size: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        /* YÖNETİM PANELİ (PREMİUM) */
        .admin-card { background: linear-gradient(145deg, #111, #050505); border: 1px solid var(--gold); border-radius: 35px; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(255, 204, 0, 0.05); }
        .user-row { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid var(--border); }

        /* SEKMELER */
        .tab-pane { display: none; }
        .tab-pane.active { display: block; animation: tabFade 0.6s ease; }
        @keyframes tabFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-premium { width: 100%; background: var(--primary); color: #fff; border: none; padding: 20px; border-radius: 20px; font-weight: 900; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card">
            <div class="auth-logo-wrap">
                <div class="auth-logo-ring"></div>
                <img src="24841.jpg" class="auth-logo" onerror="this.src='https://via.placeholder.com/130'">
            </div>
            <h1 style="font-family:'Montserrat'; letter-spacing:8px; font-size:1.5rem; margin-bottom:40px;">SUROSINT</h1>
            <input type="password" id="access-key" class="auth-input" placeholder="••••">
            <button onclick="accessSystem()" class="btn-premium">SİSTEMİ BAŞLAT</button>
        </div>
    </div>

    <div id="panel">
        <main class="workspace">
            <div class="header">
                <div>
                    <h1 class="archera-title">ARCHERA</h1>
                    <div class="owner-status">
                        <i class="fas fa-crown crown"></i>
                        <span style="font-size:10px; color:var(--gold); font-weight:900; letter-spacing:4px;">SYSTEM OWNER</span>
                    </div>
                </div>
                <img src="24841.jpg" style="width:45px; border-radius:15px; opacity:0.3; filter:grayscale(1);">
            </div>

            <div id="intel" class="tab-pane active">
                <div style="background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:30px; padding:15px; margin-bottom:30px;">
                    <input type="text" id="targetInput" placeholder="Kullanıcı Adı..." style="width:100%; background:transparent; border:none; color:#fff; padding:15px; text-align:center; outline:none; font-size:16px;">
                </div>
                <button onclick="runInquiry()" class="btn-premium"><i class="fas fa-search"></i> TARAMAYI BAŞLAT</button>
                <div id="results" style="display:none; margin-top:30px;">
                    <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:20px; border-left:4px solid var(--primary); margin-bottom:15px;">
                        <span style="font-size:8px; color:#555; display:block; margin-bottom:5px;">HEDEF İSİM</span>
                        <div id="res-name" style="font-weight:800;"></div>
                    </div>
                </div>
            </div>

            <div id="vault" class="tab-pane">
                <h2 style="font-family:'Montserrat'; letter-spacing:2px; margin-bottom:25px;">STORY VAULT</h2>
                <div id="story-results" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
            </div>

            <div id="leak" class="tab-pane">
                <h2 style="font-family:'Montserrat'; letter-spacing:2px; margin-bottom:25px;">DATABASE LEAKS</h2>
                <div id="leak-results"></div>
            </div>

            <div id="ai" class="tab-pane">
                <h2 style="font-family:'Montserrat'; letter-spacing:2px; margin-bottom:25px;">AI ANALYZER</h2>
                <div id="ai-results" style="background:rgba(255,255,255,0.03); padding:20px; border-radius:20px;">Sorgu bekleniyor...</div>
            </div>

            <div id="admin" class="tab-pane">
                <h2 style="font-family:'Montserrat'; color:var(--gold); letter-spacing:2px; margin-bottom:25px;">CONTROL CENTER</h2>
                <div class="admin-card">
                    <input type="text" id="add-name" placeholder="Ajan Adı" style="width:100%; background:#000; border:1px solid #333; padding:15px; border-radius:15px; color:#fff; margin-bottom:10px;">
                    <input type="text" id="add-key" placeholder="Key" style="width:100%; background:#000; border:1px solid #333; padding:15px; border-radius:15px; color:#fff; margin-bottom:20px;">
                    <button onclick="addNewAgent()" class="btn-premium" style="background:var(--gold); color:#000;">YETKİ VER</button>
                </div>
                <div id="agent-list"></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="navTab('intel', this)"><i class="fas fa-crosshairs"></i><span>Sorgula</span></div>
            <div class="nav-item" onclick="navTab('vault', this)"><i class="fas fa-circle-notch"></i><span>Storyler</span></div>
            <div class="nav-item" onclick="navTab('leak', this)"><i class="fas fa-database"></i><span>Veri</span></div>
            <div class="nav-item" onclick="navTab('ai', this)"><i class="fas fa-brain"></i><span>Ai Chat</span></div>
            <div id="admin-btn" class="nav-item" style="display:none;" onclick="navTab('admin', this)"><i class="fas fa-user-shield"></i><span>Yönetim</span></div>
        </nav>
    </div>

    <script>
        // ÜYE SİSTEMİ
        let members = JSON.parse(localStorage.getItem('surosint_users')) || {
            "baba": { name: "ARCHERA", role: "Owner" }
        };

        function accessSystem() {
            const key = document.getElementById('access-key').value;
            if(members[key]) {
                if(members[key].role === "Owner") {
                    document.getElementById('admin-btn').style.display = 'flex';
                    loadAgents();
                }
                document.getElementById('auth-gate').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-gate').style.display = 'none';
                    document.getElementById('panel').style.display = 'flex';
                    setTimeout(() => document.getElementById('panel').style.opacity = '1', 50);
                }, 1000);
            } else { alert('ACCESS DENIED'); }
        }

        // NAVİGASYON MOTORU
        function navTab(id, el) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // AJAN EKLEME
        function addNewAgent() {
            const n = document.getElementById('add-name').value;
            const k = document.getElementById('add-key').value;
            if(n && k) {
                members[k] = { name: n, role: "Agent" };
                localStorage.setItem('surosint_users', JSON.stringify(members));
                loadAgents();
                alert('Ajan Sisteme Sızdırıldı.');
            }
        }

        function loadAgents() {
            const list = document.getElementById('agent-list');
            list.innerHTML = '';
            for(let k in members) {
                list.innerHTML += `<div class="user-row">
                    <span><b>${members[k].name}</b> (${k})</span>
                    ${k !== 'baba' ? `<i class="fas fa-trash" style="color:red;" onclick="removeAgent('${k}')"></i>` : '<i class="fas fa-crown" style="color:var(--gold);"></i>'}
                </div>`;
            }
        }

        function removeAgent(k) {
            delete members[k];
            localStorage.setItem('surosint_users', JSON.stringify(members));
            loadAgents();
        }

        async function runInquiry() {
            const q = document.getElementById('targetInput').value.trim().toLowerCase();
            if(!q) return;
            try {
                const res = await fetch('database.json?v=' + Date.now());
                const data = await res.json();
                const t = data.targets.find(x => x.username.toLowerCase() === q);
                if(t) {
                    document.getElementById('results').style.display = 'block';
                    document.getElementById('res-name').innerText = t.name.toUpperCase();
                    // Diğer verileri buralara bağlayabilirsin
                } else { alert("Kayıt bulunamadı."); }
            } catch (e) { alert("Sistem hatası."); }
        }
    </script>
</body>
</html>
