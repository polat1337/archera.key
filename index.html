<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | MULTI-MODULE SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4e73df; --bg: #0b0e14; --card: #151921; --border: rgba(255, 255, 255, 0.08); --text-dim: #858796; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* GİRİŞ */
        #gatekeeper { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 90%; max-width: 380px; background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .input-box { width: 100%; padding: 15px; background: #0b0e14; border: 1px solid var(--border); border-radius: 10px; color: #fff; text-align: center; margin-bottom: 20px; outline: none; font-size: 1.1rem; }
        .login-btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* DASHBOARD */
        #main-shell { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 0.5s; }
        header { height: 60px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        .viewport { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; }
        
        /* MODÜL MANTIĞI (Buraya dikkat, burası bozulmayı engeller) */
        .module { display: none; max-width: 600px; margin: 0 auto; }
        .module.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .smm-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 25px; margin-bottom: 20px; }
        .smm-input { width: 100%; background: #0b0e14; border: 1px solid var(--border); padding: 15px; color: #fff; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .smm-btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }

        /* ALT NAVİGASYON (SMM STYLE FIXED) */
        nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; 
            background: var(--card); border-top: 1px solid var(--border); 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-link { color: var(--text-dim); text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; transition: 0.3s; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 1.2rem; }
        .nav-link span { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="login-card">
            <h1 style="margin-bottom:20px;">ARCHERA</h1>
            <input type="password" id="gateKey" class="input-box" placeholder="••••••••">
            <button class="login-btn" onclick="tryLogin()">SİSTEME GİRİŞ <i class="fas fa-sign-in-alt"></i></button>
            <a href="https://instagram.com/pxlat" target="_blank" style="display:block; margin-top:20px; color:#444; text-decoration:none; font-size:0.7rem;">KEY TALEBİ: @PXLAT</a>
        </div>
    </div>

    <div id="main-shell">
        <header><div style="font-weight:800; color:var(--primary);">ARCHERA</div><div style="font-size:0.6rem; color:#1cc88a;">ONLINE</div></header>

        <div class="viewport">
            <div id="mod-sorgu" class="module active">
                <div class="smm-card">
                    <p style="font-size:0.7rem; color:var(--text-dim); margin-bottom:15px;">ISTIHBARAT_SCANNER</p>
                    <input type="text" class="smm-input" placeholder="Hedef Bilgi Girin...">
                    <button class="smm-btn">SORGULA <i class="fas fa-bolt"></i></button>
                </div>
            </div>

            <div id="mod-db" class="module">
                <div class="smm-card"><h3>DATABASE</h3><p style="color:var(--text-dim); margin-top:10px;">Veri tabanı bağlantısı bekleniyor...</p></div>
            </div>

            <div id="mod-archive" class="module">
                <div class="smm-card"><h3>ARCHIVE</h3><p style="color:var(--text-dim); margin-top:10px;">Geçmiş sorgular burada listelenecek.</p></div>
            </div>

            <div id="mod-admin" class="module">
                <div class="smm-card">
                    <h3>SYSTEM_CONFIG</h3>
                    <input type="text" class="smm-input" placeholder="Render API Key" style="margin-top:15px;">
                    <button class="smm-btn" style="background:#333;">KAYDET</button>
                </div>
            </div>
        </div>

        <nav>
            <div class="nav-link active" onclick="tab('mod-sorgu', this)"><i class="fas fa-search"></i><span>Sorgu</span></div>
            <div class="nav-link" onclick="tab('mod-db', this)"><i class="fas fa-database"></i><span>Data</span></div>
            <div class="nav-link" onclick="tab('mod-archive', this)"><i class="fas fa-box-archive"></i><span>Arşiv</span></div>
            <div class="nav-link" onclick="tab('mod-admin', this)"><i class="fas fa-tools"></i><span>Admin</span></div>
        </nav>
    </div>

    <script>
        function tryLogin() {
            if(document.getElementById('gateKey').value === "baba") {
                document.getElementById('gatekeeper').style.display = "none";
                document.getElementById('main-shell').style.display = "flex";
                setTimeout(() => { document.getElementById('main-shell').style.opacity = "1"; }, 50);
            } else { window.location.href = "https://instagram.com/pxlat"; }
        }

        function tab(id, el) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
