<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUROSINT | MOBILE TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Outfit:wght@300;600;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #e63946;
            --bg: #000000;
            --surface: rgba(20, 20, 20, 0.95);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* GİRİŞ EKRANI */
        #auth-gate { 
            position: fixed; inset: 0; background: radial-gradient(circle at center, #150000 0%, #000 100%);
            display: flex; align-items: center; justify-content: center; z-index: 100000; transition: 0.8s;
        }
        .auth-card { 
            width: 85%; max-width: 380px; padding: 50px 30px; background: var(--surface); 
            border: 1px solid var(--border); border-radius: 40px; text-align: center; backdrop-filter: blur(20px);
        }
        .auth-input { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            color: var(--primary); padding: 20px; text-align: center; font-family: 'JetBrains Mono';
            font-size: 1.5rem; letter-spacing: 10px; border-radius: 20px; outline: none; margin-bottom: 25px;
        }

        /* ANA PANEL MİMARİSİ (MOBİL ODAKLI) */
        #panel { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1s; }
        
        .workspace { flex: 1; padding: 40px 25px; overflow-y: auto; padding-bottom: 120px; }
        
        /* BAŞLIK TASARIMI */
        .terminal-header { margin-bottom: 40px; }
        .terminal-header h1 { font-family: 'Montserrat'; font-size: 2.2rem; letter-spacing: -1px; }
        .terminal-header p { color: var(--primary); font-size: 9px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }

        /* SORGULAMA KUTUSU (FOTOĞRAFTAKİ TAŞMA DÜZELTİLDİ) */
        .search-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            margin-bottom: 30px;
        }
        .search-container input {
            background: transparent; border: none; color: #fff; padding: 15px;
            font-size: 14px; outline: none; text-align: center;
        }
        .btn-search {
            background: var(--primary); color: #fff; border: none; padding: 15px;
            border-radius: 15px; font-weight: 800; font-size: 11px; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        /* SONUÇ KARTLARI */
        .grid { display: grid; gap: 15px; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 20px; border-radius: 20px; }
        .card-label { font-size: 8px; color: #555; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .card-value { font-family: 'JetBrains Mono'; font-size: 14px; color: #fff; }

        /* ALT MENÜ (SABİT MOBİL MENÜ) */
        .mobile-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 80px;
            background: rgba(10, 10, 10, 0.95); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            backdrop-filter: blur(15px); z-index: 1000;
        }
        .nav-item {
            color: #444; text-align: center; flex: 1; padding: 10px;
            transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; gap: 5px;
        }
        .nav-item i { font-size: 1.2rem; }
        .nav-item span { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active { color: var(--primary); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card">
            <img src="24841.jpg" style="width:80px; border-radius:50%; border:1px solid var(--primary); padding:4px; margin-bottom:20px;">
            <h2 style="font-family:'Montserrat'; letter-spacing:3px; margin-bottom:30px;">SUROSINT</h2>
            <input type="password" id="access-key" class="auth-input" placeholder="••••">
            <button onclick="unlock()" class="btn-search" style="width:100%">DOĞRULA</button>
        </div>
    </div>

    <div id="panel">
        <main class="workspace">
            <div id="intel" class="tab-content active">
                <div class="terminal-header">
                    <h1>TERMİNAL</h1>
                    <p>Secure Clearance Required</p>
                </div>
                
                <div class="search-container">
                    <input type="text" id="masterSearch" placeholder="Hedef kullanıcı adını tanımlayın..." autocomplete="off">
                    <button onclick="globalInquiry()" class="btn-search">SORGULA</button>
                </div>

                <div id="intel-results" style="display:none;" class="grid">
                    <div class="card"><span class="card-label">KİMLİK</span><div class="card-value" id="val-name"></div></div>
                    <div class="card"><span class="card-label">KONUM</span><div class="card-value" id="val-loc"></div></div>
                    <div class="card"><span class="card-label">SİNYAL</span><div class="card-value" style="color:var(--primary)">AKTİF TAKİP</div></div>
                </div>
            </div>

            <div id="leak" class="tab-content"><div class="terminal-header"><h1>VERİLER</h1><p>Data Breach Records</p></div><div id="leak-results" class="grid"></div></div>
            <div id="vault" class="tab-content"><div class="terminal-header"><h1>ARŞİV</h1><p>Media Vault</p></div><div id="vault-results" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div></div>
            <div id="list" class="tab-content"><div class="terminal-header"><h1>LİSTE</h1><p>Monitoring Pool</p></div><div class="card"><div class="card-value" id="track-results">Kayıt yok.</div></div></div>
        </main>

        <nav class="mobile-nav">
            <div class="nav-item active" onclick="showTab('intel', this)"><i class="fas fa-bullseye"></i><span>Analiz</span></div>
            <div class="nav-item" onclick="showTab('leak', this)"><i class="fas fa-database"></i><span>Veri</span></div>
            <div class="nav-item" onclick="showTab('vault', this)"><i class="fas fa-folder"></i><span>Arşiv</span></div>
            <div class="nav-item" onclick="showTab('list', this)"><i class="fas fa-plus"></i><span>Liste</span></div>
        </nav>
    </div>

    <script>
        function unlock() {
            if(document.getElementById('access-key').value === 'baba') {
                document.getElementById('auth-gate').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-gate').style.display = 'none';
                    document.getElementById('panel').style.display = 'flex';
                    setTimeout(() => document.getElementById('panel').style.opacity = '1', 50);
                }, 500);
            } else { alert('Hatalı Key'); }
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function globalInquiry() {
            const query = document.getElementById('masterSearch').value.trim().toLowerCase();
            if(!query) return;
            try {
                const response = await fetch('database.json?v=' + Date.now());
                const data = await response.json();
                const target = data.targets.find(t => t.username.toLowerCase() === query);
                if(target) {
                    document.getElementById('intel-results').style.display = 'grid';
                    document.getElementById('val-name').innerText = target.name.toUpperCase();
                    document.getElementById('val-loc').innerText = target.location;
                    document.getElementById('leak-results').innerHTML = target.leaks.map(l => `<div class="card"><span class="card-label">${l.type}</span><div class="card-value">${l.data}</div></div>`).join('');
                    document.getElementById('vault-results').innerHTML = target.stories.map(s => `<img src="${s}" style="width:100%; border-radius:10px; border:1px solid var(--border)">`).join('');
                    document.getElementById('track-results').innerText = target.name + " eklendi.";
                } else { alert("Bulunamadı."); }
            } catch (e) { alert("Sistem hatası."); }
        }
    </script>
</body>
</html>
