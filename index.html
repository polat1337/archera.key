<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #000000;
            --card-bg: #0d1117;
            --border: #30363d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            display: flex; align-items: center; justify-content: center;
        }

        .login-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 25px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .brand-header { margin-bottom: 30px; }
        .brand-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 5px;
            font-weight: 700;
        }
        .brand-header p {
            font-size: 0.8rem;
            color: #8b949e;
            margin-top: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-wrap {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.7rem;
            color: #8b949e;
            margin-bottom: 8px;
            font-weight: 700;
            text-transform: uppercase;
        }

        input {
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            width: 100%;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            text-align: center;
            font-family: monospace;
            display: block; /* Görünürlüğü zorla */
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .btn-access {
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 10px;
            padding: 16px;
            width: 100%;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            display: block; /* Görünürlüğü zorla */
            margin-top: 10px;
        }

        .btn-access:hover {
            background: var(--accent);
            color: #fff;
        }

        /* Bekle Katmanı */
        #wait-screen {
            display: none;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            z-index: 10;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .loader {
            width: 40px; height: 40px;
            border: 3px solid rgba(0,210,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .wait-text { margin-top: 15px; color: var(--accent); font-weight: 700; letter-spacing: 3px; }
    </style>
</head>
<body>

<div class="login-panel">
    <div id="wait-screen">
        <div class="loader"></div>
        <div class="wait-text">BEKLE</div>
    </div>

    <div class="brand-header">
        <h1>ARCHERA</h1>
        <p>TERMINAL ACCESS</p>
    </div>

    <div class="input-wrap">
        <label>Security Key</label>
        <input type="password" id="passkey" placeholder="••••">
    </div>

    <button class="btn-access" onclick="access()">Sisteme Bağlan</button>
</div>

<script>
    function access() {
        const key = document.getElementById('passkey').value;
        const wait = document.getElementById('wait-screen');
        
        if(key === "reis") {
            wait.style.display = "flex";
            setTimeout(() => {
                alert("Hoşgeldin Admin. Giriş Başarılı.");
            }, 2500);
        } else {
            alert("Anahtar Yanlış.");
        }
    }
</script>

</body>
</html>
