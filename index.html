<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | SYSTEM ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #ffffff; --sub: #666; --card: #0a0a0a; --border: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: var(--accent); }
        
        .login-wrap { width: 90%; max-width: 360px; text-align: center; }
        .logo-area { margin-bottom: 40px; }
        .logo-area h1 { font-weight: 900; letter-spacing: 12px; font-size: 2.2rem; }
        .logo-area p { font-size: 0.65rem; color: var(--sub); letter-spacing: 4px; text-transform: uppercase; margin-top: 5px; }

        .input-field { position: relative; margin-bottom: 20px; }
        .input-field i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--sub); font-size: 20px; }
        input { 
            width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; 
            padding: 18px 15px 18px 50px; color: #fff; font-size: 0.9rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #fff; }

        .btn-access { 
            width: 100%; padding: 18px; background: var(--accent); color: #000; border: none; 
            border-radius: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-access:active { transform: scale(0.97); }

        .request-area { margin-top: 30px; font-size: 0.75rem; color: var(--sub); }
        .request-area a { color: #fff; text-decoration: none; font-weight: 700; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="logo-area">
            <h1>ARCHERA</h1>
            <p>Admin Terminal V1.0</p>
        </div>
        <div class="input-field">
            <i class="material-icons-round">lock_open</i>
            <input type="password" id="key" placeholder="ACCESS KEY">
        </div>
        <button class="btn-access" onclick="enter()">Bağlan</button>
        <div class="request-area">Key Talep Et: <a href="https://instagram.com/pxlat" target="_blank">@pxlat</a></div>
    </div>
    <script>
        function enter() {
            if(document.getElementById('key').value === "reis") {
                window.location.href = "dashboard.html";
            } else { alert("ACCESS DENIED"); }
        }
    </script>
</body>
</html>
