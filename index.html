<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | OSINT TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Outfit:wght@300;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #00d2ff; --secondary: #0072ff; --bg: #050a15; 
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(0, 210, 255, 0.2); 
            --text: #e0f2fe; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        #canvas-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a1931 0%, #050a15 100%); }

        /* GİRİŞ EKRANI */
        #auth-gate { position: fixed; inset: 0; z-index: 100000; display: flex; align-items: center; justify-content: center; background: rgba(5, 10, 21, 0.98); }
        .login-box { width: 90%; max-width: 450px; padding: 40px; border-radius: 30px; background: var(--glass); border: 2px solid var(--border); backdrop-filter: blur(20px); text-align: center; }
        .key-input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); padding: 15px; border-radius: 15px; color: var(--accent); text-align: center; font-size: 1.2rem; margin-bottom: 20px; outline: none; }
        .btn-enter { width: 100%; padding: 18px; border-radius: 15px; border: none; background: linear-gradient(45deg, var(--secondary), var(--accent)); color: #fff; font-weight: 800; cursor: pointer; }

        /* ANA PANEL */
        #panel { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 1s; }
        .top-bar { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }
        .main-view { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 100px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.4s; }
        
        .result-card { background: var(--glass); border-radius: 20px; padding: 20px; border-left: 4px solid var(--accent); margin-bottom: 15px; }
        
        /* ALT NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(5, 10, 21, 0.95); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: #5b7a9d; text-align: center; cursor: pointer; flex: 1; font-size: 0.8rem; }
        .nav-item.active { color: var(--accent); }

        /* YÜKLENİYOR */
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200000; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { width: 50px; height: 50px; border: 5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s infinite linear; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:20px; letter-spacing:2px;">BAGLANTI KURULUYOR...</p>
    </div>

    <div id="auth-gate">
        <div class="login-box">
            <h1 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:10px;">SUROSINT</h1>
            <p style="font-size:10px; color:#5b7a9d; margin-bottom:30px;">SHADOW MODE V4.1</p>
            <input type="password" id="gate-key" class="key-input" placeholder="PASSKEY">
            <button onclick="initSystem()" class="btn-enter">SISTEME SIZ</button>
        </div>
    </div>

    <div id="panel">
        <header class="top-bar">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="24841.jpg" style="width:40px; border-radius:10px;">
                <span style="font-weight:800; font-size:0.9rem;">ARCHERA</span>
            </div>
            <div id="status-dot" style="width:10px; height:10px; border-radius:50%; background:green; box-shadow: 0 0 10px green;"></div>
        </header>

        <main class="main-view">
            <section id="search" class="tab-content active">
                <div class="result-card">
                    <input type="text" id="target-q" placeholder="@username..." class="key-input" style="margin-bottom:10px; text-align:left; letter-spacing:1px;">
                    <button onclick="runSearch()" class="btn-enter" style="padding:10px;">SORGULA</button>
                </div>
                <div id="res-box"></div>
            </section>

            <section id="admin" class="tab-content">
                <h2 style="margin-bottom:20px; font-size:1.2rem;"><i class="fas fa-shield-alt"></i> Hesap Tüneli</h2>
                <div class="result-card" style="border-left-color: #e1306c;">
                    <p style="font-size:12px; margin-bottom:15px;">Instagram hesabını Render üzerinden bağla.</p>
                    <button onclick="startLogin()" class="btn-enter" style="background:#e1306c;">HESAP EKLE</button>
                </div>
                <div id="account-logs"></div>
            </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('search', this)"><i class="fas fa-search"></i><br>OSINT</div>
            <div class="nav-item" onclick="switchTab('admin', this)"><i class="fas fa-user-lock"></i><br>HESAPLAR</div>
        </nav>
    </div>

    <script>
        const RENDER_URL = "https://surosint.onrender.com";

        function initSystem() {
            if(document.getElementById('gate-key').value === "baba") {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('panel').style.display = 'flex';
                setTimeout(() => document.getElementById('panel').style.opacity = '1', 50);
            } else { alert("YETKISIZ ERISIM"); }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function startLogin() {
            const user = prompt("Instagram Kullanıcı Adı:");
            const pass = prompt("Şifre:");
            if(!user || !pass) return;

            document.getElementById('loader').style.display = 'flex';

            try {
                const response = await fetch(`${RENDER_URL}/api/v4/auth/link`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ platform: "Instagram", username: user, password: pass })
                });
                const res = await response.json();
                document.getElementById('loader').style.display = 'none';

                if(res.status === "success") {
                    alert("✅ BAĞLANDI: " + res.message);
                    document.getElementById('account-logs').innerHTML += `<div class="result-card"><b>${user}</b> aktif!</div>`;
                } else {
                    alert("❌ HATA: " + res.message);
                }
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                alert("❌ SUNUCU HATASI: Render uyanıyor olabilir, 20sn sonra tekrar dene.");
            }
        }

        async function runSearch() {
            const q = document.getElementById('target-q').value;
            if(!q) return;
            const resBox = document.getElementById('res-box');
            resBox.innerHTML = `<div class="result-card">Aranıyor...</div>`;
            try {
                const response = await fetch(`${RENDER_URL}/api/v4/sorgu`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: q, owner: "ARCHERA" })
                });
                const result = await response.json();
                resBox.innerHTML = `<div class="result-card"><b>${q}</b> için sonuçlar hazır. <br> Konum: Suruç</div>`;
            } catch (e) { resBox.innerHTML = `<div class="result-card" style="color:red">Hata!</div>`; }
        }
    </script>
</body>
</html>
