<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHERA | SYSTEM PANEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f3ff;
            --bg-dark: #02040a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 243, 255, 0.3);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; height: 100vh;
            background: var(--bg-dark);
            font-family: 'Exo 2', sans-serif;
            color: white;
            display: flex; align-items: center; justify-content: center;
        }

        /* Arka Plan Grid Katmanı */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a111a 0%, #02040a 100%);
            z-index: -1;
        }

        .panel-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 50px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 6px;
            color: #fff;
            text-shadow: 0 0 15px var(--accent);
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: var(--accent);
            margin-top: 5px;
            margin-bottom: 40px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .input-box {
            background: rgba(0,0,0,0.6);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
        }

        input {
            background: none; border: none; color: white; width: 100%;
            text-align: center; font-size: 1rem; outline: none;
            font-family: 'Orbitron', sans-serif; letter-spacing: 3px;
        }

        .btn-main {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-main:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 25px var(--accent);
        }

        /* BEKLE Ekranı (Üst Katman) */
        #loader-screen {
            display: none;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #02040a;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(0,243,255,0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 8px;
            color: var(--accent);
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<div class="panel-container">
    <div id="loader-screen">
        <div class="spinner"></div>
        <div class="loading-text">BEKLE</div>
    </div>

    <div class="logo-area">
        <h1>ARCHERA</h1>
        <div class="subtitle">System Panel</div>
    </div>

    <div class="input-box">
        <input type="password" id="keyInput" placeholder="ACCESS KEY">
    </div>

    <button class="btn-main" onclick="startAuth()">SİSTEME GİR</button>
</div>

<script>
    function startAuth() {
        const key = document.getElementById('keyInput').value;
        const loader = document.getElementById('loader-screen');
        
        // Anahtar kontrolü: reis
        if(key === "reis") {
            loader.style.display = "flex";
            
            // 3 saniye bekleme simülasyonu
            setTimeout(() => {
                alert("ARCHERA GİRİŞ BAŞARILI. Ana sisteme yönlendiriliyorsunuz...");
                // Gelecekteki dashboard linki buraya eklenecek
            }, 3000);
        } else {
            alert("GEÇERSİZ ANAHTAR!");
        }
    }
</script>

</body>
</html>
