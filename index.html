<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHERA | SYSTEM PANEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f3ff;
            --bg-dark: #02040a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 243, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg-dark);
            font-family: 'Exo 2', sans-serif;
            color: white;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Arka Plan Hareketli Toz Efekti */
        .particles {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: -1;
        }

        .panel-container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 60px 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,243,255,0.05);
            position: relative;
            animation: emerge 1s ease-out;
        }

        @keyframes emerge {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .logo-area h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            margin: 0;
            letter-spacing: 8px;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0,243,255,0.5));
        }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 4px;
            color: var(--accent);
            opacity: 0.8;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .input-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid #222;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            transition: 0.4s;
        }

        .input-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0,243,255,0.2);
        }

        input {
            background: none; border: none; color: white; width: 100%;
            text-align: center; font-size: 1.1rem; outline: none;
            font-family: 'Orbitron', sans-serif; letter-spacing: 2px;
        }

        .btn-main {
            background: transparent;
            border: 2px solid var(--accent);
            color: white;
            padding: 15px 30px;
            border-radius: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.5s;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .btn-main:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px var(--accent);
        }

        /* BEKLE Ekranı */
        #loader-screen {
            display: none;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            border-radius: 35px;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 10;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 3px solid rgba(0,243,255,0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 10px;
            color: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    </script>
</head>
<body>

<div class="particles"></div>

<div class="panel-container" id="mainPanel">
    <div id="loader-screen">
        <div class="spinner"></div>
        <div class="loading-text">BEKLE</div>
    </div>

    <div class="logo-area">
        <h1>ARCHERA</h1>
        <div class="subtitle">SYSTEM PANEL</div>
    </div>

    <div class="input-box">
        <input type="password" id="key" placeholder="ACCESS KEY">
    </div>

    <button class="btn-main" onclick="initSystem()">SİSTEME GİR</button>
</div>

<script>
    function initSystem() {
        const key = document.getElementById('key').value;
        const loader = document.getElementById('loader-screen');
        
        if(key === "6363") { // Örnek Anahtar
            loader.style.display = "flex";
            setTimeout(() => {
                alert("ARCHERA Core Sistemine Bağlanılıyor...");
                // Buraya Dashboard linki gelecek
            }, 3000);
        } else {
            alert("ERİŞİM REDDEDİLDİ: Geçersiz Anahtar.");
        }
    }
</script>

</body>
</html>
