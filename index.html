<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | CORPORATE INTEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { 
            --accent: #007aff; 
            --bg: #000; 
            --panel: rgba(25, 25, 25, 0.7); 
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; height: 100vh; overflow: hidden; }

        /* ARKA PLAN */
        .ambient { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000 100%); }

        /* GİRİŞ EKRANI */
        #gatekeeper { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .gate-card { width: 90%; max-width: 360px; padding: 50px 30px; background: var(--panel); border: 1px solid var(--border); border-radius: 40px; text-align: center; backdrop-filter: blur(20px); }
        .gate-card h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 30px; }
        .key-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 20px; color: #fff; border-radius: 20px; font-size: 1.2rem; text-align: center; letter-spacing: 10px; margin-bottom: 20px; }
        .enter-btn { width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 20px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .req-link { display: block; margin-top: 25px; color: #555; font-size: 0.7rem; text-decoration: none; font-weight: 600; }

        /* ANA YAPI */
        #main-shell { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 0.8s; }
        header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); z-index: 10; }
        .header-logo { font-weight: 800; font-size: 1.2rem; }

        /* MODÜLLERİN DÜZGÜN GÖRÜNMESİ İÇİN */
        .view-port { flex: 1; overflow-y: auto; padding: 20px; position: relative; -webkit-overflow-scrolling: touch; }
        .module { display: none; width: 100%; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
        .module.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* KARTLAR */
        .glass-card { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 30px; backdrop-filter: blur(30px); margin-bottom: 20px; }
        .card-label { font-size: 0.65rem; color: #666; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: block; }
        
        input[type="text"] { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 18px; color: #fff; border-radius: 15px; margin-bottom: 15px; font-size: 0.9rem; }
        .action-btn { width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* ALT NAVİGASYON - İÇ İÇE GEÇMEYİ ÖNLEDİK */
        nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 450px; height: 75px; 
            background: rgba(20, 20, 20, 0.9); border: 1px solid var(--border); border-radius: 25px;
            display: flex; justify-content: space-around; align-items: center; z-index: 100; backdrop-filter: blur(25px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .nav-item { color: #555; display: flex; flex-direction: column; align-items: center; transition: 0.3s; cursor: pointer; flex: 1; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 24px; }
        .nav-item span { font-size: 0.55rem; font-weight: 700; margin-top: 4px; text-transform: uppercase; }

        /* SONUÇLAR */
        .res-grid { margin-top: 25px; display: none; }
        .res-item { background: rgba(255,255,255,0.02); padding: 15px 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .res-item span { color: #555; font-size: 0.7rem; font-weight: 700; }
        .res-item p { color: var(--accent); font-weight: 600; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="ambient"></div>

    <div id="gatekeeper">
        <div class="gate-card">
            <h1>ARCHERA</h1>
            <input type="password" id="gateKey" class="key-input" placeholder="ACCESS KEY">
            <button class="enter-btn" onclick="tryLogin()">
                GİRİŞ YAP <i class="material-icons-round">login</i>
            </button>
            <a href="https://www.instagram.com/pxlat" target="_blank" class="req-link">Instagram: @pxlat</a>
        </div>
    </div>

    <div id="main-shell">
        <header>
            <div class="header-logo">ARCHERA</div>
            <div style="font-size: 0.6rem; color: var(--accent); font-weight: 800;">CORE ACTIVE</div>
        </header>

        <div class="view-port">
            <div id="mod-sorgu" class="module active">
                <div class="glass-card">
                    <span class="card-label">Sorgu Terminali</span>
                    <input type="text" id="targetInput" placeholder="Kullanıcı Adı Girin">
                    <button class="action-btn" onclick="executeSorgu()">
                        ANALİZ ET <i class="material-icons-round">radar</i>
                    </button>
                    <div id="resBox" class="res-grid">
                        <div class="res-item"><span>HEDEF</span><p id="res-name">-</p></div>
                        <div class="res-item"><span>DURUM</span><p>ANALİZ EDİLDİ</p></div>
                    </div>
                </div>
            </div>

            <div id="mod-db" class="module">
                <div class="glass-card">
                    <span class="card-label">Database Search</span>
                    <input type="text" placeholder="E-posta veya Hash...">
                    <button class="action-btn" style="background:#333;">ARA</button>
                </div>
            </div>

            <div id="mod-admin" class="module">
                <div class="glass-card">
                    <span class="card-label">Panel Ayarları</span>
                    <input type="text" id="sessionData" placeholder="Session ID">
                    <button class="action-btn" onclick="alert('Kaydedildi')">GÜNCELLE</button>
                </div>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="switchTab('mod-sorgu', this)"><i class="material-icons-round">radar</i><span>Sorgu</span></div>
            <div class="nav-item" onclick="switchTab('mod-db', this)"><i class="material-icons-round">database</i><span>DB</span></div>
            <div class="nav-item" onclick="switchTab('mod-admin', this)"><i class="material-icons-round">settings</i><span>Panel</span></div>
        </nav>
    </div>

    <script>
        function tryLogin() {
            const key = document.getElementById('gateKey').value;
            if(key === "baba") {
                document.getElementById('gatekeeper').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('gatekeeper').style.display = "none";
                    document.getElementById('main-shell').style.display = "flex";
                    setTimeout(() => { document.getElementById('main-shell').style.opacity = "1"; }, 50);
                }, 600);
            } else { window.location.href = "https://www.instagram.com/pxlat"; }
        }

        function switchTab(modId, el) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(modId).classList.add('active');
            el.classList.add('active');
        }

        function executeSorgu() {
            const target = document.getElementById('targetInput').value;
            if(!target) return;
            document.getElementById('resBox').style.display = "block";
            document.getElementById('res-name').innerText = target;
        }
    </script>
</body>
</html>
