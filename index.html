<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | SECURE</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; font-family: 'Space Grotesk', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: #fff; overflow: hidden; }
        .auth-container { width: 85%; max-width: 320px; text-align: center; }
        h1 { font-weight: 700; letter-spacing: 15px; font-size: 2.2rem; margin-bottom: 40px; }
        .input-wrap { border-bottom: 1px solid #222; margin-bottom: 30px; }
        input { 
            width: 100%; background: transparent; border: none; padding: 15px; 
            color: #fff; text-align: center; font-size: 1rem; letter-spacing: 2px; outline: none; 
        }
        .btn-link { 
            display: block; width: 100%; padding: 15px; background: #fff; color: #000; 
            text-decoration: none; font-weight: 700; font-size: 0.8rem; letter-spacing: 3px; 
            border: none; cursor: pointer; transition: 0.4s;
        }
        .btn-link:hover { background: #333; color: #fff; }
        .req { margin-top: 25px; font-size: 0.6rem; color: #444; letter-spacing: 2px; text-transform: uppercase; }
        .req a { color: #888; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>ARCHERA</h1>
        <div class="input-wrap">
            <input type="password" id="k" placeholder="SYSTEM KEY">
        </div>
        <button class="btn-link" onclick="v()">SISTEME SIZ</button>
        <div class="req">NO ACCESS? <a href="https://instagram.com/pxlat" target="_blank">REQUEST @PXLAT</a></div>
    </div>
    <script>
        function v(){ if(document.getElementById('k').value === "reis") { window.location.href="dashboard.html"; } else { alert("ACCESS DENIED"); } }
    </script>
</body>
</html>
